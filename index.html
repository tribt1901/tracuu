<script type="module">
  import { getDatabase, ref, onValue, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
    authDomain: "tracuu-d3ee9.firebaseapp.com",
    databaseURL: "https://tracuu-d3ee9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tracuu-d3ee9",
    storageBucket: "tracuu-d3ee9.appspot.com",
    messagingSenderId: "593568604435",
    appId: "1:593568604435:web:9a5145457a8ee734143ae6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const connectionsRef = ref(db, "connections");
  const connectedRef = ref(db, ".info/connected");

  onValue(connectedRef, (snap) => {
    if (snap.val() === true) {
      const con = push(connectionsRef, true);
      onDisconnect(con).remove();
    }
  });

  onValue(connectionsRef, (snap) => {
    const count = snap.size || snap.children?.length || snap.numChildren();
    const el = document.getElementById("onlineCount");
    if (el) el.innerText = count;
  });
