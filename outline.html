<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Tải câu hỏi & đáp án theo môn</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f5f6fa; }
    .outline-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px #0001;
      max-width: 1100px;
      margin: 36px auto;
      padding: 20px 14px 24px 24px;
      border: 1px solid #e2e2e2;
    }
    .outline-title {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .outline-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .outline-item {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #ececec;
      padding: 10px 0 10px 0;
      font-size: 1.09rem;
      transition: background .2s;
    }
    .outline-item:last-child {
      border-bottom: none;
    }
    .outline-item:hover {
      background: #f4f8ff;
    }
    .outline-icon {
      width: 18px;
      margin-right: 9px;
      filter: drop-shadow(0 1px 2px #0001);
    }
    .outline-buttons {
      margin-left: auto;
      display: flex;
      gap: 9px;
    }
    .outline-btn {
      padding: 3px 18px;
      font-size: .96rem;
      font-weight: 500;
      border-radius: 5px;
    }
    .outline-btn.txt {
      background: #fff;
      border: 1.5px solid #bdbdbd;
      color: #dd4b39;
      transition: background .2s;
    }
    .outline-btn.txt:hover {
      background: #ffe0e0;
      color: #c23321;
    }
    .outline-btn.pdf {
      background: #f7faff;
      border: 1.5px solid #7bb6fa;
      color: #1466d7;
      transition: background .2s;
    }
    .outline-btn.pdf:hover {
      background: #e0efff;
      color: #0a4b9e;
    }
    @media (max-width: 700px) {
      .outline-box { padding: 8px 3px 18px 3px; }
      .outline-title { font-size: 1.05rem; }
      .outline-item { font-size: .96rem; }
      .outline-btn { font-size: .92rem; padding: 2px 11px;}
    }
  </style>
</head>
<body>
<div class="outline-box">
  <div class="outline-title">
    <img src="https://cdn.jsdelivr.net/gh/feathericons/feather/icons/folder.svg" style="width:23px" alt="folder" />
    Tải câu hỏi & đáp án theo môn
  </div>
  <ul class="outline-list" id="outlineList">
    <!-- Các môn học sẽ được render ở đây -->
  </ul>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6",
  measurementId: "G-R0M6Y502NP"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const icons = {
  txt: `<svg width="18" height="18" viewBox="0 0 20 20" fill="none">
    <rect x="3" y="3" width="14" height="14" rx="2" fill="#fff" stroke="#d32f2f" stroke-width="1.5"/>
    <rect x="5.5" y="5.5" width="9" height="2" rx="1" fill="#ffcdd2"/>
    <rect x="5.5" y="9" width="9" height="2" rx="1" fill="#ffcdd2"/>
    <rect x="5.5" y="12.5" width="5" height="1.2" rx="0.6" fill="#ffcdd2"/>
  </svg>`,
  pdf: `<svg width="18" height="18" viewBox="0 0 20 20" fill="none">
    <rect x="3" y="3" width="14" height="14" rx="2" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
    <rect x="5.5" y="5.5" width="9" height="2" rx="1" fill="#bbdefb"/>
    <rect x="5.5" y="9" width="9" height="2" rx="1" fill="#bbdefb"/>
    <rect x="5.5" y="12.5" width="5" height="1.2" rx="0.6" fill="#bbdefb"/>
  </svg>`
};

// Hàm tải dữ liệu từ Firestore
async function renderOutlineList() {
  const list = document.getElementById('outlineList');
  list.innerHTML = '<li class="outline-item">Đang tải...</li>';

  // Lấy danh sách môn học
  const monSnap = await db.collection('mon_hoc').get();
  const monArr = [];
  monSnap.forEach(doc => {
    monArr.push({ id: doc.id, name: doc.data().ten_mon });
  });

  // Lấy danh sách file đề cương
  const decuongSnap = await db.collection('decuong').get();
  const decuongByMon = {};
  decuongSnap.forEach(doc => {
    const data = doc.data();
    if (!decuongByMon[data.mon_hoc_id]) decuongByMon[data.mon_hoc_id] = [];
    decuongByMon[data.mon_hoc_id].push(data);
  });

  list.innerHTML = "";
  for (const mon of monArr) {
    // Tìm các file đề cương của môn này
    const files = decuongByMon[mon.id] || [];
    // Lọc file TXT/PDF
    const txtFiles = files.filter(f => f.file_name && f.file_name.toLowerCase().endsWith('.txt'));
    const pdfFiles = files.filter(f => f.file_name && f.file_name.toLowerCase().endsWith('.pdf'));

    list.innerHTML += `
      <li class="outline-item">
        <img class="outline-icon" src="https://cdn.jsdelivr.net/gh/feathericons/feather/icons/file.svg" />
        <span style="font-weight:500;color:#1976d2">${mon.name}</span>
        <div class="outline-buttons">
          <button class="outline-btn txt" onclick="downloadFile('${mon.id}','txt')" ${txtFiles.length===0?'disabled':''}>
            <span style="vertical-align:middle;">${icons.txt}</span> TXT
          </button>
          <button class="outline-btn pdf" onclick="downloadFile('${mon.id}','pdf')" ${pdfFiles.length===0?'disabled':''}>
            <span style="vertical-align:middle;">${icons.pdf}</span> PDF
          </button>
        </div>
      </li>
    `;
  }
}

// Khi nhấn tải, hiển thị danh sách file để chọn (nếu >1 file)
window.downloadFile = async function(monHocId, ext) {
  // Lấy lại từ Firestore (đảm bảo dữ liệu mới nhất)
  const decuongSnap = await db.collection('decuong').where('mon_hoc_id','==',monHocId).get();
  const files = [];
  decuongSnap.forEach(doc => {
    const data = doc.data();
    if (data.file_name && data.file_name.toLowerCase().endsWith('.' + ext) && data.file_url) {
      files.push(data);
    }
  });
  if (!files.length) {
    alert("Không tìm thấy file " + ext.toUpperCase() + " cho môn này!");
    return;
  }
  if (files.length === 1) {
    window.open(files[0].file_url, "_blank");
    return;
  }
  // Có nhiều file, hiển thị danh sách chọn
  let msg = `Chọn file ${ext.toUpperCase()} để tải:\n\n`;
  files.forEach((f,i) => {
    msg += `${i+1}. ${f.file_name}\n`;
  });
  let idx = prompt(msg + "\nNhập số thứ tự file muốn tải:");
  if (idx && files[parseInt(idx)-1]) {
    window.open(files[parseInt(idx)-1].file_url, "_blank");
  }
};

// Khi load trang, render
renderOutlineList();
</script>
</body>
</html>
