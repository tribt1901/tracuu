<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đề cương môn học</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Roboto font for both web and pdfmake -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 70px; font-family: 'Roboto', Arial, sans-serif; }
    .subject-btns .btn { margin-right: 6px; }
    .table-responsive { max-height: 500px; overflow-y: auto; }
    .navbar-brand, .nav-link { font-family: 'Roboto', Arial, sans-serif; }
    .subject-title-icon { font-size: 1.15em; margin-right: 6px; }
    .syllabus-list { margin-top: 10px; }
    .syllabus-item { padding: 7px 0; border-bottom: 1px dashed #eee; }
    .syllabus-link { font-weight: 500; color: #0066cc; text-decoration: underline; }
    .syllabus-owner { font-size: 0.95em; color: #333; }
  </style>
</head>
<body class="bg-light">

<!-- Menu với nhiều mục -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📂 Tải đề cương theo môn</h5>
      <div id="subjectList"><div>Đang tải...</div></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script type="module">
  // ==== Cấu hình Firebase ====
  const firebaseConfig = {
    apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92c",
    authDomain: "tracuu-d3ee9.firebaseapp.com",
    projectId: "tracuu-d3ee9",
    storageBucket: "tracuu-d3ee9.appspot.com",
    messagingSenderId: "593568604435",
    appId: "1:593568604435:web:9a5145457a8ee734143ae6"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ---- Hàm lấy danh sách môn học ----
  async function getSubjects() {
    const snapshot = await db.collection("mon_hoc").get();
    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  }

  // ---- Hàm lấy danh sách đề cương của môn học ----
  async function getSyllabusBySubject(subjectId) {
    const qSnapshot = await db.collection("syllabus").where("mon_hoc_id", "==", subjectId).orderBy("uploaded_at", "desc").get();
    return qSnapshot.docs.map(doc => doc.data());
  }

  // ---- Hiển thị danh sách môn học ----
  async function loadSubjects() {
    const subjectList = document.getElementById("subjectList");
    subjectList.innerHTML = "<div>Đang tải...</div>";
    const subjects = await getSubjects();
    if(subjects.length === 0) {
      subjectList.innerHTML = "<div>Không có dữ liệu môn học.</div>";
      return;
    }
    subjectList.innerHTML = "";
    subjects.forEach(subj => {
      const div = document.createElement("div");
      div.className = "d-flex align-items-center justify-content-between border-bottom py-2";
      div.innerHTML = `
        <span class="fw-bold"><span class="subject-title-icon">📘</span>${subj.ten_mon}</span>
        <div class="subject-btns">
          <button class="btn btn-sm btn-outline-primary" data-id="${subj.id}" data-name="${subj.ten_mon}">⬇️ Download</button>
        </div>
      `;
      // Sự kiện Download syllabus
      div.querySelector("button").addEventListener("click", async function() {
        const subjectId = this.getAttribute("data-id");
        const subjectName = this.getAttribute("data-name");
        // Nếu đã có danh sách thì toggle
        let existingList = div.querySelector(".syllabus-list");
        if (existingList) {
          existingList.remove();
          return;
        }
        // Hiển thị "Đang tải..."
        const loadingList = document.createElement("div");
        loadingList.className = "syllabus-list";
        loadingList.innerHTML = "<div>Đang tải đề cương...</div>";
        div.appendChild(loadingList);

        // Lấy syllabus
        const syllabi = await getSyllabusBySubject(subjectId);
        loadingList.innerHTML = "";
        if (!syllabi.length) {
          loadingList.innerHTML = `<div class="text-danger">Chưa có đề cương nào cho môn <b>${subjectName}</b>.</div>`;
        } else {
          syllabi.forEach((sy, idx) => {
            const item = document.createElement("div");
            item.className = "syllabus-item";
            item.innerHTML = `
              <a class="syllabus-link" href="${sy.file_url}" target="_blank">
                🗂️ ${sy.file_name || ('Đề cương ' + (idx + 1))}
              </a>
              ${sy.owner ? `<span class="syllabus-owner"> - người upload: ${sy.owner}</span>` : ""}
              <span style="font-size:0.91em; color:#666; margin-left:6px;">
                (${sy.uploaded_at ? new Date(sy.uploaded_at).toLocaleString("vi-VN") : ""})
              </span>
            `;
            loadingList.appendChild(item);
          });
        }
      });
      subjectList.appendChild(div);
    });
  }

  loadSubjects();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
