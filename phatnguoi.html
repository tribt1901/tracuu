<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tra cứu phạt nguội - Demo</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;padding:40px}
    .card{max-width:520px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
    h1{color:#bd0d0d;font-size:20px;text-align:center}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input,select,button{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
    button{background:#bd0d0d;color:#fff;border:none;cursor:pointer;margin-top:14px}
    #result{margin-top:14px;padding:12px;border-radius:6px;background:#fff;min-height:40px;border:1px solid #eee;white-space:pre-wrap}
    .small{font-size:13px;color:#666;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Tra cứu phạt nguội — Demo</h1>

    <label for="bsx">Biển số (ví dụ: 30A12345)</label>
    <input id="bsx" type="text" oninput="this.value = this.value.toUpperCase()" placeholder="Nhập biển số">

    <label for="type">Loại</label>
    <select id="type">
      <option value="1">Ô tô</option>
      <option value="2">Xe máy</option>
      <option value="3">Xe máy điện</option>
    </select>

    <button id="btn">Tra cứu</button>

    <div id="result" role="status" aria-live="polite"></div>

    <div class="small">
      Lưu ý: trang này gọi một **proxy** để bảo vệ API key và xử lý CORS. Bạn cần deploy proxy (hướng dẫn kèm theo).
    </div>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    async function search() {
      const bsx = document.getElementById('bsx').value.trim();
      const type = document.getElementById('type').value;
      if (!bsx) {
        result.textContent = 'Vui lòng nhập biển số.';
        return;
      }
      result.textContent = 'Đang tra cứu…';
      try {
        // Thay đổi BASE_PROXY khi deploy proxy ở host khác (Vercel/Netlify/YourDomain)
        const BASE_PROXY = ''; // empty => same origin. Nếu bạn host proxy trên vercel, ví dụ: 'https://your-proxy.vercel.app'
        const res = await fetch(BASE_PROXY + '/api/search', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({bsx, type})
        });
        if (!res.ok) {
          const text = await res.text();
          result.textContent = `Lỗi server: ${res.status} ${res.statusText}\n${text}`;
          return;
        }
        const json = await res.json();
        // Hiển thị dữ liệu thô để debug. Bạn có thể trình bày đẹp hơn
        result.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        result.textContent = 'Lỗi: ' + err.message;
      }
    }

    btn.addEventListener('click', search);
    // Enter to submit
    document.getElementById('bsx').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
