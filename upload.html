<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Upload Dữ Liệu</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { padding-top: 70px; }
    .section { display: none; }
    #subjectList {max-height: 300px;overflow-y: auto;border: 1px solid #ddd;border-radius: 5px;padding: 10px 5px;background: #fafbfc;}
    .fw-medium { font-weight: 500; }
    .img-preview, .img-preview-ans { max-width: 120px; max-height: 70px; display: inline-block; margin-top: 6px; vertical-align: middle;}
    .img-preview-ans { max-width: 70px; max-height: 40px; }
    .img-upload-btn { margin-top: 3px; }
    .remove-img-btn { margin-left: 6px; color: red; border: none; background: none; }
    .subject-scroll-select {
      max-height: 240px !important;
      overflow-y: auto !important;
    }
    @media (max-width: 600px) {
      .section { max-height: 320px; }
    }
  </style>
  <link rel="icon" href="data:,">
  <script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="#">📥 Upload Dữ Liệu</a>
  </div>
</nav>
<div class="container py-4">
  <h3 class="mb-4">Chọn loại upload:</h3>
  <select class="form-select mb-4" id="uploadType">
    <option value="question">Upload Câu hỏi</option>
    <option value="outline">Upload Đề cương</option>
  </select>
  <!-- Upload Câu hỏi Section -->
  <div id="uploadQuestionSection" class="section">
    <h5 class="mb-3">Upload Câu hỏi</h5>
    <div class="mb-3">
      <label class="form-label">Chọn cách nhập</label>
      <select class="form-select" id="questionInputType">
        <option value="">-- Chọn phương thức nhập --</option>
        <option value="html">Nhập từ file HTML của Moodle</option>
        <option value="manual">Thêm thủ công</option>
      </select>
    </div>
    <div id="questionSecuritySection" class="mb-3" style="display:none;">
      <label class="form-label">Nhập mã bảo mật</label>
      <input class="form-control" type="password" id="securityCodeQ" placeholder="Mã bảo mật">
      <div id="securityQError" class="text-danger mt-1" style="display:none;">Mã bảo mật không đúng.</div>
    </div>
    <div id="questionMainSection" style="display:none;">
      <div class="mb-3">
        <label class="form-label">Chọn môn học</label>
        <select class="form-select subject-scroll-select" id="subjectDropdownQ"></select>
      </div>
      <!-- Nhập từ HTML -->
      <div id="questionHtmlSection" style="display:none;">
        <div class="mb-2">
          <input type="file" id="importHtmlInputQ" accept=".html,.htm" class="form-control" style="max-width:350px;">
        </div>
        <div id="importHtmlResultQ" style="margin-top:16px"></div>
        <button class="btn btn-success mt-2" id="saveImportBtnQ" style="display:none;">💾 Lưu vào CSDL</button>
      </div>
      <!-- Thêm thủ công -->
      <div id="questionManualSection" style="display:none;">
        <form id="manualFormQ" autocomplete="off">
          <textarea class="form-control mb-2" id="questionTextQ" placeholder="Nội dung câu hỏi (hỗ trợ MathJax)" required rows="3"></textarea>
          <div>
            <input type="file" accept="image/*" id="questionImageInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:260px;">
            <img id="questionImgPreviewQ" class="img-preview" style="display:none"/>
            <button type="button" class="remove-img-btn" id="removeQuestionImgBtnQ" style="display:none;">✖</button>
          </div>
          <div class="answer-input-group mb-2">
            <label for="answerAQ" class="form-label mb-1">Đáp án a</label>
            <input class="form-control" id="answerAQ" placeholder="Đáp án a" required type="text"/>
            <input type="file" accept="image/*" id="answerAImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
            <img id="answerAImgPreviewQ" class="img-preview-ans" style="display:none"/>
            <button type="button" class="remove-img-btn" id="removeAImgBtnQ" style="display:none;">✖</button>
          </div>
          <div class="answer-input-group mb-2">
            <label for="answerBQ" class="form-label mb-1">Đáp án b</label>
            <input class="form-control" id="answerBQ" placeholder="Đáp án b" required type="text"/>
            <input type="file" accept="image/*" id="answerBImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
            <img id="answerBImgPreviewQ" class="img-preview-ans" style="display:none"/>
            <button type="button" class="remove-img-btn" id="removeBImgBtnQ" style="display:none;">✖</button>
          </div>
          <div class="answer-input-group mb-2">
            <label for="answerCQ" class="form-label mb-1">Đáp án c</label>
            <input class="form-control" id="answerCQ" placeholder="Đáp án c" required type="text"/>
            <input type="file" accept="image/*" id="answerCImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
            <img id="answerCImgPreviewQ" class="img-preview-ans" style="display:none"/>
            <button type="button" class="remove-img-btn" id="removeCImgBtnQ" style="display:none;">✖</button>
          </div>
          <div class="answer-input-group mb-2">
            <label for="answerDQ" class="form-label mb-1">Đáp án d</label>
            <input class="form-control" id="answerDQ" placeholder="Đáp án d" required type="text"/>
            <input type="file" accept="image/*" id="answerDImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
            <img id="answerDImgPreviewQ" class="img-preview-ans" style="display:none"/>
            <button type="button" class="remove-img-btn" id="removeDImgBtnQ" style="display:none;">✖</button>
          </div>
          <select class="form-select mb-2" id="correctAnswerDropdownQ" required>
            <option value="">Chọn đáp án đúng</option>
            <option value="a">a</option>
            <option value="b">b</option>
            <option value="c">c</option>
            <option value="d">d</option>
          </select>
          <button type="submit" class="btn btn-success" id="submitQuestionBtnQ">Thêm câu hỏi</button>
        </form>
      </div>
    </div>
  </div>
  <!-- Upload Đề cương Section -->
  <div id="uploadOutlineSection" class="section">
    <h5 class="mb-3">Upload Đề cương</h5>
    <div class="mb-3">
      <label class="form-label">Nhập mã bảo mật</label>
      <input class="form-control" type="password" id="securityCodeOutline" placeholder="Mã bảo mật">
      <div id="securityOutlineError" class="text-danger mt-1" style="display:none;">Mã bảo mật không đúng.</div>
    </div>
    <div class="mb-3">
      <label class="form-label">Chọn môn học</label>
      <select class="form-select subject-scroll-select" id="subjectDropdownO"></select>
    </div>
    <div class="mb-3">
      <label class="form-label">Tài liệu này của? (Không bắt buộc)</label>
      <input class="form-control" type="text" id="ownerOutline" placeholder="Tên người/nhóm/bộ môn...">
    </div>
    <div class="mb-3">
      <label class="form-label">Chọn file đề cương</label>
      <input type="file" class="form-control" id="outlineFileInput" accept=".pdf,.doc,.docx,.txt,.html,.htm,.zip">
    </div>
    <button class="btn btn-success" id="submitOutlineBtn">Upload</button>
    <div id="outlineUploadResult" class="mt-2"></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6",
  measurementId: "G-R0M6Y502NP"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Lấy mã bảo mật từ Firestore
let SECURITY_CODE = null;
async function fetchSecurityCode() {
  try {
    const docRef = doc(db, "config", "security_code");
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      SECURITY_CODE = docSnap.data().code;
    }
  } catch (e) {
    SECURITY_CODE = null;
  }
}
await fetchSecurityCode();

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "block";
}

async function loadSubjectsDropdown(domId) {
  const select = document.getElementById(domId);
  select.innerHTML = '';
  const snapshot = await getDocs(collection(db, "mon_hoc"));
  snapshot.forEach(docSnap => {
    const option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    select.appendChild(option);
  });
}
async function getQuestionSetForSubject(mon_hoc_id) {
  const querySnap = await getDocs(query(collection(db, "cau_hoi"), where("mon_hoc_id", "==", mon_hoc_id)));
  const existSet = [];
  querySnap.forEach(docSnap => {
    const data = docSnap.data();
    existSet.push({
      noi_dung: (data.noi_dung || '').trim(),
      dap_an_dung: data.dap_an_dung,
      dap_an: (data.lua_chon && data.lua_chon[data.dap_an_dung]) ? data.lua_chon[data.dap_an_dung] : ''
    });
  });
  return existSet;
}
function isDuplicateInSet(question, existSet) {
  return existSet.some(
    x =>
      x.noi_dung === question.noi_dung.trim() &&
      x.dap_an_dung === question.dap_an_dung &&
      x.dap_an === question.lua_chon[question.dap_an_dung]
  );
}

// UI switching
const uploadType = document.getElementById("uploadType");
uploadType.addEventListener("change", () => {
  if (uploadType.value === "question") {
    showSection("uploadQuestionSection");
    // Ẩn các section nhập tiếp theo cho đến khi chọn phương thức nhập
    document.getElementById("questionInputType").value = "";
    document.getElementById("questionSecuritySection").style.display = "none";
    document.getElementById("questionMainSection").style.display = "none";
  } else {
    showSection("uploadOutlineSection");
    loadSubjectsDropdown("subjectDropdownO");
  }
});
uploadType.dispatchEvent(new Event("change"));

// Ẩn/hiện các block nhập sau khi chọn phương thức nhập
const questionInputType = document.getElementById("questionInputType");
questionInputType.addEventListener("change", () => {
  const method = questionInputType.value;
  if (method) {
    document.getElementById("questionSecuritySection").style.display = "block";
  } else {
    document.getElementById("questionSecuritySection").style.display = "none";
    document.getElementById("questionMainSection").style.display = "none";
  }
  document.getElementById("securityQError").style.display = "none";
  document.getElementById("securityCodeQ").value = "";
  document.getElementById("questionMainSection").style.display = "none";
});

// Khi nhập mã bảo mật xong, nếu đúng thì hiện các nội dung nhập tiếp theo
document.getElementById("securityCodeQ").addEventListener("blur", async function() {
  if (SECURITY_CODE === null) await fetchSecurityCode();
  const code = this.value;
  if (!questionInputType.value) return;
  if (code === SECURITY_CODE) {
    document.getElementById("securityQError").style.display = "none";
    document.getElementById("questionMainSection").style.display = "block";
    loadSubjectsDropdown("subjectDropdownQ");
    if (questionInputType.value === "html") {
      document.getElementById("questionHtmlSection").style.display = "block";
      document.getElementById("questionManualSection").style.display = "none";
    } else if (questionInputType.value === "manual") {
      document.getElementById("questionHtmlSection").style.display = "none";
      document.getElementById("questionManualSection").style.display = "block";
    }
  } else {
    document.getElementById("questionQError").style.display = "none";
    document.getElementById("questionMainSection").style.display = "none";
    if (code) document.getElementById("securityQError").style.display = "block";
  }
});
// Khi thay đổi phương thức nhập thì reset lại phần nhập mã bảo mật và nội dung tiếp theo
questionInputType.addEventListener("change", function() {
  document.getElementById("securityCodeQ").value = "";
  document.getElementById("securityQError").style.display = "none";
  document.getElementById("questionMainSection").style.display = "none";
  if (this.value === "html") {
    document.getElementById("questionHtmlSection").style.display = "block";
    document.getElementById("questionManualSection").style.display = "none";
  } else if (this.value === "manual") {
    document.getElementById("questionHtmlSection").style.display = "none";
    document.getElementById("questionManualSection").style.display = "block";
  } else {
    document.getElementById("questionHtmlSection").style.display = "none";
    document.getElementById("questionManualSection").style.display = "none";
  }
});

// Upload Câu hỏi - nhập từ file HTML
let importedQuestionsQ = [];
document.getElementById("importHtmlInputQ").addEventListener("change", async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const mon_hoc_id = document.getElementById("subjectDropdownQ").value;
  if (!mon_hoc_id) { alert("Vui lòng chọn môn học"); return; }
  const existSet = await getQuestionSetForSubject(mon_hoc_id);
  const reader = new FileReader();
  reader.onload = function(event) {
    const html = event.target.result;
    const parser = new DOMParser();
    const docx = parser.parseFromString(html, "text/html");
    importedQuestionsQ = [];
    let rawQuestions = [];
    docx.querySelectorAll('.que').forEach(q => {
      let questionText = q.querySelector('.qtext')?.innerText.trim() || '';
      const answerNodes = q.querySelectorAll('.answer > div');
      const answers = [];
      answerNodes.forEach((ans, idx) => {
        let ansText = ans.querySelector('.flex-fill, div.ml-1')?.innerText.trim() || '';
        answers.push(ansText);
      });
      let correct = '';
      let correctIdx = -1;
      let correctKey = '';
      let rightAnswerText = q.querySelector('.rightanswer')?.innerText || '';
      let match = rightAnswerText.match(/The correct answer is: (.+)$/);
      if (match) {
        let correctValue = match[1].trim();
        correctIdx = answers.findIndex(a =>
          a.trim().toLowerCase() === correctValue.trim().toLowerCase()
          || a.trim().toLowerCase().includes(correctValue.trim().toLowerCase())
          || correctValue.trim().toLowerCase().includes(a.trim().toLowerCase())
        );
        correctKey = ['a','b','c','d'][correctIdx] || '';
        correct = answers[correctIdx] || '';
      } else {
        answerNodes.forEach((ans, idx) => {
          if (ans.classList.contains('correct')) {
            correct = answers[idx];
            correctIdx = idx;
            correctKey = ['a','b','c','d'][correctIdx] || '';
          }
        });
      }
      rawQuestions.push({
        questionText, answers,
        correct, correctIdx, correctKey,
        lua_chon: {
          a: answers[0]||"", b: answers[1]||"", c: answers[2]||"", d: answers[3]||""
        }
      });
    });
    importedQuestionsQ = rawQuestions.map(q => ({
      ...q,
      duplicate: q.correctKey && q.questionText
        ? isDuplicateInSet({
            noi_dung: q.questionText,
            dap_an_dung: q.correctKey,
            lua_chon: q.lua_chon
          }, existSet)
        : false
    }));
    let htmlResult = `<div class="fw-bold mb-2">Kết quả trích xuất (${importedQuestionsQ.length} câu):</div>`;
    importedQuestionsQ.forEach((q, idx) => {
      htmlResult += `<div class="import-question${q.duplicate ? ' text-danger' : ''}">
        <span>${q.questionText}</span><br>`;
      q.answers.forEach((a,i) => {
        htmlResult += `<div class="import-answer${i===q.correctIdx?' text-success fw-bold':''}">
          ${String.fromCharCode(97+i)}. ${a} ${i===q.correctIdx?'<span>(Đáp án đúng)</span>':''}
        </div>`;
      });
      if(q.duplicate)
        htmlResult += `<span class="text-danger">[Trùng] Câu hỏi này sẽ không được lưu!</span>`;
      htmlResult += `</div>`;
    });
    document.getElementById("importHtmlResultQ").innerHTML = htmlResult;
    document.getElementById("saveImportBtnQ").style.display = importedQuestionsQ.length>0 ? "inline-block" : "none";
    if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
  }
  reader.readAsText(file);
});
document.getElementById("saveImportBtnQ").onclick = async function() {
  if (SECURITY_CODE === null) await fetchSecurityCode();
  const code = document.getElementById("securityCodeQ").value;
  if (code !== SECURITY_CODE) {
    document.getElementById("securityQError").style.display = "block";
    return;
  } else {
    document.getElementById("securityQError").style.display = "none";
  }
  const mon_hoc_id = document.getElementById("subjectDropdownQ").value;
  if (!mon_hoc_id) { alert("Vui lòng chọn môn học để lưu!"); return; }
  if (!importedQuestionsQ.length) { alert("Chưa có dữ liệu để lưu!"); return; }
  document.getElementById("saveImportBtnQ").disabled = true;
  let success = 0, fail = 0, skip = 0;
  for (let q of importedQuestionsQ) {
    if(q.duplicate) { skip++; continue; }
    await addDoc(collection(db, "cau_hoi"), {
      mon_hoc_id,
      noi_dung: q.questionText,
      noi_dung_img: "",
      lua_chon: q.lua_chon,
      dap_an_dung: q.correctKey
    }).then(()=>success++).catch(()=>fail++);
  }
  alert(`Đã lưu ${success} câu hỏi${skip>0?`, bỏ qua ${skip} câu trùng`:''}${fail>0?`, lỗi ${fail} câu`:''}.`);
  document.getElementById("saveImportBtnQ").disabled = false;
};

// Upload Câu hỏi - thêm thủ công
let questionImgFileQ = null, answerAImgFileQ = null, answerBImgFileQ = null, answerCImgFileQ = null, answerDImgFileQ = null;
let questionImgUrlQ = "", answerAImgUrlQ = "", answerBImgUrlQ = "", answerCImgUrlQ = "", answerDImgUrlQ = "";

function handleImgInput(input, preview, removeBtn, setFile, setUrl) {
  input.addEventListener("change", function() {
    if(this.files && this.files[0]) {
      setFile(this.files[0]);
      preview.src = URL.createObjectURL(this.files[0]);
      preview.style.display = "";
      removeBtn.style.display = "";
      setUrl("");
    }
  });
  removeBtn.addEventListener("click", function() {
    setFile(null);
    preview.src = "";
    preview.style.display = "none";
    removeBtn.style.display = "none";
    input.value = "";
    setUrl("");
  });
}
handleImgInput(questionImageInputQ, questionImgPreviewQ, removeQuestionImgBtnQ, f=>questionImgFileQ=f, url=>questionImgUrlQ=url);
handleImgInput(answerAImgInputQ, answerAImgPreviewQ, removeAImgBtnQ, f=>answerAImgFileQ=f, url=>answerAImgUrlQ=url);
handleImgInput(answerBImgInputQ, answerBImgPreviewQ, removeBImgBtnQ, f=>answerBImgFileQ=f, url=>answerBImgUrlQ=url);
handleImgInput(answerCImgInputQ, answerCImgPreviewQ, removeCImgBtnQ, f=>answerCImgFileQ=f, url=>answerCImgUrlQ=url);
handleImgInput(answerDImgInputQ, answerDImgPreviewQ, removeDImgBtnQ, f=>answerDImgFileQ=f, url=>answerDImgUrlQ=url);

async function uploadToDrive(file) {
  const formData = new FormData();
  formData.append('file', file);
  const response = await fetch('https://tracuu-app.hugo.io.vn/api/upload', { method: 'POST', body: formData });
  if (!response.ok) throw new Error('Upload ảnh thất bại!');
  const result = await response.json();
  return result.url;
}

document.getElementById("manualFormQ").addEventListener("submit", async function(e) {
  e.preventDefault();
  if (SECURITY_CODE === null) await fetchSecurityCode();
  const code = document.getElementById("securityCodeQ").value;
  if (code !== SECURITY_CODE) {
    document.getElementById("securityQError").style.display = "block";
    return;
  } else {
    document.getElementById("securityQError").style.display = "none";
  }
  const subjectId = document.getElementById("subjectDropdownQ").value;
  const qText = questionTextQ.value.trim();
  const a = answerAQ.value.trim();
  const b = answerBQ.value.trim();
  const c = answerCQ.value.trim();
  const d = answerDQ.value.trim();
  const correct = correctAnswerDropdownQ.value;
  if (!subjectId || !qText || !a || !b || !c || !d || !correct) return;
  let qImg = questionImgUrlQ;
  let aImg = answerAImgUrlQ;
  let bImg = answerBImgUrlQ;
  let cImg = answerCImgUrlQ;
  let dImg = answerDImgUrlQ;
  if (questionImgFileQ) qImg = await uploadToDrive(questionImgFileQ);
  if (answerAImgFileQ) aImg = await uploadToDrive(answerAImgFileQ);
  if (answerBImgFileQ) bImg = await uploadToDrive(answerBImgFileQ);
  if (answerCImgFileQ) cImg = await uploadToDrive(answerCImgFileQ);
  if (answerDImgFileQ) dImg = await uploadToDrive(answerDImgFileQ);
  const existSet = await getQuestionSetForSubject(subjectId);
  const lua_chon = {a, aImg: aImg || "", b, bImg: bImg || "", c, cImg: cImg || "", d, dImg: dImg || ""};
  if (isDuplicateInSet({noi_dung: qText, dap_an_dung: correct, lua_chon}, existSet)) {
    alert("Câu hỏi này đã tồn tại trong môn học với đáp án đúng giống nhau!");
    return;
  }
  await addDoc(collection(db, "cau_hoi"), {
    mon_hoc_id: subjectId,
    noi_dung: qText,
    noi_dung_img: qImg || "",
    lua_chon,
    dap_an_dung: correct
  });
  this.reset();
  [questionImgPreviewQ, removeQuestionImgBtnQ, answerAImgPreviewQ, removeAImgBtnQ, answerBImgPreviewQ, removeBImgBtnQ, answerCImgPreviewQ, removeCImgBtnQ, answerDImgPreviewQ, removeDImgBtnQ].forEach(el => { el.style.display = "none"; });
  questionImgFileQ = answerAImgFileQ = answerBImgFileQ = answerCImgFileQ = answerDImgFileQ = null;
  questionImgUrlQ = answerAImgUrlQ = answerBImgUrlQ = answerCImgUrlQ = answerDImgUrlQ = "";
  questionImageInputQ.value = answerAImgInputQ.value = answerBImgInputQ.value = answerCImgInputQ.value = answerDImgInputQ.value = "";
  alert("Đã thêm câu hỏi thành công!");
});

// Security code errors hide on input
document.getElementById("securityCodeQ").addEventListener("input", ()=>document.getElementById("securityQError").style.display="none");
document.getElementById("securityCodeOutline").addEventListener("input", ()=>document.getElementById("securityOutlineError").style.display="none");

// Upload Đề cương
document.getElementById("submitOutlineBtn").addEventListener("click", async function() {
  if (SECURITY_CODE === null) await fetchSecurityCode();
  const code = document.getElementById("securityCodeOutline").value;
  if (code !== SECURITY_CODE) {
    document.getElementById("securityOutlineError").style.display = "block";
    return;
  } else {
    document.getElementById("securityOutlineError").style.display = "none";
  }
  const subjectId = document.getElementById("subjectDropdownO").value;
  const owner = document.getElementById("ownerOutline").value.trim();
  const fileInput = document.getElementById("outlineFileInput");
  const resultDiv = document.getElementById("outlineUploadResult");
  if (!subjectId) { resultDiv.innerHTML = '<span class="text-danger">Vui lòng chọn môn học!</span>'; return; }
  if (!fileInput.files[0]) { resultDiv.innerHTML = '<span class="text-danger">Vui lòng chọn file!</span>'; return; }
  resultDiv.innerHTML = "Đang upload file...";
  try {
    const url = await uploadToDrive(fileInput.files[0]);
    await addDoc(collection(db, "de_cuong"), {
      mon_hoc_id: subjectId,
      file_url: url,
      owner: owner,
      upload_time: new Date().toISOString()
    });
    resultDiv.innerHTML = '<span class="text-success">Upload thành công!</span>';
    fileInput.value = "";
    document.getElementById("ownerOutline").value = "";
  } catch (e) {
    resultDiv.innerHTML = '<span class="text-danger">Upload thất bại!</span>';
  }
});
</script>
</body>
</html>
