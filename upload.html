<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Upload Dữ liệu</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { padding-top: 70px; }
    .mode-section { display: none; }
    .top-btn-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .top-btn-bar .btn { margin-bottom: 0 !important;}
    .top-btn-bar .ms-auto { margin-left: auto !important;}
    .import-question-list { max-height: 250px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 5px; padding: 10px; }
    .img-preview img { max-height: 60px; max-width: 100%; margin-right: 8px; vertical-align: middle;}
    .img-preview .btn-delete-img { margin-left: 6px; margin-top: 0;}
    .thumb-inline {
      max-width: 32px;
      max-height: 32px;
      vertical-align: middle;
      margin-left: 6px;
      border-radius: 4px;
      object-fit: contain;
      box-shadow: 0 0 2px #aaa;
    }
    @media (max-width: 600px) {
      .import-question-list { max-height: 150px; }
    }
  </style>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload.html">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  <h3 class="mb-4">Upload Dữ liệu</h3>
  <div class="mb-3">
    <label class="form-label fw-bold">Bạn muốn upload gì?</label>
    <select id="uploadTypeSelect" class="form-select" style="max-width:380px;">
      <option value="">-- Chọn loại upload --</option>
      <option value="decuong">Upload Đề cương</option>
      <option value="cauhoi">Upload Câu hỏi</option>
    </select>
  </div>

  <!-- Upload Đề cương -->
  <div class="mode-section" id="decuongSection">
    <h5 class="mb-3">Upload Đề cương môn học</h5>
    <form id="decuongForm">
      <div class="mb-2">
        <label for="decuongSubject" class="form-label">Chọn môn học</label>
        <select id="decuongSubject" class="form-select" required style="max-width:380px;"></select>
      </div>
      <div class="mb-2">
        <label for="decuongFile" class="form-label">Chọn file đề cương (PDF, DOCX, v.v.)</label>
        <input type="file" id="decuongFile" accept=".pdf,.doc,.docx,.xlsx,.ppt,.pptx,.txt,.zip,.rar,.jpg,.png,.jpeg" class="form-control" required>
      </div>
      <button class="btn btn-success" type="submit">Upload</button>
      <span id="decuongStatus" class="ms-3"></span>
    </form>
  </div>

  <!-- Upload Câu hỏi -->
  <div class="mode-section" id="cauhoiSection">
    <h5 class="mb-3">Upload Câu hỏi</h5>
    <div class="mb-3">
      <button class="btn btn-primary me-2" id="importHtmlBtn">Nhập từ file HTML</button>
      <button class="btn btn-success" id="manualBtn">Thêm thủ công</button>
    </div>

    <!-- Import HTML -->
    <div id="importHtmlSection" style="display:none;">
      <form id="importHtmlForm">
        <div class="mb-2">
          <label for="importSubject" class="form-label">Chọn môn học</label>
          <select id="importSubject" class="form-select" required style="max-width:380px;"></select>
        </div>
        <div class="mb-2">
          <label for="importHtmlInput" class="form-label">Chọn file HTML export từ Moodle</label>
          <input type="file" id="importHtmlInput" accept=".html,.htm" class="form-control" required style="max-width:380px;">
        </div>
        <button class="btn btn-success" type="submit">Xem trước & Import</button>
        <span id="importStatus" class="ms-3"></span>
      </form>
      <div id="importPreview" class="import-question-list mt-3"></div>
    </div>

    <!-- Nhập thủ công -->
    <div id="manualSection" style="display:none;">
      <form id="manualForm">
        <div class="mb-2">
          <label for="manualSubject" class="form-label">Chọn môn học</label>
          <select id="manualSubject" class="form-select" required style="max-width:380px;"></select>
        </div>
        <div class="mb-2">
          <textarea id="manualQuestion" class="form-control" rows="3" placeholder="Nhập nội dung câu hỏi" required></textarea>
        </div>
        <div class="mb-2">
          <label class="form-label">Các đáp án</label>
          <input class="form-control mb-1" id="manualA" placeholder="Đáp án a" required>
          <input class="form-control mb-1" id="manualB" placeholder="Đáp án b" required>
          <input class="form-control mb-1" id="manualC" placeholder="Đáp án c" required>
          <input class="form-control mb-1" id="manualD" placeholder="Đáp án d" required>
        </div>
        <div class="mb-2">
          <label class="form-label">Đáp án đúng</label>
          <select id="manualCorrect" class="form-select" required>
            <option value="">Chọn đáp án đúng</option>
            <option value="a">a</option>
            <option value="b">b</option>
            <option value="c">c</option>
            <option value="d">d</option>
          </select>
        </div>
        <button class="btn btn-success" type="submit">Thêm câu hỏi</button>
        <span id="manualStatus" class="ms-3"></span>
      </form>
    </div>
  </div>
</div>

<script>
// ==== Firebase Config ====
const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6",
  measurementId: "G-R0M6Y502NP"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

// ==== UI Control ====
const uploadTypeSelect = document.getElementById('uploadTypeSelect');
const decuongSection = document.getElementById('decuongSection');
const cauhoiSection = document.getElementById('cauhoiSection');
const importHtmlSection = document.getElementById('importHtmlSection');
const manualSection = document.getElementById('manualSection');
const decuongSubject = document.getElementById('decuongSubject');
const importSubject = document.getElementById('importSubject');
const manualSubject = document.getElementById('manualSubject');
const decuongStatus = document.getElementById('decuongStatus');
const importStatus = document.getElementById('importStatus');
const manualStatus = document.getElementById('manualStatus');
const importPreview = document.getElementById('importPreview');

// ==== Hiển thị giao diện ====
uploadTypeSelect.onchange = () => {
  Array.from(document.getElementsByClassName('mode-section')).forEach(e => e.style.display = 'none');
  if(uploadTypeSelect.value === 'decuong') {
    decuongSection.style.display = 'block';
    loadSubjectsToDropdown(decuongSubject);
  }
  if(uploadTypeSelect.value === 'cauhoi') {
    cauhoiSection.style.display = 'block';
    loadSubjectsToDropdown(importSubject);
    loadSubjectsToDropdown(manualSubject);
    importHtmlSection.style.display = 'none';
    manualSection.style.display = 'none';
  }
};

// ==== Upload Đề cương lên Google Drive (qua Cloud Function proxy hoặc trực tiếp nếu public) ====
// YÊU CẦU: Bạn cần cấu hình backend (Firebase Cloud Function) nhận file rồi upload lên Drive và trả về link.
// Ở đây code demo upload lên Firebase Storage thay vì Google Drive, bạn cần thay endpoint nếu có function riêng.
document.getElementById('decuongForm').onsubmit = async function(e) {
  e.preventDefault();
  decuongStatus.textContent = 'Đang upload...';
  const subjectId = decuongSubject.value;
  const file = document.getElementById('decuongFile').files[0];
  if(!subjectId || !file) { decuongStatus.textContent = 'Vui lòng chọn môn học và file.'; return; }
  try {
    // Giả sử bạn dùng Firebase Storage (bạn cần chỉnh lại nếu có Cloud Function proxy Google Drive)
    const ref = storage.ref(`decuong/${subjectId}/${Date.now()}_${file.name}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    await db.collection("decuong").add({
      mon_hoc_id: subjectId,
      file_url: url,
      file_name: file.name,
      uploaded_at: new Date()
    });
    decuongStatus.textContent = 'Tải lên thành công!';
    document.getElementById('decuongForm').reset();
  } catch (err) {
    decuongStatus.textContent = 'Lỗi upload file!';
  }
};

// ==== Upload Câu hỏi: import HTML hoặc nhập thủ công ====
document.getElementById('importHtmlBtn').onclick = () => {
  importHtmlSection.style.display = 'block';
  manualSection.style.display = 'none';
  importPreview.innerHTML = '';
  importStatus.textContent = '';
};
document.getElementById('manualBtn').onclick = () => {
  manualSection.style.display = 'block';
  importHtmlSection.style.display = 'none';
  manualStatus.textContent = '';
};

async function loadSubjectsToDropdown(sel) {
  sel.innerHTML = '<option value="">-- Chọn môn học --</option>';
  const snap = await db.collection('mon_hoc').get();
  snap.forEach(docSnap => {
    const d = docSnap.data();
    const opt = document.createElement('option');
    opt.value = docSnap.id;
    opt.textContent = d.ten_mon;
    sel.appendChild(opt);
  });
}

// ==== Import file HTML Moodle ====
document.getElementById('importHtmlForm').onsubmit = async function(e) {
  e.preventDefault();
  importPreview.innerHTML = '';
  importStatus.textContent = 'Đang xử lý file...';
  const subjectId = importSubject.value;
  const file = document.getElementById('importHtmlInput').files[0];
  if(!subjectId || !file) { importStatus.textContent = 'Chưa chọn môn học hoặc file!'; return; }
  // Đọc file HTML và trích xuất câu hỏi (giả định định dạng giống các bản trước)
  const reader = new FileReader();
  reader.onload = async function(event) {
    const html = event.target.result;
    let blocks = html.split(/\n\s*\n/).filter(x=>x.trim());
    let questions = [];
    for (let block of blocks) {
      let lines = block.split('\n').map(x=>x.trim()).filter(x=>x);
      if (lines.length < 2) continue;
      let questionText = lines[0];
      let answers = [];
      let correctIdx = -1;
      for (let i=1; i<lines.length; ++i) {
        let ansLine = lines[i];
        let match = ansLine.match(/^([a-d])\.\s*(.*)$/i);
        if (match) {
          let ansText = match[2].replace(/<[^>]+>/g,"").replace(/\(Đáp án đúng\)/i,"").replace(/\s*$/, "");
          answers.push(ansText);
          if (ansLine.toLowerCase().includes("đáp án đúng")) correctIdx = answers.length-1;
        }
      }
      if (answers.length===4 && correctIdx!==-1) {
        questions.push({ questionText, answers, correctIdx });
      }
    }
    // Xem trước
    let htmlResult = `<div class="fw-bold mb-2">Kết quả (${questions.length} câu):</div>`;
    questions.forEach((q, idx) => {
      htmlResult += `<div class="border rounded p-2 mb-2"><b>Câu hỏi:</b> ${q.questionText}<br>`;
      q.answers.forEach((a,i) => {
        htmlResult += `<div class="${i===q.correctIdx?"fw-bold text-success":""}">${String.fromCharCode(97+i)}. ${a} ${i===q.correctIdx?'<span>(Đáp án đúng)</span>':''}</div>`;
      });
      htmlResult += `</div>`;
    });
    importPreview.innerHTML = htmlResult;
    importStatus.textContent = questions.length ? 'Xem trước thành công! Đang lưu vào CSDL...':'Không trích xuất được câu hỏi!';
    // Lưu vào Firestore
    let success = 0, fail = 0;
    for (let q of questions) {
      let correctKey = ['a','b','c','d'][q.correctIdx] || '';
      try {
        await db.collection("cau_hoi").add({
          mon_hoc_id: subjectId,
          noi_dung: q.questionText,
          noi_dung_img: "",
          lua_chon: {
            a: q.answers[0]||"", aImg:"",
            b: q.answers[1]||"", bImg:"",
            c: q.answers[2]||"", cImg:"",
            d: q.answers[3]||"", dImg:""
          },
          dap_an_dung: correctKey
        });
        success++;
      } catch {
        fail++;
      }
    }
    importStatus.textContent = `Đã lưu ${success} câu hỏi. ${fail ? 'Lỗi: '+fail : ''}`;
  }
  reader.readAsText(file);
};

// ==== Thêm thủ công câu hỏi ====
document.getElementById('manualForm').onsubmit = async function(e) {
  e.preventDefault();
  manualStatus.textContent = 'Đang lưu...';
  const subjectId = manualSubject.value;
  const question = document.getElementById('manualQuestion').value.trim();
  const a = document.getElementById('manualA').value.trim();
  const b = document.getElementById('manualB').value.trim();
  const c = document.getElementById('manualC').value.trim();
  const d = document.getElementById('manualD').value.trim();
  const correct = document.getElementById('manualCorrect').value;
  if(!subjectId || !question || !a || !b || !c || !d || !correct) { manualStatus.textContent = 'Điền đủ thông tin!'; return; }
  try {
    await db.collection("cau_hoi").add({
      mon_hoc_id: subjectId,
      noi_dung: question,
      noi_dung_img: "",
      lua_chon: { a, aImg:"", b, bImg:"", c, cImg:"", d, dImg:"" },
      dap_an_dung: correct
    });
    manualStatus.textContent = 'Thêm thành công!';
    document.getElementById('manualForm').reset();
  } catch {
    manualStatus.textContent = 'Lỗi!';
  }
};

// ==== Check xác thực ====
auth.onAuthStateChanged(function(user){
  if(!user) location.href = 'admin.html';
});
</script>
</body>
</html>
