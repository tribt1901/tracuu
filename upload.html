
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
      apiKey: "AIzaSyCfv6NMe_2oGLaXxt-uA0v7emWcxbHgI-M",
      authDomain: "webtracuu-7f09a.firebaseapp.com",
      projectId: "webtracuu-7f09a",
      storageBucket: "webtracuu-7f09a.appspot.com",
      messagingSenderId: "616666801965",
      appId: "1:616666801965:web:ca5956d55f83969f6b55a4",
      measurementId: "G-FZ1PHD50BP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const subjectsRef = collection(db, "mon_hoc");
    const questionsRef = collection(db, "cau_hoi");

    const ADMIN_PASSWORD = "123456";

    window.onload = async function () {
      const select = document.getElementById("subjectSelect");
      const snapshot = await getDocs(subjectsRef);
      snapshot.forEach(doc => {
        const data = doc.data();
        const option = document.createElement("option");
        option.value = data.ten_mon;
        option.textContent = data.ten_mon;
        select.appendChild(option);
      });
    };

    window.submitQuestion = async function () {
      const password = document.getElementById("adminPassword").value.trim();
      if (password !== ADMIN_PASSWORD) {
        alert("❌ Sai mật mã. Không thể upload câu hỏi.");
        return;
      }

      const subject = document.getElementById("subjectSelect").value;
      const question = document.getElementById("questionContent").value.trim();
      const answer = document.getElementById("correctAnswer").value.trim();

      if (!subject || !question || !answer) {
        alert("⚠️ Vui lòng nhập đầy đủ thông tin.");
        return;
      }

      await addDoc(questionsRef, {
        mon_hoc: subject,
        noi_dung: question,
        dap_an: answer
      });

      alert("✅ Câu hỏi đã được upload thành công.");
      document.getElementById("questionForm").reset();
    };
  </script>
</head>
<body class="bg-light">
<!-- Thanh menu -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class='container py-4'>
  <h2 class='mb-3'>📤 Upload câu hỏi</h2>
  <form id="questionForm" onsubmit="event.preventDefault(); submitQuestion();">
    <div class="mb-3">
      <label class="form-label">🔐 Mật mã quản trị</label>
      <input type="password" id="adminPassword" class="form-control" placeholder="Nhập mật mã để xác thực">
    </div>
    <div class="mb-3">
      <label class="form-label">📘 Chọn môn học</label>
      <select id="subjectSelect" class="form-select" required>
        <option value="">-- Chọn môn học --</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">📝 Nội dung câu hỏi (hỗ trợ MathML)</label>
      <textarea id="questionContent" class="form-control" rows="6" placeholder="Nhập nội dung câu hỏi..." required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">✅ Đáp án đúng</label>
      <input type="text" id="correctAnswer" class="form-control" placeholder="Nhập đáp án đúng" required>
    </div>
    <button class="btn btn-primary">Tải lên</button>
  </form>
</div>
</body>
</html>
