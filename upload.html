<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      setDoc,
      doc,
      addDoc,
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD6Rop3ru_hgJ_9mEBqlOtT-7G-9g3n7Bc",
      authDomain: "tracuu-io.firebaseapp.com",
      projectId: "tracuu-io",
      storageBucket: "tracuu-io.appspot.com",
      messagingSenderId: "1087077682192",
      appId: "1:1087077682192:web:39b63b54b9bb6e2fc09638",
      measurementId: "G-8XFL5D1EGH",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const cleanMathHtmlToText = (html) => {
      const div = document.createElement("div");
      div.innerHTML = html;
      div.querySelectorAll("span.math-tex").forEach((el) => {
        el.outerHTML = el.textContent || el.innerText;
      });
      return div.innerText.trim().replace(/\s+/g, " ");
    };

    const inputFile = document.getElementById("htmlFileInput");
    const previewDiv = document.getElementById("preview");
    const saveImportBtn = document.getElementById("saveImport");
    const manualQuestionBtn = document.getElementById("addManual");
    const uploadSyllabusBtn = document.getElementById("uploadSyllabus");

    const previewQuestions = [];
    const existSet = new Set();

    const isDuplicateInSet = (question, set) => {
      const key = JSON.stringify({
        noi_dung: question.noi_dung,
        dap_an_dung: question.dap_an_dung,
        lua_chon: question.lua_chon,
      });
      if (set.has(key)) return true;
      set.add(key);
      return false;
    };

    inputFile.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (event) => {
        const html = event.target.result;
        const parser = new DOMParser();
        const docParsed = parser.parseFromString(html, "text/html");

        const questions = docParsed.querySelectorAll(".que.multichoice");
        previewDiv.innerHTML = "";
        previewQuestions.length = 0;
        existSet.clear();

        questions.forEach((q, index) => {
          const questionHTML = q.querySelector(".qtext")?.innerHTML || "";
          const noi_dung = cleanMathHtmlToText(questionHTML);

          const answers = [...q.querySelectorAll(".answer > div")];
          const lua_chon = answers.map((ans) => cleanMathHtmlToText(ans.innerHTML));

          const dap_an_dung_index = answers.findIndex((ans) =>
            ans.innerHTML.includes("rue") // "True" for correct in Moodle export
          );

          const dap_an_dung = lua_chon[dap_an_dung_index];

          const questionObj = { noi_dung, lua_chon, dap_an_dung };

          const isDuplicate = isDuplicateInSet(questionObj, existSet);

          const p = document.createElement("p");
          p.innerHTML = `<strong>Câu ${index + 1}:</strong> ${noi_dung} <br> → Đáp án đúng: ${dap_an_dung} ${
            isDuplicate ? "<span style='color:red'>(TRÙNG)</span>" : ""
          }`;

          previewDiv.appendChild(p);

          if (!isDuplicate) previewQuestions.push(questionObj);
        });
      };
      reader.readAsText(file);
    });

    saveImportBtn.addEventListener("click", async () => {
      const pass = prompt("Nhập mã bảo mật");
      const docRef = doc(db, "config", "security_code");
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists() || docSnap.data().code !== pass) {
        alert("Sai mã bảo mật!");
        return;
      }

      for (const question of previewQuestions) {
        await addDoc(collection(db, "questions"), question);
      }
      alert("Đã lưu thành công!");
    });

    manualQuestionBtn.addEventListener("click", async () => {
      const noi_dung = prompt("Nhập nội dung câu hỏi");
      const dap_an_dung = prompt("Nhập đáp án đúng");
      const lua_chon = [];
      for (let i = 1; i <= 4; i++) {
        const val = prompt(`Đáp án ${i}:`);
        if (val) lua_chon.push(val);
      }

      const pass = prompt("Nhập mã bảo mật");
      const docRef = doc(db, "config", "security_code");
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists() || docSnap.data().code !== pass) {
        alert("Sai mã bảo mật!");
        return;
      }

      await addDoc(collection(db, "questions"), {
        noi_dung,
        lua_chon,
        dap_an_dung,
      });
      alert("Đã thêm câu hỏi thủ công!");
    });

    uploadSyllabusBtn.addEventListener("click", async () => {
      const mon = prompt("Tên môn học:");
      const link = prompt("Link file đề cương:");

      const pass = prompt("Nhập mã bảo mật");
      const docRef = doc(db, "config", "security_code");
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists() || docSnap.data().code !== pass) {
        alert("Sai mã bảo mật!");
        return;
      }

      await addDoc(collection(db, "syllabus"), { mon, link });
      alert("Đã lưu đề cương!");
    });
  </script>
</head>
<body>
  <h1>Upload dữ liệu</h1>
  <input type="file" id="htmlFileInput" accept=".html" />
  <button id="saveImport">Lưu vào Firebase</button>
  <button id="addManual">Thêm câu thủ công</button>
  <button id="uploadSyllabus">Upload đề cương</button>
  <div id="preview"></div>
</body>
</html>
