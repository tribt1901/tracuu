<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload File</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      padding-top: 60px;
      background-color: #f8f9fa;
    }
    .online-counter-box {
      background-color: #e8f5e9;
      color: #2e7d32;
      border-left: 5px solid #4caf50;
      padding: 10px 16px;
      margin: 20px auto 10px;
      border-radius: 6px;
      max-width: 600px;
      font-weight: 500;
    }
    .upload-section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/">Trang Chủ</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link" href="/outline">Đề cương</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hiển thị số người đang online -->
<div class="online-counter-box text-center">
  🟢 Hiện có <span id="online-counter">0</span> người đang truy cập hệ thống.
</div>

<div class="container">
  <div class="upload-section mt-4">
    <h3 class="text-center mb-4">Tải lên tệp PDF</h3>
    <form id="upload-form">
      <div class="mb-3">
        <label for="pdfFile" class="form-label">Chọn tệp PDF</label>
        <input class="form-control" type="file" id="pdfFile" accept=".pdf" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Tải lên</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, onDisconnect, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
    authDomain: "tracuu-d3ee9.firebaseapp.com",
    projectId: "tracuu-d3ee9",
    storageBucket: "tracuu-d3ee9.appspot.com",
    messagingSenderId: "593568604435",
    appId: "1:593568604435:web:9a5145457a8ee734143ae6",
    measurementId: "G-R0M6Y502NP"
  };

  const app = initializeApp(firebaseConfig);
  const rtdb = getDatabase(app, "https://tracuu-d3ee9-default-rtdb.asia-southeast1.firebasedatabase.app");

  const onlineCounterEl = document.getElementById('online-counter');
  const connectionsRef = ref(rtdb, 'connections');
  const myConnectionRef = push(connectionsRef);
  onDisconnect(myConnectionRef).remove();
  set(myConnectionRef, true);
  onValue(connectionsRef, (snapshot) => {
    let count = 0;
    if (snapshot.exists() && typeof snapshot.val() === 'object') {
      count = Object.keys(snapshot.val()).length;
    }
    onlineCounterEl.textContent = count;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
