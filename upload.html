<head>
  <meta charset="utf-8"/>
  <title>Upload Dữ Liệu</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { padding-top: 70px; }
    .section { display: none; }
    #subjectList {max-height: 300px;overflow-y: auto;border: 1px solid #ddd;border-radius: 5px;padding: 10px 5px;background: #fafbfc;}
    .fw-medium { font-weight: 500; }
    .img-preview, .img-preview-ans { max-width: 120px; max-height: 70px; display: inline-block; margin-top: 6px; vertical-align: middle;}
    .img-preview-ans { max-width: 70px; max-height: 40px; }
    .img-upload-btn { margin-top: 3px; }
    .remove-img-btn { margin-left: 6px; color: red; border: none; background: none; }
    .subject-scroll-select {
      max-height: 240px !important;
      overflow-y: auto !important;
    }
    #importHtmlResultQContainer {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 12px;
      background: #fafbfc;
    }
    #importHtmlResultQ .import-question { margin-bottom: 1.5em; }
    #importHtmlResultQ .import-answer { margin-left: 2em; }
    #importHtmlResultQ .import-answer-correct { color: #198754; font-weight: bold; }
    #importHtmlResultQ .import-duplicate { color: #c00; }
    #importHtmlResultQ { font-size:1.05em; }
    @media (max-width: 600px) {
      .section { max-height: 320px; }
      #importHtmlResultQContainer { max-height: 210px;}
    }
  </style>
  <link rel="icon" href="data:,">
  <script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="/">📥 Upload Dữ Liệu</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/outline">Đề Cương</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <h3 class="mb-4">Chọn loại upload:</h3>
    <select class="form-select mb-4" id="uploadType">
      <option value="question">Upload Câu hỏi</option>
      <option value="outline">Upload Đề cương</option>
    </select>
    <!-- Upload Câu hỏi Section -->
    <div id="uploadQuestionSection" class="section">
      <h5 class="mb-3">Upload Câu hỏi</h5>
      <div class="mb-3">
        <label class="form-label">Chọn cách nhập</label>
        <select class="form-select" id="questionInputType">
          <option value="">-- Chọn phương thức nhập --</option>
          <option value="html">Nhập từ file HTML của Moodle</option>
          <option value="manual">Thêm thủ công</option>
        </select>
      </div>
      <div id="questionSecuritySection" class="mb-3" style="display:none;">
        <label class="form-label">Nhập mã bảo mật</label>
        <input class="form-control" type="password" id="securityCodeQ" placeholder="Mã bảo mật">
        <div id="securityQError" class="text-danger mt-1" style="display:none;">Mã bảo mật không đúng.</div>
      </div>
      <div id="questionMainSection" style="display:none;">
        <div class="mb-3">
          <label class="form-label">Chọn môn học</label>
          <select class="form-select subject-scroll-select" id="subjectDropdownQ"></select>
        </div>
        <!-- Nhập từ HTML -->
        <div id="questionHtmlSection" style="display:none;">
          <h5 class="mb-2">Nhập câu hỏi từ file HTML Moodle</h5>
          <input type="file" id="importHtmlInputQ" accept=".html,.htm" class="form-control mb-2" style="max-width:350px;">
          <div id="importHtmlResultQContainer">
            <div id="importHtmlResultQ" class="mt-3"></div>
          </div>
          <button class="btn btn-success mt-2" id="saveImportBtnQ" style="display:none;">💾 Lưu vào CSDL</button>
        </div>
        <!-- Thêm thủ công -->
        <div id="questionManualSection" style="display:none;">
          <h5>Thêm câu hỏi thủ công</h5>
          <form id="manualFormQ" autocomplete="off">
            <textarea class="form-control mb-2" id="questionTextQ" placeholder="Nội dung câu hỏi (hỗ trợ MathJax)" required rows="3"></textarea>
            <div>
              <input type="file" accept="image/*" id="questionImageInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:260px;">
              <img id="questionImgPreviewQ" class="img-preview" style="display:none"/>
              <button type="button" class="remove-img-btn" id="removeQuestionImgBtnQ" style="display:none;">✖</button>
            </div>
            <div class="answer-input-group mb-2">
              <label for="answerAQ" class="form-label mb-1">Đáp án a</label>
              <input class="form-control" id="answerAQ" placeholder="Đáp án a" required type="text"/>
              <input type="file" accept="image/*" id="answerAImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
              <img id="answerAImgPreviewQ" class="img-preview-ans" style="display:none"/>
              <button type="button" class="remove-img-btn" id="removeAImgBtnQ" style="display:none;">✖</button>
            </div>
            <div class="answer-input-group mb-2">
              <label for="answerBQ" class="form-label mb-1">Đáp án b</label>
              <input class="form-control" id="answerBQ" placeholder="Đáp án b" required type="text"/>
              <input type="file" accept="image/*" id="answerBImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
              <img id="answerBImgPreviewQ" class="img-preview-ans" style="display:none"/>
              <button type="button" class="remove-img-btn" id="removeBImgBtnQ" style="display:none;">✖</button>
            </div>
            <div class="answer-input-group mb-2">
              <label for="answerCQ" class="form-label mb-1">Đáp án c</label>
              <input class="form-control" id="answerCQ" placeholder="Đáp án c" required type="text"/>
              <input type="file" accept="image/*" id="answerCImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
              <img id="answerCImgPreviewQ" class="img-preview-ans" style="display:none"/>
              <button type="button" class="remove-img-btn" id="removeCImgBtnQ" style="display:none;">✖</button>
            </div>
            <div class="answer-input-group mb-2">
              <label for="answerDQ" class="form-label mb-1">Đáp án d</label>
              <input class="form-control" id="answerDQ" placeholder="Đáp án d" required type="text"/>
              <input type="file" accept="image/*" id="answerDImgInputQ" class="form-control form-control-sm img-upload-btn" style="max-width:220px;">
              <img id="answerDImgPreviewQ" class="img-preview-ans" style="display:none"/>
              <button type="button" class="remove-img-btn" id="removeDImgBtnQ" style="display:none;">✖</button>
            </div>
            <select class="form-select mb-2" id="correctAnswerDropdownQ" required>
              <option value="">Chọn đáp án đúng</option>
              <option value="a">a</option>
              <option value="b">b</option>
              <option value="c">c</option>
              <option value="d">d</option>
            </select>
            <button type="submit" class="btn btn-success" id="submitQuestionBtnQ">Thêm câu hỏi</button>
          </form>
        </div>
      </div>
    </div>
    <!-- Upload Đề cương Section -->
    <div id="uploadOutlineSection" class="section">
      <h5 class="mb-3">Upload Đề cương</h5>
      <div class="mb-3">
        <label class="form-label">Nhập mã bảo mật</label>
        <input class="form-control" type="password" id="securityCodeOutline" placeholder="Mã bảo mật">
        <div id="securityOutlineError" class="text-danger mt-1" style="display:none;">Mã bảo mật không đúng.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Chọn môn học</label>
        <select class="form-select subject-scroll-select" id="subjectDropdownO"></select>
      </div>
      <div class="mb-3">
        <label class="form-label">Tài liệu này của? (Không bắt buộc)</label>
        <input class="form-control" type="text" id="ownerOutline" placeholder="Tên người/nhóm/bộ môn...">
      </div>
      <div class="mb-3">
        <label class="form-label">Chọn file đề cương</label>
        <input type="file" class="form-control" id="outlineFileInput" accept=".pdf,.doc,.docx,.txt,.html,.htm,.zip">
      </div>
      <button class="btn btn-success" id="submitOutlineBtn">Upload</button>
      <div id="outlineUploadResult" class="mt-2"></div>
    </div>
  </div>
</body>
