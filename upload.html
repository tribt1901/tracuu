<head>
  <meta charset="utf-8"/>
  <title>Upload Dữ Liệu</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { padding-top: 70px; }
    .section { display: none; }
    #subjectList {max-height: 300px;overflow-y: auto;border: 1px solid #ddd;border-radius: 5px;padding: 10px 5px;background: #fafbfc;}
    .fw-medium { font-weight: 500; }
    .img-preview, .img-preview-ans { max-width: 120px; max-height: 70px; display: inline-block; margin-top: 6px; vertical-align: middle;}
    .img-preview-ans { max-width: 70px; max-height: 40px; }
    .img-upload-btn { margin-top: 3px; }
    .remove-img-btn { margin-left: 6px; color: red; border: none; background: none; }
    .subject-scroll-select {
      max-height: 240px !important;
      overflow-y: auto !important;
    }
    #importHtmlResultQContainer {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 12px;
      background: #fafbfc;
    }
    #importHtmlResultQ .import-question { margin-bottom: 1.5em; }
    #importHtmlResultQ .import-answer { margin-left: 2em; }
    #importHtmlResultQ .import-answer-correct { color: #198754; font-weight: bold; }
    #importHtmlResultQ .import-duplicate { color: #c00; }
    #importHtmlResultQ { font-size:1.05em; }
    @media (max-width: 600px) {
      .section { max-height: 320px; }
      #importHtmlResultQContainer { max-height: 210px;}
    }
  </style>
