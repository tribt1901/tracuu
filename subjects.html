<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Quản trị hệ thống</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .mode-section { display: none; }
    #logoutBtn { margin: 1rem 0; }
    body { padding-top: 70px; }
    #subjectList {max-height: 300px;overflow-y: auto;border: 1px solid #ddd;border-radius: 5px;padding: 10px 5px;background: #fafbfc;}
    .btn-delete-img { margin-left: 10px; margin-top: 5px; }
    #importHtmlResult .import-question { margin-bottom: 1.5em; }
    #importHtmlResult .import-answer { margin-left: 2em; }
    #importHtmlResult .import-answer-correct { color: #198754; font-weight: bold; }
    #importHtmlResult { font-size:1.05em; }
  </style>
  <script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  <button class="btn btn-sm btn-danger float-end" id="logoutBtn">🚪 Đăng xuất</button>
  <h3 class="mb-4">Chọn chế độ quản trị:</h3>
  <select class="form-select mb-4" id="modeSelect">
    <option value="subject">Quản trị Môn học</option>
    <option value="question">Quản trị Câu hỏi</option>
  </select>
  <div class="mode-section" id="subjectSection">
    <h4>➕ Thêm môn học</h4>
    <form class="mb-3" id="subjectForm">
      <input class="form-control mb-2" id="subjectName" placeholder="Tên môn học" required type="text"/>
      <button class="btn btn-success">Thêm</button>
    </form>
    <div id="subjectList"></div>
  </div>
  <div class="mode-section" id="questionSection">
    <h4>🧠 Quản trị câu hỏi</h4>
    <div class="mb-3" id="questionModeChoice">
      <button class="btn btn-primary me-2" id="importHtmlBtn">Nhập từ file HTML</button>
      <button class="btn btn-success" id="manualBtn">Thêm thủ công</button>
    </div>
    <div id="importHtmlSection" style="display:none;">
      <h5>Nhập câu hỏi từ file HTML Moodle</h5>
      <!-- Bắt buộc phải chọn môn học trước khi chọn file -->
      <select class="form-select mb-2" id="subjectDropdownImport" style="max-width:350px;">
        <option value="">-- Chọn môn học để lưu --</option>
      </select>
      <input type="file" id="importHtmlInput" accept=".html,.htm" class="form-control mb-2" style="max-width:350px;" disabled>
      <div id="importHtmlResult" class="mt-3"></div>
      <button class="btn btn-success mt-2" id="saveImportBtn" style="display:none;">💾 Lưu vào CSDL</button>
      <button class="btn btn-secondary mt-2" id="backToChoice1">← Quay lại</button>
    </div>
    <div id="manualSection" style="display:none;">
      <h5>Thêm câu hỏi thủ công</h5>
      <form id="questionForm" autocomplete="off">
        <select class="form-select mb-2" id="subjectDropdown"></select>
        <textarea class="form-control mb-2" id="questionText" placeholder="Nội dung câu hỏi (hỗ trợ MathJax)" required rows="3"></textarea>
        <div class="answer-input-group mb-2">
          <label for="answerA" class="form-label mb-1">Đáp án a</label>
          <input class="form-control" id="answerA" placeholder="Đáp án a" required type="text"/>
        </div>
        <div class="answer-input-group mb-2">
          <label for="answerB" class="form-label mb-1">Đáp án b</label>
          <input class="form-control" id="answerB" placeholder="Đáp án b" required type="text"/>
        </div>
        <div class="answer-input-group mb-2">
          <label for="answerC" class="form-label mb-1">Đáp án c</label>
          <input class="form-control" id="answerC" placeholder="Đáp án c" required type="text"/>
        </div>
        <div class="answer-input-group mb-2">
          <label for="answerD" class="form-label mb-1">Đáp án d</label>
          <input class="form-control" id="answerD" placeholder="Đáp án d" required type="text"/>
        </div>
        <select class="form-select mb-2" id="correctAnswerDropdown" required>
          <option value="">Chọn đáp án đúng</option>
          <option value="a">a</option>
          <option value="b">b</option>
          <option value="c">c</option>
          <option value="d">d</option>
        </select>
        <button type="submit" class="btn btn-success" id="submitQuestionBtn">Thêm câu hỏi</button>
        <button type="button" class="btn btn-primary d-none" id="updateQuestionBtn">Lưu sửa đổi</button>
      </form>
      <div id="questionList" style="max-height:400px; overflow-y:auto;"></div>
      <button class="btn btn-secondary mt-3" id="backToChoice2">← Quay lại</button>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

document.addEventListener("DOMContentLoaded", () => {
  const firebaseConfig = {
    apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
    authDomain: "tracuu-d3ee9.firebaseapp.com",
    projectId: "tracuu-d3ee9",
    storageBucket: "tracuu-d3ee9.appspot.com",
    messagingSenderId: "593568604435",
    appId: "1:593568604435:web:9a5145457a8ee734143ae6",
    measurementId: "G-R0M6Y502NP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const subjectForm = document.getElementById("subjectForm");
  const subjectList = document.getElementById("subjectList");
  const questionForm = document.getElementById("questionForm");
  const questionList = document.getElementById("questionList");
  const subjectDropdown = document.getElementById("subjectDropdown");
  const submitQuestionBtn = document.getElementById("submitQuestionBtn");
  const updateQuestionBtn = document.getElementById("updateQuestionBtn");

  let editingQuestionId = null;

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "admin";
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => {
      window.location.href = "admin";
    });
  });

  // Giao diện quản trị câu hỏi mới
  const questionModeChoice = document.getElementById("questionModeChoice");
  const importHtmlSection = document.getElementById("importHtmlSection");
  const manualSection = document.getElementById("manualSection");
  const importHtmlBtn = document.getElementById("importHtmlBtn");
  const manualBtn = document.getElementById("manualBtn");
  const importHtmlInput = document.getElementById("importHtmlInput");
  const importHtmlResult = document.getElementById("importHtmlResult");
  const backToChoice1 = document.getElementById("backToChoice1");
  const backToChoice2 = document.getElementById("backToChoice2");
  const saveImportBtn = document.getElementById("saveImportBtn");
  const subjectDropdownImport = document.getElementById("subjectDropdownImport");

  // ===== Chọn môn học cho import =====
  async function loadSubjectsDropdownImport() {
    subjectDropdownImport.innerHTML = `<option value="">-- Chọn môn học để lưu --</option>`;
    const snapshot = await getDocs(collection(db, "mon_hoc"));
    snapshot.forEach(docSnap => {
      const option = document.createElement("option");
      option.value = docSnap.id;
      option.textContent = docSnap.data().ten_mon;
      subjectDropdownImport.appendChild(option);
    });
  }

  function showQuestionChoice() {
    questionModeChoice.style.display = "block";
    importHtmlSection.style.display = "none";
    manualSection.style.display = "none";
  }
  importHtmlBtn.onclick = () => {
    questionModeChoice.style.display = "none";
    importHtmlSection.style.display = "block";
    manualSection.style.display = "none";
    importHtmlResult.innerHTML = "";
    importHtmlInput.value = "";
    saveImportBtn.style.display = "none";
    loadSubjectsDropdownImport();
    importHtmlInput.disabled = true;
  };
  manualBtn.onclick = () => {
    questionModeChoice.style.display = "none";
    importHtmlSection.style.display = "none";
    manualSection.style.display = "block";
  };
  backToChoice1.onclick = backToChoice2.onclick = () => {
    showQuestionChoice();
  };

  // Bật/tắt file input theo chọn môn học
  subjectDropdownImport.addEventListener("change", function() {
    importHtmlInput.value = "";
    importHtmlResult.innerHTML = "";
    saveImportBtn.style.display = "none";
    importHtmlInput.disabled = !subjectDropdownImport.value;
  });

  function switchMode() {
    const mode = document.getElementById("modeSelect").value;
    document.querySelectorAll(".mode-section").forEach(el => el.style.display = "none");
    if (mode === "subject") {
      document.getElementById("subjectSection").style.display = "block";
      loadSubjects();
    } else if (mode === "question") {
      document.getElementById("questionSection").style.display = "block";
      showQuestionChoice();
      loadSubjectsDropdown();
      loadQuestions();
    }
  }
  document.getElementById("modeSelect").addEventListener("change", switchMode);
  switchMode();

  // Subject CRUD
  subjectForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("subjectName").value.trim();
    if (!name) return;
    await addDoc(collection(db, "mon_hoc"), { ten_mon: name });
    subjectForm.reset();
    loadSubjects();
  });

  async function loadSubjects() {
    subjectList.innerHTML = "";
    const snapshot = await getDocs(collection(db, "mon_hoc"));
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const div = document.createElement("div");
      div.className = "d-flex justify-content-between align-items-center border p-2 mb-2";
      div.innerHTML = `
        <span>${data.ten_mon}</span>
        <div>
          <button class="btn btn-sm btn-warning me-2">Sửa</button>
          <button class="btn btn-sm btn-danger">Xóa</button>
        </div>
      `;
      div.querySelector(".btn-warning").onclick = async () => {
        const newName = prompt("Nhập tên mới:", data.ten_mon);
        if (newName) {
          await updateDoc(doc(db, "mon_hoc", docSnap.id), { ten_mon: newName });
          loadSubjects();
        }
      };
      div.querySelector(".btn-danger").onclick = async () => {
        if (confirm("Bạn có chắc muốn xóa môn học này?")) {
          await deleteDoc(doc(db, "mon_hoc", docSnap.id));
          loadSubjects();
        }
      };
      subjectList.appendChild(div);
    });
  }

  // Question CRUD
  questionForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (editingQuestionId) {
      // ...code updateQuestion ở đây nếu cần
    } else {
      const subjectId = subjectDropdown.value;
      const questionText = document.getElementById("questionText").value.trim();
      const answerA = document.getElementById("answerA").value.trim();
      const answerB = document.getElementById("answerB").value.trim();
      const answerC = document.getElementById("answerC").value.trim();
      const answerD = document.getElementById("answerD").value.trim();
      const correctAnswer = document.getElementById("correctAnswerDropdown").value;
      if (!subjectId || !questionText || !answerA || !answerB || !answerC || !answerD || !correctAnswer) return;
      await addDoc(collection(db, "cau_hoi"), {
        mon_hoc_id: subjectId,
        noi_dung: questionText,
        noi_dung_img: "",
        lua_chon: {
          a: answerA, aImg:"",
          b: answerB, bImg:"",
          c: answerC, cImg:"",
          d: answerD, dImg:""
        },
        dap_an_dung: correctAnswer
      });
      questionForm.reset();
      loadQuestions();
    }
  });

  async function loadSubjectsDropdown() {
    subjectDropdown.innerHTML = "";
    const snapshot = await getDocs(collection(db, "mon_hoc"));
    snapshot.forEach(docSnap => {
      const option = document.createElement("option");
      option.value = docSnap.id;
      option.textContent = docSnap.data().ten_mon;
      subjectDropdown.appendChild(option);
    });
  }

  async function loadQuestions() {
    questionList.innerHTML = "";
    const snapshot = await getDocs(collection(db, "cau_hoi"));
    const subjects = {};
    const subjectSnap = await getDocs(collection(db, "mon_hoc"));
    subjectSnap.forEach(doc => subjects[doc.id] = doc.data().ten_mon);

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const div = document.createElement("div");
      div.className = "border p-2 mb-2";
      div.innerHTML = `
        <strong>Môn học:</strong> ${subjects[data.mon_hoc_id] || "?"}<br>
        <strong>Câu hỏi:</strong> ${data.noi_dung}
        <br>
        <ul class="list-group list-group-flush mt-2">
          ${["a", "b", "c", "d"].map(k => {
            const val = data.lua_chon?.[k] || "";
            const isCorrect = data.dap_an_dung === k;
            return `<li class="list-group-item ${isCorrect ? 'text-success fw-bold bg-light' : ''}">
              ${isCorrect ? '✅ ' : ''}${k}. ${val}
            </li>`;
          }).join("")}
        </ul>
      `;
      questionList.appendChild(div);
      if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
    });
  }

  // ==== Parse HTML Moodle quiz khi import ====
  let importedQuestions = [];
  importHtmlInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
      const html = event.target.result;
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      importedQuestions = [];
      doc.querySelectorAll('.que').forEach(q => {
        // Lấy nội dung câu hỏi (chỉ nội dung - KHÔNG lấy tiêu đề/số thứ tự)
        let questionText = q.querySelector('.qtext')?.innerText.trim() || '';
        const answerNodes = q.querySelectorAll('.answer > div');
        const answers = [];
        let correct = '';
        let correctIdx = -1;
        answerNodes.forEach((ans, idx) => {
          let ansText = ans.querySelector('.flex-fill, div.ml-1')?.innerText.trim() || '';
          answers.push(ansText);
          if (ans.classList.contains('correct')) {
            correct = ansText;
            correctIdx = idx;
          }
        });
        importedQuestions.push({ questionText, answers, correct, correctIdx });
      });

      // Hiển thị kết quả
      let htmlResult = `<div class="fw-bold mb-2">Kết quả trích xuất (${importedQuestions.length} câu):</div>`;
      importedQuestions.forEach((q, idx) => {
        htmlResult += `<div class="import-question">
          <span>${q.questionText}</span><br>`;
        q.answers.forEach((a,i) => {
          htmlResult += `<div class="import-answer${i===q.correctIdx?' import-answer-correct':''}">
            ${String.fromCharCode(97+i)}. ${a} ${i===q.correctIdx?'<span>(Đáp án đúng)</span>':''}
          </div>`;
        });
        htmlResult += `</div>`;
      });
      importHtmlResult.innerHTML = htmlResult;
      saveImportBtn.style.display = importedQuestions.length>0 ? "inline-block" : "none";
      if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
    }
    reader.readAsText(file);
  });

  // ===== Lưu vào DB khi bấm nút =====
  saveImportBtn.onclick = async function() {
    const mon_hoc_id = subjectDropdownImport.value;
    if (!mon_hoc_id) { alert("Vui lòng chọn môn học để lưu!"); return; }
    if (!importedQuestions.length) { alert("Chưa có dữ liệu để lưu!"); return; }
    saveImportBtn.disabled = true;
    let success = 0, fail = 0;
    for (let q of importedQuestions) {
      let correctIndex = q.correctIdx;
      let correctKey = ['a','b','c','d'][correctIndex] || '';
      await addDoc(collection(db, "cau_hoi"), {
        mon_hoc_id,
        noi_dung: q.questionText,
        noi_dung_img: "",
        lua_chon: {
          a: q.answers[0]||"", aImg:"",
          b: q.answers[1]||"", bImg:"",
          c: q.answers[2]||"", cImg:"",
          d: q.answers[3]||"", dImg:""
        },
        dap_an_dung: correctKey
      }).then(()=>success++).catch(()=>fail++);
    }
    alert(`Đã lưu ${success} câu hỏi${fail>0?`, lỗi ${fail} câu`:''}.`);
    saveImportBtn.disabled = false;
  };
});
</script>
</body>
</html>
