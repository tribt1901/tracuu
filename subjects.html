    /* MathJax content */
    .mathjax-content { font-size: 1.1em; }

<script type="module">
// === Firebase import ===
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ==== CÁC BIẾN TOÀN CỤC ====
let allSyllabusRaw = [];
let currentEditSyllabusId = null;

// ==== Đăng xuất ====
const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6",
  measurementId: "G-R0M6Y502NP"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => { if (!user) location.href = "admin"; });
document.getElementById("logoutBtn").addEventListener("click", () => { signOut(auth).then(() => { location.href = "admin"; }); });

// ==== Upload file ====
async function uploadToDrive(file) {
  const formData = new FormData();
  formData.append('file', file);
  const response = await fetch('https://tracuu-app.hugo.io.vn/api/upload', { method: 'POST', body: formData });
  if (!response.ok) throw new Error('Upload file thất bại!');
  const result = await response.json();
  return result.url;
}

// ==== CRUD MÔN HỌC ====
const subjectForm = document.getElementById('subjectForm');
const subjectName = document.getElementById('subjectName');
const subjectList = document.getElementById('subjectList');
const syllabusSubjectFilterDropdown = document.getElementById('syllabusSubjectFilterDropdown');
const editSyllabusSubjectDropdown = document.getElementById('editSyllabusSubjectDropdown');

subjectForm.addEventListener("submit", async e => {
  e.preventDefault();
  if (!subjectName.value.trim()) return;
  await addDoc(collection(db, "mon_hoc"), { ten_mon: subjectName.value.trim() });
  subjectForm.reset();
  loadSubjects();
  loadSyllabusSubjectDropdowns();
});
async function loadSubjects() {
  subjectList.innerHTML = "";
  const snapshot = await getDocs(collection(db, "mon_hoc"));
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "d-flex justify-content-between align-items-center border p-2 mb-2";
    div.innerHTML = `<span>${data.ten_mon}</span>
      <div>
        <button class="btn btn-sm btn-warning me-2">Sửa</button>
        <button class="btn btn-sm btn-danger">Xóa</button>
      </div>`;
    div.querySelector(".btn-warning").onclick = async () => {
      const newName = prompt("Nhập tên mới:", data.ten_mon);
      if (newName) { await updateDoc(doc(db, "mon_hoc", docSnap.id), { ten_mon: newName }); loadSubjects(); loadSyllabusSubjectDropdowns(); }
    };
    div.querySelector(".btn-danger").onclick = async () => {
      if (confirm("Bạn có chắc muốn xóa môn học này?")) { await deleteDoc(doc(db, "mon_hoc", docSnap.id)); loadSubjects(); loadSyllabusSubjectDropdowns(); }
    };
    subjectList.appendChild(div);
  });
}
async function loadSyllabusSubjectDropdowns() {
  const snapshot = await getDocs(collection(db, "mon_hoc"));
  // For filter dropdown
  syllabusSubjectFilterDropdown.innerHTML = `<option value="">Tất cả môn học</option>`;
  snapshot.forEach(docSnap => {
    const option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    syllabusSubjectFilterDropdown.appendChild(option);
  });
  // For edit modal dropdown
  editSyllabusSubjectDropdown.innerHTML = "";
  snapshot.forEach(docSnap => {
    const option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    editSyllabusSubjectDropdown.appendChild(option);
  });
}

// ==== CHUYỂN CHẾ ĐỘ ====
const modeSelect = document.getElementById('modeSelect');
const subjectSection = document.getElementById('subjectSection');
const syllabusSection = document.getElementById('syllabusSection');
const questionSection = document.getElementById('questionSection');
const backToChoice1 = document.getElementById('backToChoice1');
const backToChoice2 = document.getElementById('backToChoice2');
const backToChoice3 = document.getElementById('backToChoice3');
function showChoice() {
  document.querySelectorAll(".mode-section").forEach(el => el.style.display = "none");
  if (modeSelect.value === "subject") {
    subjectSection.style.display = "block";
    loadSubjects();
  } else if (modeSelect.value === "syllabus") {
    syllabusSection.style.display = "block";
    refreshSyllabusList();
    loadSyllabusSubjectDropdowns();
  } else if (modeSelect.value === "question") {
    questionSection.style.display = "block";
    showQuestionChoice();
    loadSubjectsDropdown();
  }
  backToChoice1.classList.add("d-none");
  backToChoice2.classList.add("d-none");
  backToChoice3.classList.add("d-none");
}
modeSelect.addEventListener("change", showChoice);
backToChoice1.onclick = () => { showChoice(); };

// ==== CRUD ĐỀ CƯƠNG: DANH SÁCH, LỌC, TÌM KIẾM, SỬA, XÓA ====
const syllabusSearchInput = document.getElementById('syllabusSearchInput');
const syllabusListView = document.getElementById('syllabusListView');
async function refreshSyllabusList() {
  const snapshot = await getDocs(collection(db, "syllabus"));
  allSyllabusRaw = [];
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    data.id = docSnap.id;
    allSyllabusRaw.push(data);
  });
  renderSyllabusList();
}
function renderSyllabusList() {
  const filterSubject = syllabusSubjectFilterDropdown.value;
  const searchVal = syllabusSearchInput.value.trim().toLowerCase();
  let filtered = allSyllabusRaw;
  if (filterSubject) filtered = filtered.filter(s => s.mon_hoc_id === filterSubject);
  if (searchVal) filtered = filtered.filter(s =>
    (s.file_name||"").toLowerCase().includes(searchVal) ||
    (s.owner||"").toLowerCase().includes(searchVal)
  );
  let html = "";
  filtered.forEach(s => {
    html += `
      <div class="syllabus-list-item">
        <div><span class="fw-medium">Môn học:</span> ${(syllabusSubjectFilterDropdown.querySelector(`[value="${s.mon_hoc_id}"]`)||{}).textContent||"Không rõ"}</div>
        <div><span class="fw-medium">Tên file:</span> <a href="${s.file_url}" target="_blank">${s.file_name||""}</a></div>
        <div><span class="fw-medium">Chủ sở hữu:</span> ${s.owner || ""}</div>
        <div><span class="fw-medium">Ngày upload:</span> ${s.uploaded_at ? (new Date(s.uploaded_at)).toLocaleString() : ""}</div>

// Helper
function getDisplayableImgUrl(url) {
  if (!url) return "";
  let m = url.match(/https:\/\/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m) return "https://drive.google.com/thumbnail?id=" + m[1];
  m = url.match(/https:\/\/drive\.google\.com\/open\?id=([^&]+)/);
  if (m) return "https://drive.google.com/thumbnail?id=" + m[1];
  m = url.match(/https:\/\/drive\.google\.com\/thumbnail\?id=([^&]+)/);
  if (m) return url;
  if (url.includes("drive.google.com/uc?export=view&id=")) {
    const id = url.split("id=")[1];
    return "https://drive.google.com/thumbnail?id=" + id;
  }
  return url;
}

// ==== IMPORT HTML ====
// Thêm hàm chuẩn hóa toán học
function ensureMathDelimiters(text) {
  if (!text) return "";
  // Chuyển đổi [tex]...[/tex] thành $...$
  text = text.replace(/\[tex\]([\s\S]*?)\[\/tex\]/g, (_, expr) => `$${expr.trim()}$`);
  // Không động đến $...$, \(...\), \[...\]
  return text;
}

const subjectDropdownImport = document.getElementById("subjectDropdownImport");
const importHtmlInput = document.getElementById("importHtmlInput");
const importHtmlResult = document.getElementById("importHtmlResult");

subjectDropdownImport.addEventListener("change", function() {
  importHtmlInput.value = "";
  importHtmlResult.innerHTML = "";
  saveImportBtn.style.display = "none";
  importHtmlInput.disabled = !subjectDropdownImport.value;
});

importHtmlInput.addEventListener("change", async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const mon_hoc_id = subjectDropdownImport.value;
  if (!mon_hoc_id) {
    alert("Vui lòng chọn môn học để kiểm tra trùng lặp!");
    return;
  }
  const existSet = await getQuestionSetForSubject(mon_hoc_id);
  const reader = new FileReader();
  reader.onload = async function(event) {
    const html = event.target.result;
    const parser = new DOMParser();
    const docx = parser.parseFromString(html, "text/html");
    let importedQuestions = [];
    let rawQuestions = [];
    // === chuẩn hóa MathJax robust cho so khớp đáp án đúng ===
    function normalizeMathText(text) {
      return text
        .replace(/<[^>]*>/g, '')        // Remove HTML tags
        .replace(/\\\(|\\\)|\$\$|\$/g, '') // Remove MathJax markers
        .replace(/&nbsp;|\s+/g, '')     // Remove whitespace and &nbsp;
        .toLowerCase()
        .trim();
    }
    docx.querySelectorAll('.que').forEach(q => {
      let questionNode = q.querySelector('.qtext');
      let questionText = questionNode ? ensureMathDelimiters(questionNode.innerHTML.trim()) : '';
      const answerNodes = q.querySelectorAll('.answer > div');
      const answers = [];
      answerNodes.forEach((ans, idx) => {
        let ansNode = ans.querySelector('.flex-fill, div.ml-1');
        let ansText = ansNode ? ensureMathDelimiters(ansNode.innerHTML.trim()) : ensureMathDelimiters(ans.innerHTML.trim());
        answers.push(ansText);
      });
      // robust answer detection
      let correctIdx = -1;
      // 1. Theo class correct
      answerNodes.forEach((ans, idx) => {
        if (ans.classList.contains('correct')) correctIdx = idx;
      });
      // 2. Theo radio checked
      if (correctIdx === -1) {
        answerNodes.forEach((ans, idx) => {
          const radio = ans.querySelector('input[type="radio"],input[type="checkbox"]');
          if (radio && radio.checked) correctIdx = idx;
        });
      }
      // 3. So khớp với dòng .rightanswer (robust MathJax)
      if (correctIdx === -1) {
        let rightAnswerText = q.querySelector('.rightanswer')?.innerText || '';
        let match = rightAnswerText.match(/The correct answer is:\s*(.*)$/i);
        let correctValue = match ? normalizeMathText(match[1]) : '';
        answerNodes.forEach((ans, idx) => {
          let ansNode = ans.querySelector('.flex-fill, div.ml-1');
          let ansText = ansNode ? ansNode.innerHTML.trim() : ans.innerHTML.trim();
          if (normalizeMathText(ansText) === correctValue) correctIdx = idx;
        });
        // 4. Nếu không khớp tuyệt đối, thử so khớp "chứa"
        if (correctIdx === -1 && correctValue) {
          answerNodes.forEach((ans, idx) => {
            let ansNode = ans.querySelector('.flex-fill, div.ml-1');
            let ansText = ansNode ? ansNode.innerHTML.trim() : ans.innerHTML.trim();
            let ansNorm = normalizeMathText(ansText);
            if (ansNorm && correctValue && (ansNorm.includes(correctValue) || correctValue.includes(ansNorm))) correctIdx = idx;
          });
        }
      }
      let correctKey = ['a','b','c','d'][correctIdx] || '';
      let correct = answers[correctIdx] || '';
      rawQuestions.push({
        questionText, answers,
        correct, correctIdx, correctKey,
        lua_chon: {
          a: answers[0]||"", b: answers[1]||"", c: answers[2]||"", d: answers[3]||""
        }
      });
    });
    importedQuestions = rawQuestions.map(q => ({
      ...q,
      duplicate: q.correctKey && q.questionText
        ? isDuplicateInSet({
            noi_dung: q.questionText,
            dap_an_dung: q.correctKey,
            lua_chon: q.lua_chon
          }, existSet)
        : false
    }));
    let htmlResult = `<div class="fw-bold mb-2">Kết quả trích xuất (${importedQuestions.length} câu):</div>`;
    importedQuestions.forEach((q, idx) => {
      htmlResult += `<div class="import-question${q.duplicate ? ' import-duplicate' : ''}">
        <div><b>Câu ${idx+1}:</b> <span class="mathjax-content">${q.questionText}</span></div>`;
      q.answers.forEach((a,i) => {
        htmlResult += `<div class="import-answer${i===q.correctIdx?' import-answer-correct':''}">
          ${String.fromCharCode(97+i)}. <span class="mathjax-content">${a}</span> ${i===q.correctIdx?'<span>(Đáp án đúng)</span>':''}
        </div>`;
      });
      if(q.duplicate)
        htmlResult += `<span class="import-duplicate">[Trùng] Câu hỏi này sẽ không được lưu!</span>`;
      htmlResult += `</div>`;
    });
    importHtmlResult.innerHTML = htmlResult;
    saveImportBtn.style.display = importedQuestions.length>0 ? "inline-block" : "none";
    if (window.MathJax && window.MathJax.typesetPromise) {
      MathJax.typesetPromise(Array.from(importHtmlResult.querySelectorAll('.mathjax-content')));
    }
    window._importedQuestions = importedQuestions;
    window._importedMonHocId = mon_hoc_id;
  }
  reader.readAsText(file);
});

};

// ==== KIỂM TRA TRÙNG ====
async function getQuestionSetForSubject(mon_hoc_id) {
  const querySnap = await getDocs(query(collection(db, "cau_hoi"), where("mon_hoc_id", "==", mon_hoc_id)));
  const existSet = [];
  querySnap.forEach(docSnap => {
    const data = docSnap.data();
    existSet.push({
      noi_dung: (data.noi_dung || '').trim(),
      dap_an_dung: data.dap_an_dung,
      dap_an: (data.lua_chon && data.lua_chon[data.dap_an_dung]) ? data.lua_chon[data.dap_an_dung] : ''
    });
  });
  return existSet;
}
function isDuplicateInSet(question, existSet) {
  return existSet.some(
    x =>
      x.noi_dung === question.noi_dung.trim() &&
      x.dap_an_dung === question.dap_an_dung &&
      x.dap_an === question.lua_chon[question.dap_an_dung]
  );
}

  });
  editQuestionModal.style.display = "none";
  [editQuestionImgPreview, editRemoveQuestionImgBtn, editAnswerAImgPreview, editRemoveAImgBtn, editAnswerBImgPreview, editRemoveBImgBtn, editAnswerCImgPreview, editRemoveCImgBtn, editAnswerDImgPreview, editRemoveDImgBtn].forEach(el => { el.style.display = "none"; });
  editQuestionImgFile = editAnswerAImgFile = editAnswerBImgFile = editAnswerCImgFile = editAnswerDImgFile = null;
  editQuestionImgUrl = editAnswerAImgUrl = editAnswerBImgUrl = editAnswerCImgUrl = editAnswerDImgUrl = "";
  editQuestionImageInput.value = editAnswerAImgInput.value = editAnswerBImgInput.value = editAnswerCImgInput.value = editAnswerDImgInput.value = "";
  await refreshQuestionList();
};
async function showEditModal(qid) {
  const q = allQuestionsRaw.find(x=>x.id===qid);
  if(!q) return;
  currentEditQid = qid;
  await loadEditSubjectDropdown(q.mon_hoc_id);
  editQuestionText.value = q.noi_dung || "";
  editAnswerA.value = q.lua_chon?.a || "";
  editAnswerB.value = q.lua_chon?.b || "";
  editAnswerC.value = q.lua_chon?.c || "";
  editAnswerD.value = q.lua_chon?.d || "";
  editCorrectAnswerDropdown.value = q.dap_an_dung || "";
  editQuestionImgUrl = q.noi_dung_img || "";
  editAnswerAImgUrl = q.lua_chon?.aImg || "";
  editAnswerBImgUrl = q.lua_chon?.bImg || "";
  editAnswerCImgUrl = q.lua_chon?.cImg || "";
  editAnswerDImgUrl = q.lua_chon?.dImg || "";
  function previewEditImg(url, preview, btn) {
    if(url) { preview.src = url; preview.style.display = ""; btn.style.display = ""; }
    else { preview.style.display = "none"; btn.style.display = "none"; }
  }
  previewEditImg(editQuestionImgUrl, editQuestionImgPreview, editRemoveQuestionImgBtn);
  previewEditImg(editAnswerAImgUrl, editAnswerAImgPreview, editRemoveAImgBtn);
  previewEditImg(editAnswerBImgUrl, editAnswerBImgPreview, editRemoveBImgBtn);
  previewEditImg(editAnswerCImgUrl, editAnswerCImgPreview, editRemoveCImgBtn);
  previewEditImg(editAnswerDImgUrl, editAnswerDImgPreview, editRemoveDImgBtn);
  editQuestionModal.style.display = "flex";
}
window.showEditModal = showEditModal;
closeEditModal.onclick = ()=>{ editQuestionModal.style.display = "none"; };

// ==== CRUD CÂU HỎI: XÓA, DANH SÁCH, LỌC, TÌM KIẾM ====
async function refreshQuestionList() {
  await loadSubjectFilterDropdown();
  const questions = [];
  const snapshot = await getDocs(collection(db, "cau_hoi"));
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    data.id = docSnap.id;
    questions.push(data);
  });
  allQuestionsRaw = questions;
  renderQuestionList();
}
function renderQuestionList() {
  const searchVal = questionSearchInput.value.trim().toLowerCase();
  const monHocId = subjectFilterDropdown.value;
  let filtered = allQuestionsRaw;
  if (monHocId) filtered = filtered.filter(q => q.mon_hoc_id === monHocId);
  if (searchVal) filtered = filtered.filter(q => (q.noi_dung||"").toLowerCase().includes(searchVal));
  let html = "";
  filtered.forEach(q => {
    const qImgDisplay = getDisplayableImgUrl(q.noi_dung_img);
    html += `
      <div class="question-list-item">
        <div><span class="fw-medium">Môn học:</span> ${(subjectFilterDropdown.querySelector(`[value="${q.mon_hoc_id}"]`)||{}).textContent||"Không rõ"}</div>
        <div><span class="fw-medium">Câu hỏi:</span> <span class="mathjax-content">${q.noi_dung||""}</span></div>
        ${q.noi_dung_img ? `<div><img src="${qImgDisplay}" class="img-preview" style="max-width:200px;"/></div>` : ""}
        <div class="question-list-answers">
          ${["a","b","c","d"].map(k=>{
            const isCorrect = q.dap_an_dung===k;
            const ansText = (q.lua_chon && q.lua_chon[k]) ? q.lua_chon[k] : "";
            const ansImg = (q.lua_chon && q.lua_chon[k+"Img"]) ? q.lua_chon[k+"Img"] : "";
            const ansImgDisplay = getDisplayableImgUrl(ansImg);
            return `<div class="answer-item${isCorrect?' correct':''}">
                ${k}. <span class="mathjax-content">${ansText}</span>
                ${ansImgDisplay ? `<img src="${ansImgDisplay}" class="img-preview-ans" style="max-width:80px;"/>` : ""}
              </div>`
          }).join("")}
        </div>
        <div class="mt-2">
          <button class="btn btn-sm btn-warning edit-btn" data-id="${q.id}">Sửa</button>
          <button class="btn btn-sm btn-danger delete-btn" data-id="${q.id}">Xóa</button>
        </div>
      </div>
    `;
  });
  questionListView.innerHTML = `<div>${html || "<div>Không có câu hỏi nào phù hợp.</div>"}</div>`;
  // Kích hoạt MathJax cho nội dung vừa render (hỗ trợ công thức toán)
  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise(Array.from(questionListView.querySelectorAll('.mathjax-content')));
  }
  questionListView.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.onclick = ()=> showEditModal(btn.getAttribute("data-id"));
  });
  questionListView.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      if(confirm("Bạn có chắc muốn xóa câu hỏi này?")) {
        await deleteDoc(doc(db, "cau_hoi", btn.getAttribute("data-id")));
        await refreshQuestionList();
      }
    };
  });
}
questionSearchInput.addEventListener("input", renderQuestionList);
subjectFilterDropdown.addEventListener("change", renderQuestionList);

// ==== KHỞI ĐỘNG ====
showChoice();
</script>
