      <div style="background:#fff;max-width:480px;width:96%;margin:auto;box-shadow:0 4px 32px #0002;padding:20px;position:relative">
        <button id="closeEditModal" style="position:absolute;top:6px;right:12px;border:none;background:0 0;font-size:22px">×</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

let allSyllabusRaw = [], currentEditSyllabusId = null;

const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6",
  measurementId: "G-R0M6Y502NP"
};

const app = initializeApp(firebaseConfig),
  db = getFirestore(app),
  auth = getAuth(app);

// uploadToDrive giữ nguyên cho chức năng ảnh câu hỏi
async function uploadToDrive(file) {
  const formData = new FormData();
  formData.append("file", file);
  const res = await fetch("https://tracuu-app.hugo.io.vn/api/upload", { method: "POST", body: formData });
  if (!res.ok) throw new Error("Upload file thất bại!");
  return (await res.json()).url;
}

onAuthStateChanged(auth, (user) => {
  if (!user) location.href = "admin";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => { location.href = "admin"; });
});

const subjectForm = document.getElementById("subjectForm"),
  subjectName = document.getElementById("subjectName"),
  subjectList = document.getElementById("subjectList"),
  syllabusSubjectFilterDropdown = document.getElementById("syllabusSubjectFilterDropdown"),
  editSyllabusSubjectDropdown = document.getElementById("editSyllabusSubjectDropdown");

// Môn học
async function loadSubjects() {
  subjectList.innerHTML = "";
  (await getDocs(collection(db, "mon_hoc"))).forEach(docSnap => {
    const data = docSnap.data(), div = document.createElement("div");
    div.className = "d-flex justify-content-between align-items-center border p-2 mb-2";
    div.innerHTML = `<span>${data.ten_mon}</span>
      <div>
        <button class="btn btn-sm btn-warning me-2">Sửa</button>
        <button class="btn btn-sm btn-danger">Xóa</button>
      </div>`;
    div.querySelector(".btn-warning").onclick = async () => {
      const newName = prompt("Nhập tên mới:", data.ten_mon);
      if (newName) {
        await updateDoc(doc(db, "mon_hoc", docSnap.id), { ten_mon: newName });
        loadSubjects();
        loadSyllabusSubjectDropdowns();
      }
    };
    div.querySelector(".btn-danger").onclick = async () => {
      if (confirm("Bạn có chắc muốn xóa môn học này?")) {
        await deleteDoc(doc(db, "mon_hoc", docSnap.id));
        loadSubjects();
        loadSyllabusSubjectDropdowns();
      }
    };
    subjectList.appendChild(div);
  });
}

async function loadSyllabusSubjectDropdowns() {
  const docs = await getDocs(collection(db, "mon_hoc"));
  syllabusSubjectFilterDropdown.innerHTML = '<option value="">Tất cả môn học</option>';
  docs.forEach(docSnap => {
    const option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    syllabusSubjectFilterDropdown.appendChild(option);
  });
  editSyllabusSubjectDropdown.innerHTML = "";
  docs.forEach(docSnap => {
    const option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    editSyllabusSubjectDropdown.appendChild(option);
  });
}

subjectForm.addEventListener("submit", async e => {
  e.preventDefault();
  if (subjectName.value.trim()) {
    await addDoc(collection(db, "mon_hoc"), { ten_mon: subjectName.value.trim() });
    subjectForm.reset();
    loadSubjects();
    loadSyllabusSubjectDropdowns();
  }
});

const modeSelect = document.getElementById("modeSelect"),
  subjectSection = document.getElementById("subjectSection"),
  syllabusSection = document.getElementById("syllabusSection"),
  questionSection = document.getElementById("questionSection"),
  backToChoice1 = document.getElementById("backToChoice1"),
  backToChoice2 = document.getElementById("backToChoice2"),
  backToChoice3 = document.getElementById("backToChoice3");

function showChoice() {
  document.querySelectorAll(".mode-section").forEach(e => e.style.display = "none");
  if (modeSelect.value === "subject") {
    subjectSection.style.display = "block";
    loadSubjects();
  } else if (modeSelect.value === "syllabus") {
    syllabusSection.style.display = "block";
    refreshSyllabusList();
    loadSyllabusSubjectDropdowns();
  } else if (modeSelect.value === "question") {
    questionSection.style.display = "block";
    showQuestionChoice();
    loadSubjectsDropdown();
  }
  backToChoice1.classList.add("d-none");
  backToChoice2.classList.add("d-none");
  backToChoice3.classList.add("d-none");
}

modeSelect.addEventListener("change", showChoice);
backToChoice1.onclick = () => { showChoice() };

const syllabusSearchInput = document.getElementById("syllabusSearchInput"),
  syllabusListView = document.getElementById("syllabusListView");

async function refreshSyllabusList() {
  const docs = await getDocs(collection(db, "syllabus"));
  allSyllabusRaw = [];
  docs.forEach(docSnap => {
    const data = docSnap.data();
    data.id = docSnap.id;
    allSyllabusRaw.push(data);
  });
  renderSyllabusList();
}

function renderSyllabusList() {
  const filter = syllabusSubjectFilterDropdown.value,
    search = syllabusSearchInput.value.trim().toLowerCase();
  let list = allSyllabusRaw;
  if (filter) list = list.filter(item => item.mon_hoc_id === filter);
  if (search) list = list.filter(item =>
    (item.file_name || "").toLowerCase().includes(search) ||
    (item.owner || "").toLowerCase().includes(search)
  );
  let html = "";
  list.forEach(item => {
    html += `
      <div class="syllabus-list-item">
        <div><span class="fw-medium">Môn học:</span> ${(syllabusSubjectFilterDropdown.querySelector(`[value="${item.mon_hoc_id}"]`)||{}).textContent||"Không rõ"}</div>
        <div><span class="fw-medium">Tên file:</span> <a href="${item.file_url}" target="_blank">${item.file_name||""}</a></div>
        <div><span class="fw-medium">Chủ sở hữu:</span> ${item.owner||""}</div>
        <div><span class="fw-medium">Ngày upload:</span> ${item.uploaded_at?new Date(item.uploaded_at).toLocaleString():""}</div>
        <div class="mt-2">
          <button class="btn btn-sm btn-warning edit-syllabus-btn" data-id="${item.id}">Sửa</button>

// Lấy danh sách câu hỏi theo môn học để kiểm tra trùng lặp
async function getQuestionSetForSubject(monHocId) {
  const docs = await getDocs(query(collection(db,"cau_hoi"),where("mon_hoc_id","==",monHocId)));
  const arr = [];
  docs.forEach(e => {
    const t = e.data();
    arr.push({
      noi_dung: (t.noi_dung || "").trim(),
      dap_an_dung: t.dap_an_dung,
      dap_an: t.lua_chon && t.lua_chon[t.dap_an_dung]? t.lua_chon[t.dap_an_dung] : ""
    });
  });
  return arr;
}
function isDuplicateInSet(q, arr) {
  return arr.some(item => item.noi_dung === q.noi_dung.trim() && item.dap_an_dung === q.dap_an_dung && item.dap_an === q.lua_chon[q.dap_an_dung]);
}

// Xử lý đọc file HTML moodle và kiểm tra trùng câu hỏi
importHtmlInput.addEventListener("change", async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const monHocId = subjectDropdownImport.value;
  if (!monHocId) return void alert("Vui lòng chọn môn học để kiểm tra trùng lặp!");
  const questionSet = await getQuestionSetForSubject(monHocId);
  const reader = new FileReader();
  reader.onload = async function(ev) {
    const text = ev.target.result,
      dom = (new DOMParser).parseFromString(text,"text/html");
    let rawList = [], resultArr = [];
    function strip(str) {
      return str.replace(/<[^>]*>/g,"").replace(/\\\(|\\\)|\$\$|\$/g,"").replace(/&nbsp;|\s+/g,"").toLowerCase().trim();
    }
    dom.querySelectorAll(".que").forEach(qEl => {
      let qTextEl = qEl.querySelector(".qtext"),
        qText = qTextEl ? ensureMathDelimiters(qTextEl.innerHTML.trim()) : "";
      const ansEls = qEl.querySelectorAll(".answer > div"),
        ansArr = [];
      ansEls.forEach((el, idx) => {
        let ansTextEl = el.querySelector(".flex-fill, div.ml-1"),
          ansText = ensureMathDelimiters(ansTextEl ? ansTextEl.innerHTML.trim() : el.innerHTML.trim());
        ansArr.push(ansText);
      });
      let correctIdx = -1;
      ansEls.forEach((el, idx) => {
        if (el.classList.contains("correct")) correctIdx = idx;
      });
      if (correctIdx === -1) {
        ansEls.forEach((el, idx) => {
          const input = el.querySelector('input[type="radio"],input[type="checkbox"]');
          if (input && input.checked) correctIdx = idx;
        });
      }
      if (correctIdx === -1) {
        let m = (qEl.querySelector(".rightanswer")?.innerText || "").match(/The correct answer is:\s*(.*)$/i),
          rightText = m ? strip(m[1]) : "";
        ansEls.forEach((el, idx) => {
          let ansTextEl = el.querySelector(".flex-fill, div.ml-1"),
            ansText = strip(ansTextEl ? ansTextEl.innerHTML.trim() : el.innerHTML.trim());
          if (ansText === rightText) correctIdx = idx;
        });
        if (correctIdx === -1 && qText && rightText) {
          ansEls.forEach((el, idx) => {
            let ansTextEl = el.querySelector(".flex-fill, div.ml-1"),
              ansText = strip(ansTextEl ? ansTextEl.innerHTML.trim() : el.innerHTML.trim());
            if (ansText && rightText && (ansText.includes(rightText) || rightText.includes(ansText))) correctIdx = idx;
          });
        }
      }
      let correctKey = ["a","b","c","d"][correctIdx] || "",
        correctAns = ansArr[correctIdx] || "";
      resultArr.push({
        questionText: qText,
        answers: ansArr,
        correct: correctAns,
        correctIdx,
        correctKey,
        lua_chon: {a:ansArr[0]||"", b:ansArr[1]||"", c:ansArr[2]||"", d:ansArr[3]||""}
      });
    });
    rawList = resultArr.map(q => ({
      ...q,
      duplicate: !(!q.correctKey || !q.questionText) && isDuplicateInSet({noi_dung:q.questionText, dap_an_dung:q.correctKey, lua_chon:q.lua_chon}, questionSet)
    }));
    let html = `<div class="fw-bold mb-2">Kết quả trích xuất (${rawList.length} câu):</div>`;
    rawList.forEach((q, idx) => {
      html += `<div class="import-question${q.duplicate?" import-duplicate":""}">
        <div><b>Câu ${idx+1}:</b> <span class="mathjax-content">${q.questionText}</span></div>`;
      q.answers.forEach((ans, i) => {
        html += `<div class="import-answer${i===q.correctIdx?" import-answer-correct":""}">
          ${String.fromCharCode(97+i)}. <span class="mathjax-content">${ans}</span> ${i===q.correctIdx?"<span>(Đáp án đúng)</span>":""}
        </div>`;
      });
      if(q.duplicate) html += '<span class="import-duplicate">[Trùng] Câu hỏi này sẽ không được lưu!</span>';
      html += "</div>";
    });
    importHtmlResult.innerHTML = html;
    saveImportBtn.style.display = rawList.length > 0 ? "inline-block" : "none";
    window.MathJax && window.MathJax.typesetPromise && MathJax.typesetPromise(Array.from(importHtmlResult.querySelectorAll(".mathjax-content")));
    window._importedQuestions = rawList;
    window._importedMonHocId = monHocId;
  };
  reader.readAsText(file);
});

saveImportBtn.onclick = async function() {

  if (!list.length) return void alert("Chưa có dữ liệu để lưu!");
  saveImportBtn.disabled = true;

    if(q.duplicate) {dup++; continue;}

};

function getDisplayableImgUrl(url) {
  if (!url) return "";
  let m = url.match(/https:\/\/drive\.google\.com\/file\/d\/([^/]+)/);
  if(m) return "https://drive.google.com/thumbnail?id="+m[1];
  m = url.match(/https:\/\/drive\.google\.com\/open\?id=([^&]+)/);
  if(m) return "https://drive.google.com/thumbnail?id="+m[1];
  m = url.match(/https:\/\/drive\.google\.com\/thumbnail\?id=([^&]+)/);
  if(m) return url;
  if(url.includes("drive.google.com/uc?export=view&id=")) {
    return "https://drive.google.com/thumbnail?id="+url.split("id=")[1];
  }
  return url;
}
function ensureMathDelimiters(str) {
  return str ? str.replace(/\[tex\]([\s\S]*?)\[\/tex\]/g, (m, g) => `$${g.trim()}$`) : "";
}
function renderQuestionList() {
  const search = questionSearchInput.value.trim().toLowerCase(),
    filter = subjectFilterDropdown.value;
  let arr = allQuestionsRaw;
  if (filter) arr = arr.filter(q => q.mon_hoc_id === filter);
  if (search) arr = arr.filter(q => (q.noi_dung||"").toLowerCase().includes(search));
  let html = "";
  arr.forEach(q => {
    const imgQ = getDisplayableImgUrl(q.noi_dung_img);
    html += `
      <div class="question-list-item">
        <div><span class="fw-medium">Môn học:</span> ${(subjectFilterDropdown.querySelector(`[value="${q.mon_hoc_id}"]`)||{}).textContent||"Không rõ"}</div>
        <div><span class="fw-medium">Câu hỏi:</span> <span class="mathjax-content">${q.noi_dung||""}</span></div>
        ${q.noi_dung_img?`<div><img src="${imgQ}" class="img-preview" style="max-width:200px;"/></div>`:""}
        <div class="question-list-answers">
          ${["a","b","c","d"].map(t => {
            const correct = q.dap_an_dung===t,
              ans = q.lua_chon && q.lua_chon[t]? q.lua_chon[t] : "",
              img = getDisplayableImgUrl(q.lua_chon && q.lua_chon[t+"Img"]? q.lua_chon[t+"Img"] : "");
            return `<div class="answer-item${correct?" correct":""}">
                ${t}. <span class="mathjax-content">${ans}</span>
                ${img?`<img src="${img}" class="img-preview-ans" style="max-width:80px;"/>`:""}
              </div>`;
          }).join("")}
        </div>
        <div class="mt-2">
          <button class="btn btn-sm btn-warning edit-btn" data-id="${q.id}">Sửa</button>
          <button class="btn btn-sm btn-danger delete-btn" data-id="${q.id}">Xóa</button>
        </div>
      </div>
    `;
  });
  questionListView.innerHTML = `<div>${html||"<div>Không có câu hỏi nào phù hợp.</div>"}</div>`;
  window.MathJax && window.MathJax.typesetPromise && MathJax.typesetPromise(Array.from(questionListView.querySelectorAll(".mathjax-content")));
  questionListView.querySelectorAll(".edit-btn").forEach(btn => {
    btn.onclick = () => showEditModal(btn.getAttribute("data-id"));
  });
  questionListView.querySelectorAll(".delete-btn").forEach(btn => {
    btn.onclick = async () => {
      if (confirm("Bạn có chắc muốn xóa câu hỏi này?")) {
        await deleteDoc(doc(db,"cau_hoi",btn.getAttribute("data-id")));
        await refreshQuestionList();
      }
    }
  });
}
questionSearchInput.addEventListener("input", renderQuestionList);
subjectFilterDropdown.addEventListener("change", renderQuestionList);

showChoice();
</script>
</body>
</html>
