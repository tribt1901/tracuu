<!DOCTYPE html>

  <style>

<div class="container py-4">
  <div class="top-btn-bar">
    <button class="btn btn-secondary d-none" id="backToChoice1">← Quay lại</button>

  <div class="mode-section" id="questionSection">

      </select>

    <div id="manualSection" style="display:none;">

          <div class="input-group">
            <input class="form-control" id="answerB" placeholder="Đáp án b" required type="text"/>
            <input type="file" accept="image/*" class="form-control form-control-sm" id="answerBImage">
          </div>
          <div class="img-preview" id="previewAnswerB"></div>
        </div>
        <div class="answer-input-group mb-2">
          <label for="answerC" class="form-label mb-1">Đáp án c</label>
          <div class="input-group">
            <input class="form-control" id="answerC" placeholder="Đáp án c" required type="text"/>
            <input type="file" accept="image/*" class="form-control form-control-sm" id="answerCImage">
          </div>
          <div class="img-preview" id="previewAnswerC"></div>
        </div>
        <div class="answer-input-group mb-2">

          <div class="input-group">
            <input class="form-control" id="answerD" placeholder="Đáp án d" required type="text"/>
            <input type="file" accept="image/*" class="form-control form-control-sm" id="answerDImage">
          </div>
          <div class="img-preview" id="previewAnswerD"></div>

        <select class="form-select mb-2" id="correctAnswerDropdown" required>

    <div class="question-list-section" id="questionListSection" style="display:none;">
      <div class="row mb-2">

          <input type="text" id="questionSearchInput" class="form-control" placeholder="Tìm kiếm nội dung câu hỏi...">

      <div style="background:#fff;max-width:480px;width:96%;margin:auto;box-shadow:0 4px 32px #0002;padding:20px;position:relative;">
        <button id="closeEditModal" style="position:absolute;top:6px;right:12px;border:none;background:none;font-size:22px;">×</button>

            <label class="form-label mb-1">Ảnh cho nội dung câu hỏi (tùy chọn)</label>
            <input type="file" accept="image/*" class="form-control form-control-sm" id="editQuestionImage">
            <div class="img-preview" id="editPreviewQuestionImage"></div>
          </div>
          <textarea class="form-control" id="editQuestionText" required rows="3"></textarea>
          <div class="answer-input-group mb-2">
            <label class="form-label mb-1">Đáp án a</label>
            <div class="input-group">
              <input class="form-control" id="editAnswerA" placeholder="Đáp án a" required type="text"/>
              <input type="file" accept="image/*" class="form-control form-control-sm" id="editAnswerAImage">
            </div>
            <div class="img-preview" id="editPreviewAnswerA"></div>
          </div>
          <div class="answer-input-group mb-2">
            <label class="form-label mb-1">Đáp án b</label>
            <div class="input-group">

              <input type="file" accept="image/*" class="form-control form-control-sm" id="editAnswerBImage">
            </div>
            <div class="img-preview" id="editPreviewAnswerB"></div>
          </div>
          <div class="answer-input-group mb-2">
            <label class="form-label mb-1">Đáp án c</label>
            <div class="input-group">
              <input class="form-control" id="editAnswerC" placeholder="Đáp án c" required type="text"/>
              <input type="file" accept="image/*" class="form-control form-control-sm" id="editAnswerCImage">
            </div>
            <div class="img-preview" id="editPreviewAnswerC"></div>
          </div>
          <div class="answer-input-group mb-2">
            <label class="form-label mb-1">Đáp án d</label>
            <div class="input-group">
              <input class="form-control" id="editAnswerD" placeholder="Đáp án d" required type="text"/>
              <input type="file" accept="image/*" class="form-control form-control-sm" id="editAnswerDImage">
            </div>
            <div class="img-preview" id="editPreviewAnswerD"></div>
          </div>

            <option value="">Chọn đáp án đúng</option>
            <option value="a">a</option>
            <option value="b">b</option>
            <option value="c">c</option>
            <option value="d">d</option>

          <button type="submit" class="btn btn-success mt-2">Lưu thay đổi</button>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ==== Firebase config ====
const firebaseConfig = {
    apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
    authDomain: "tracuu-d3ee9.firebaseapp.com",
    projectId: "tracuu-d3ee9",
    storageBucket: "tracuu-d3ee9.firebasestorage.app",
    messagingSenderId: "593568604435",
    appId: "1:593568604435:web:9a5145457a8ee734143ae6",
    measurementId: "G-R0M6Y502NP"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Nút logout
logoutBtn.onclick = () => signOut(auth).then(() => location.reload());

// ====== CRUD Môn học ======
async function loadSubjects() {
  subjectList.innerHTML = "";
  let snap = await getDocs(collection(db, "mon_hoc"));
  snap.forEach(docSnap => {
    let data = docSnap.data();
    let div = document.createElement("div");
    div.className = "d-flex justify-content-between align-items-center border p-2 mb-2";
    div.innerHTML = `<span>${data.ten_mon}</span>
      <div>
        <button class="btn btn-sm btn-warning me-2">Sửa</button>
        <button class="btn btn-sm btn-danger">Xóa</button>
      </div>`;
    div.querySelector(".btn-warning").onclick = async () => {
      let newName = prompt("Nhập tên mới:", data.ten_mon);
      if (newName) {
        await updateDoc(doc(db, "mon_hoc", docSnap.id), { ten_mon: newName });
        loadSubjects();
      }
    };
    div.querySelector(".btn-danger").onclick = async () => {
      if (confirm("Bạn có chắc muốn xóa môn học này?")) {
        await deleteDoc(doc(db, "mon_hoc", docSnap.id)); loadSubjects();
      }
    };
    subjectList.appendChild(div);
  });
}
subjectForm.onsubmit = async (e) => {
  e.preventDefault();
  let name = subjectName.value.trim();
  if(!name) return;
  await addDoc(collection(db, "mon_hoc"), { ten_mon: name });
  subjectForm.reset();
  loadSubjects();
};
async function loadSubjectsDropdown() {
  let sel = subjectDropdown;
  sel.innerHTML = "";
  let snap = await getDocs(collection(db, "mon_hoc"));
  snap.forEach(docSnap => {
    let option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    sel.appendChild(option);
  });
}

// ====== Chuyển mode ======
function switchMode() {
  let mode = modeSelect.value;
  document.querySelectorAll(".mode-section").forEach(el => el.style.display = "none");
  if(mode==="subject") subjectSection.style.display = "block";
  if(mode==="question") {
    questionSection.style.display = "block";
    showQuestionChoice();
    loadSubjectsDropdown();
    loadQuestions();
  }
}
modeSelect.onchange = switchMode;
function showQuestionChoice() {
  questionModeChoice.style.display = "block";
  importHtmlSection.style.display = "none";
  manualSection.style.display = "none";
  questionListSection.style.display = "none";
}
switchMode();

// ===== CRUD THÊM THỦ CÔNG, UPLOAD ẢNH, KIỂM TRA TRÙNG =====
function handleImagePreview(inputElem, previewElem, urlObj) {
  inputElem.addEventListener("change", () => {
    previewElem.innerHTML = "";
    urlObj.value = "";
    if (inputElem.files && inputElem.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement("img");
        img.src = e.target.result;
        previewElem.appendChild(img);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn btn-sm btn-outline-danger btn-delete-img";
        btn.textContent = "Xóa ảnh";
        btn.onclick = () => { previewElem.innerHTML = ""; inputElem.value = ""; urlObj.value = ""; };
        previewElem.appendChild(btn);
      };
      reader.readAsDataURL(inputElem.files[0]);
    }
  });
}
let questionImageInput = document.getElementById("questionImage"),
  previewQuestionImage = document.getElementById("previewQuestionImage"),
  answerAImageInput = document.getElementById("answerAImage"),
  previewAnswerA = document.getElementById("previewAnswerA"),
  answerBImageInput = document.getElementById("answerBImage"),
  previewAnswerB = document.getElementById("previewAnswerB"),
  answerCImageInput = document.getElementById("answerCImage"),
  previewAnswerC = document.getElementById("previewAnswerC"),
  answerDImageInput = document.getElementById("answerDImage"),
  previewAnswerD = document.getElementById("previewAnswerD");
let urlObjQuestion = { value: "" }, urlObjA = { value: "" }, urlObjB = { value: "" }, urlObjC = { value: "" }, urlObjD = { value: "" };
handleImagePreview(questionImageInput, previewQuestionImage, urlObjQuestion);
handleImagePreview(answerAImageInput, previewAnswerA, urlObjA);
handleImagePreview(answerBImageInput, previewAnswerB, urlObjB);
handleImagePreview(answerCImageInput, previewAnswerC, urlObjC);
handleImagePreview(answerDImageInput, previewAnswerD, urlObjD);

async function uploadImageToServer(file) {
  if (!file) return "";
  const formData = new FormData();
  formData.append('file', file);
  const res = await fetch("https://tracuu-app.hugo.io.vn/api/upload", { method: "POST", body: formData });
  const data = await res.json();
  return data.url || "";
}
async function isDuplicateQuestion(mon_hoc_id, noi_dung, dap_an_dung) {
  const q = query(
    collection(db, "cau_hoi"),
    where("mon_hoc_id", "==", mon_hoc_id),
    where("noi_dung", "==", noi_dung),
    where("dap_an_dung", "==", dap_an_dung)
  );
  const snap = await getDocs(q);
  return !snap.empty;
}
questionForm.onsubmit = async (e) => {
  e.preventDefault();
  let subjectId = subjectDropdown.value;
  let questionText = document.getElementById("questionText").value.trim();
  let answerA = document.getElementById("answerA").value.trim();
  let answerB = document.getElementById("answerB").value.trim();
  let answerC = document.getElementById("answerC").value.trim();
  let answerD = document.getElementById("answerD").value.trim();
  let correctAnswer = document.getElementById("correctAnswerDropdown").value;
  if (!subjectId || !questionText || !answerA || !answerB || !answerC || !answerD || !correctAnswer) return;
  if(await isDuplicateQuestion(subjectId, questionText, correctAnswer)) {
    alert("Câu hỏi này với đáp án đúng này đã tồn tại!"); return;
  }
  let qImgUrl = await uploadImageToServer(questionImageInput.files[0]);
  let aImgUrl = await uploadImageToServer(answerAImageInput.files[0]);
  let bImgUrl = await uploadImageToServer(answerBImageInput.files[0]);
  let cImgUrl = await uploadImageToServer(answerCImageInput.files[0]);
  let dImgUrl = await uploadImageToServer(answerDImageInput.files[0]);
  await addDoc(collection(db, "cau_hoi"), {
    mon_hoc_id: subjectId,
    noi_dung: questionText,
    noi_dung_img: qImgUrl,
    lua_chon: {
      a: answerA, aImg: aImgUrl,
      b: answerB, bImg: bImgUrl,
      c: answerC, cImg: cImgUrl,
      d: answerD, dImg: dImgUrl
    },
    dap_an_dung: correctAnswer
  });
  questionForm.reset();
  previewQuestionImage.innerHTML = previewAnswerA.innerHTML = previewAnswerB.innerHTML = previewAnswerC.innerHTML = previewAnswerD.innerHTML = "";
  urlObjQuestion.value = urlObjA.value = urlObjB.value = urlObjC.value = urlObjD.value = "";
};

// ===== CRUD DANH SÁCH CÂU HỎI, SỬA, XÓA, TÌM KIẾM, LỌC =====
viewQuestionListBtn.onclick = async () => {
  questionModeChoice.style.display = "none";
  importHtmlSection.style.display = "none";
  manualSection.style.display = "none";
  questionListSection.style.display = "block";
  await refreshQuestionList();
};
questionSearchInput.addEventListener("input", renderQuestionList);
subjectFilterDropdown.addEventListener("change", renderQuestionList);

async function refreshQuestionList() {
  await loadSubjectFilterDropdown();
  let allSubjects = {};
  Array.from(subjectFilterDropdown.options).forEach(opt => {
    if (opt.value) allSubjects[opt.value] = opt.textContent;
  });
  const questions = [];
  const snapshot = await getDocs(collection(db, "cau_hoi"));
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    data.id = docSnap.id;
    questions.push(data);
  });
  window._allQuestionsRaw = questions;
  window._allSubjectsList = allSubjects;
  renderQuestionList();
}
function renderQuestionList() {
  const searchVal = questionSearchInput.value.trim().toLowerCase();
  const monHocId = subjectFilterDropdown.value;
  let filtered = window._allQuestionsRaw||[];
  if (monHocId) filtered = filtered.filter(q => q.mon_hoc_id === monHocId);
  if (searchVal) filtered = filtered.filter(q => (q.noi_dung||"").toLowerCase().includes(searchVal));
  let html = "";
  filtered.forEach(q => {
    const monHoc = window._allSubjectsList[q.mon_hoc_id] || "Không rõ";
    html += `
      <div class="question-list-item">
        <div><span class="fw-medium">Môn học:</span> ${monHoc}</div>
        <div><span class="fw-medium">Câu hỏi:</span> ${q.noi_dung}</div>
        ${q.noi_dung_img ? `<div><img src="${q.noi_dung_img}" style="max-width:120px;max-height:70px"/></div>` : ""}
        <div class="question-list-answers">
          ${["a","b","c","d"].map(k=>{
            const isCorrect = q.dap_an_dung===k;
            const ansText = (q.lua_chon && q.lua_chon[k]) ? q.lua_chon[k] : "";
            const img = (q.lua_chon && q.lua_chon[k + "Img"]) ? `<img src="${q.lua_chon[k+"Img"]}" style="max-width:70px;max-height:40px;vertical-align:middle"/>` : "";
            return `<div class="answer-item${isCorrect?' correct':''}">${k}. ${ansText} ${img}</div>`
          }).join("")}
        </div>
        <div class="mt-2">
          <button class="btn btn-sm btn-warning edit-btn" data-id="${q.id}">Sửa</button>
          <button class="btn btn-sm btn-danger delete-btn" data-id="${q.id}">Xóa</button>
        </div>
      </div>
    `;
  });
  questionListView.innerHTML = html || "<div>Không có câu hỏi nào phù hợp.</div>";
  questionListView.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.onclick = ()=> showEditModal(btn.getAttribute("data-id"));
  });
  questionListView.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      if(confirm("Bạn có chắc muốn xóa câu hỏi này?")) {
        await deleteDoc(doc(db, "cau_hoi", btn.getAttribute("data-id")));
        await refreshQuestionList();
      }
    };
  });
  if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
}
async function loadSubjectFilterDropdown() {
  subjectFilterDropdown.innerHTML = `<option value="">Tất cả môn học</option>`;
  const snapshot = await getDocs(collection(db, "mon_hoc"));
  snapshot.forEach(docSnap => {
    const option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    subjectFilterDropdown.appendChild(option);
  });
}

// ===== MODAL SỬA CÂU HỎI =====
const editQuestionModal = document.getElementById("editQuestionModal");
const editForm = document.getElementById("editForm");
const closeEditModal = document.getElementById("closeEditModal");
const editQuestionImageInput = document.getElementById("editQuestionImage");
const editPreviewQuestionImage = document.getElementById("editPreviewQuestionImage");
const editAnswerAImageInput = document.getElementById("editAnswerAImage");
const editPreviewAnswerA = document.getElementById("editPreviewAnswerA");
const editAnswerBImageInput = document.getElementById("editAnswerBImage");
const editPreviewAnswerB = document.getElementById("editPreviewAnswerB");
const editAnswerCImageInput = document.getElementById("editAnswerCImage");
const editPreviewAnswerC = document.getElementById("editPreviewAnswerC");
const editAnswerDImageInput = document.getElementById("editAnswerDImage");
const editPreviewAnswerD = document.getElementById("editPreviewAnswerD");
let editImgUrls = { noi_dung_img: "", aImg: "", bImg: "", cImg: "", dImg: "" };
let currentEditQid = null;
function previewEditImage(inputElem, previewElem, key) {
  inputElem.addEventListener("change", () => {
    previewElem.innerHTML = "";
    editImgUrls[key] = "";
    if (inputElem.files && inputElem.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement("img");
        img.src = e.target.result;
        previewElem.appendChild(img);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn btn-sm btn-outline-danger btn-delete-img";
        btn.textContent = "Xóa ảnh";
        btn.onclick = () => { previewElem.innerHTML = ""; inputElem.value = ""; editImgUrls[key] = ""; };
        previewElem.appendChild(btn);
      };
      reader.readAsDataURL(inputElem.files[0]);
    }
  });
}
previewEditImage(editQuestionImageInput, editPreviewQuestionImage, "noi_dung_img");
previewEditImage(editAnswerAImageInput, editPreviewAnswerA, "aImg");
previewEditImage(editAnswerBImageInput, editPreviewAnswerB, "bImg");
previewEditImage(editAnswerCImageInput, editPreviewAnswerC, "cImg");
previewEditImage(editAnswerDImageInput, editPreviewAnswerD, "dImg");

async function loadEditSubjectDropdown(selected) {
  let sel = document.getElementById("editSubjectDropdown");
  sel.innerHTML = "";
  let snap = await getDocs(collection(db, "mon_hoc"));
  snap.forEach(docSnap => {
    let option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    if (selected && selected === docSnap.id) option.selected = true;
    sel.appendChild(option);
  });
}
window.allQuestionsRaw = [];
async function showEditModal(qid) {
  const q = window._allQuestionsRaw.find(x=>x.id===qid)||window._allQuestionsRaw.find(x=>x.id===qid); if(!q) return;
  currentEditQid = qid;
  await loadEditSubjectDropdown(q.mon_hoc_id);
  document.getElementById("editQuestionText").value = q.noi_dung || "";
  document.getElementById("editAnswerA").value = q.lua_chon?.a || "";
  document.getElementById("editAnswerB").value = q.lua_chon?.b || "";
  document.getElementById("editAnswerC").value = q.lua_chon?.c || "";
  document.getElementById("editAnswerD").value = q.lua_chon?.d || "";
  document.getElementById("editCorrectAnswerDropdown").value = q.dap_an_dung || "";
  editPreviewQuestionImage.innerHTML = ""; editPreviewAnswerA.innerHTML = ""; editPreviewAnswerB.innerHTML = ""; editPreviewAnswerC.innerHTML = ""; editPreviewAnswerD.innerHTML = "";
  editImgUrls = {
    noi_dung_img: q.noi_dung_img || "",
    aImg: q.lua_chon?.aImg || "",
    bImg: q.lua_chon?.bImg || "",
    cImg: q.lua_chon?.cImg || "",
    dImg: q.lua_chon?.dImg || ""
  };
  if (q.noi_dung_img) {
    const img = document.createElement("img");
    img.src = q.noi_dung_img;
    editPreviewQuestionImage.appendChild(img);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "btn btn-sm btn-outline-danger btn-delete-img";
    btn.textContent = "Xóa ảnh";
    btn.onclick = () => { editPreviewQuestionImage.innerHTML = ""; editQuestionImageInput.value = ""; editImgUrls.noi_dung_img = ""; };
    editPreviewQuestionImage.appendChild(btn);
  }
  ["A","B","C","D"].forEach(l => {
    const key = l.toLowerCase() + "Img";
    const imgUrl = q.lua_chon?.[key];
    const inputElem = document.getElementById("editAnswer" + l + "Image");
    const previewElem = document.getElementById("editPreviewAnswer" + l);
    previewElem.innerHTML = "";
    if(imgUrl){
      const img = document.createElement("img");
      img.src = imgUrl;
      previewElem.appendChild(img);
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "btn btn-sm btn-outline-danger btn-delete-img";
      btn.textContent = "Xóa ảnh";
      btn.onclick = () => { previewElem.innerHTML = ""; inputElem.value = ""; editImgUrls[key] = ""; };
      previewElem.appendChild(btn);
    }
  });
  editQuestionModal.style.display = "flex";
}
closeEditModal.onclick = ()=>{ editQuestionModal.style.display = "none"; };
editForm.onsubmit = async function(e){
  e.preventDefault();
  const mon_hoc_id = document.getElementById("editSubjectDropdown").value;
  const noi_dung = document.getElementById("editQuestionText").value.trim();
  const a = document.getElementById("editAnswerA").value.trim();
  const b = document.getElementById("editAnswerB").value.trim();
  const c = document.getElementById("editAnswerC").value.trim();
  const d = document.getElementById("editAnswerD").value.trim();
  const dap_an_dung = document.getElementById("editCorrectAnswerDropdown").value;
  if(!mon_hoc_id||!noi_dung||!a||!b||!c||!d||!dap_an_dung) return;
  const q = query(
    collection(db, "cau_hoi"),
    where("mon_hoc_id", "==", mon_hoc_id),
    where("noi_dung", "==", noi_dung),
    where("dap_an_dung", "==", dap_an_dung)
  );
  const snap = await getDocs(q);
  let isDup = false;
  snap.forEach(docSnap => { if(docSnap.id !== currentEditQid) isDup = true; });
  if(isDup) {
    alert("Câu hỏi này với đáp án đúng này đã tồn tại!");
    return;
  }
  let qImgUrl = editImgUrls.noi_dung_img;
  if(editQuestionImageInput.files[0]) qImgUrl = await uploadImageToServer(editQuestionImageInput.files[0]);
  let aImgUrl = editImgUrls.aImg;
  if(editAnswerAImageInput.files[0]) aImgUrl = await uploadImageToServer(editAnswerAImageInput.files[0]);
  let bImgUrl = editImgUrls.bImg;
  if(editAnswerBImageInput.files[0]) bImgUrl = await uploadImageToServer(editAnswerBImageInput.files[0]);
  let cImgUrl = editImgUrls.cImg;
  if(editAnswerCImageInput.files[0]) cImgUrl = await uploadImageToServer(editAnswerCImageInput.files[0]);
  let dImgUrl = editImgUrls.dImg;
  if(editAnswerDImageInput.files[0]) dImgUrl = await uploadImageToServer(editAnswerDImageInput.files[0]);
  await updateDoc(doc(db,"cau_hoi",currentEditQid),{
    mon_hoc_id, noi_dung, noi_dung_img: qImgUrl,
    lua_chon: {a:a,aImg:aImgUrl,b:b,bImg:bImgUrl,c:c,cImg:cImgUrl,d:d,dImg:dImgUrl},
    dap_an_dung
  });
  editQuestionModal.style.display = "none";
  await refreshQuestionList();
};

// ===== IMPORT HTML, PHÂN TÍCH, LƯU, KIỂM TRA TRÙNG, ĐÁP ÁN ĐÚNG =====
let importedQuestions = [];
importHtmlBtn.onclick = async () => {
  questionModeChoice.style.display = "none";
  importHtmlSection.style.display = "block";
  manualSection.style.display = "none";
  questionListSection.style.display = "none";

  importHtmlResult.innerHTML = "";
  saveImportBtn.style.display = "none";
};

  importHtmlSection.style.display = "none";
  manualSection.style.display = "block";
  questionListSection.style.display = "none";
};
backToChoice1.onclick = backToChoice2.onclick = backToChoice3.onclick = showQuestionChoice;

async function loadSubjectsDropdownImport() {
  let sel = subjectDropdownImport;
  sel.innerHTML = `<option value="">-- Chọn môn học để lưu --</option>`;
  let snap = await getDocs(collection(db, "mon_hoc"));
  snap.forEach(docSnap => {
    let option = document.createElement("option");
    option.value = docSnap.id;
    option.textContent = docSnap.data().ten_mon;
    sel.appendChild(option);
  });
}
subjectDropdownImport.onchange = function() {
  importHtmlInput.disabled = !this.value;
  importHtmlResult.innerHTML = "";
  saveImportBtn.style.display = "none";
};
importHtmlInput.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const html = event.target.result;
    let blocks = html.split(/\n\s*\n/).filter(x=>x.trim());
    importedQuestions = [];
    for (let block of blocks) {
      let lines = block.split('\n').map(x=>x.trim()).filter(x=>x);
      if (lines.length < 2) continue;
      let questionText = lines[0];
      let answers = [];
      let correctIdx = -1;
      for (let i=1; i<lines.length; ++i) {
        let ansLine = lines[i];
        let match = ansLine.match(/^([a-d])\.\s*(.*)$/i);
        if (match) {
          let ansText = match[2].replace(/<[^>]+>/g,"").replace(/\(Đáp án đúng\)/i,"").replace(/\s*$/, "");
          answers.push(ansText);
          if (ansLine.toLowerCase().includes("đáp án đúng")) correctIdx = answers.length-1;
        }
      }
      if (answers.length===4 && correctIdx!==-1) {
        importedQuestions.push({ questionText, answers, correctIdx });
      }
    }
    let htmlResult = `<div class="fw-bold mb-2">Kết quả trích xuất (${importedQuestions.length} câu):</div>`;
    importedQuestions.forEach((q, idx) => {
      htmlResult += `<div class="import-question">
        <span>${q.questionText}</span><br>`;
      q.answers.forEach((a,i) => {
        htmlResult += `<div class="import-answer${i===q.correctIdx?' import-answer-correct':''}">
          ${String.fromCharCode(97+i)}. ${a} ${i===q.correctIdx?'<span>(Đáp án đúng)</span>':''}
        </div>`;
      });
      htmlResult += `</div>`;
    });
    importHtmlResult.innerHTML = htmlResult;
    saveImportBtn.style.display = importedQuestions.length>0 ? "inline-block" : "none";
    if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
  }
  reader.readAsText(file);
});
saveImportBtn.onclick = async function() {
  const mon_hoc_id = subjectDropdownImport.value;
  if (!mon_hoc_id) { alert("Vui lòng chọn môn học để lưu!"); return; }
  if (!importedQuestions.length) { alert("Chưa có dữ liệu để lưu!"); return; }
  saveImportBtn.disabled = true;
  let success = 0, fail = 0, duplicated = 0;
  for (let q of importedQuestions) {
    let correctKey = ['a','b','c','d'][q.correctIdx] || '';
    if (!correctKey) { fail++; continue; }
    let isDup = await isDuplicateQuestion(mon_hoc_id, q.questionText.replace(/\s+/g," ").trim(), correctKey);
    if(isDup) { duplicated++; continue; }
    await addDoc(collection(db, "cau_hoi"), {
      mon_hoc_id,
      noi_dung: q.questionText,
      noi_dung_img: "",
      lua_chon: {
        a: q.answers[0]||"", aImg:"",
        b: q.answers[1]||"", bImg:"",
        c: q.answers[2]||"", cImg:"",
        d: q.answers[3]||"", dImg:""
      },
      dap_an_dung: correctKey
    }).then(()=>success++).catch(()=>fail++);
  }
  alert(`Đã lưu ${success} câu hỏi. Bỏ qua ${duplicated} câu bị trùng.${fail>0?` Lỗi ${fail} câu.`:""}`);
  saveImportBtn.disabled = false;
};
