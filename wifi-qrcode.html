<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Poster Wi-Fi Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- QRCode + html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body {
      background: #f9f9f9;
      color: #333;
    }
    .poster-box {
      background: #fff;
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      display: inline-block;
      text-align: center;
    }
    .poster-layout {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 900px;
      height: 400px;
      border: 2px solid #ccc;
      padding: 20px;
    }
    .poster-left {
      flex: 1;
      text-align: center;
      padding: 20px;
    }
    .poster-left img {
      max-height: 80px;
      margin-bottom: 15px;
    }
    .poster-left h3 {
      color: #2a2a7f;
      font-weight: bold;
      margin-top: 20px;
    }
    .poster-right {
      flex: 1;
      text-align: center;
      padding: 20px;
    }
    .corner-decor {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 4px solid orange;
    }
    .corner-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
    .corner-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
    .corner-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }
  </style>
</head>
<body class="container py-4">

  <h2 class="mb-4">📶 Tạo Poster Wi-Fi</h2>

  <!-- Form -->
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Tên Wi-Fi (SSID)</label>
      <input type="text" class="form-control" id="ssid" placeholder="Nhập tên Wi-Fi">
    </div>
    <div class="col-md-4">
      <label class="form-label">Mật khẩu</label>
      <input type="text" class="form-control" id="password" placeholder="Nhập mật khẩu">
    </div>
    <div class="col-md-4">
      <label class="form-label">Chuẩn bảo mật</label>
      <select class="form-select" id="encryption">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="">Không mật khẩu</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Upload Logo</label>
      <input type="file" class="form-control" id="logoInput" accept="image/*">
    </div>
  </div>

  <!-- Nút render -->
  <div class="mt-3">
    <button class="btn btn-primary" onclick="renderPoster()">🔄 Tạo Poster</button>
    <button class="btn btn-success" onclick="downloadPoster()">⬇️ Tải Poster PNG</button>
  </div>

  <!-- Preview -->
  <div id="posterPreview" class="poster-box mt-4 position-relative">
    <p><i>Poster Wi-Fi sẽ hiển thị ở đây...</i></p>
  </div>

  <script>
    let logoUrl = "";

    // Upload logo
    document.getElementById("logoInput").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          logoUrl = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Render poster
    function renderPoster() {
      const ssid = document.getElementById('ssid').value || "MyWiFi";
      const pass = document.getElementById('password').value || "12345678";
      const enc = document.getElementById('encryption').value || "nopass";

      const wifiString = `WIFI:T:${enc || "nopass"};S:${ssid};P:${pass};;`;

      QRCode.toDataURL(wifiString, { width: 200 }, function(err, qrUrl) {
        if (err) return;

        document.getElementById("posterPreview").innerHTML = `
          <div class="poster-layout position-relative">
            <div class="corner-decor corner-tl"></div>
            <div class="corner-decor corner-tr"></div>
            <div class="corner-decor corner-bl"></div>
            <div class="corner-decor corner-br"></div>

            <div class="poster-left">
              ${logoUrl ? `<img src="${logoUrl}"><br>` : ""}
              <img src="https://cdn-icons-png.flaticon.com/512/93/93158.png" style="height:100px;margin:10px 0;">
              <h3>WI-FI<br>AVAILABLE HERE</h3>
            </div>

            <div class="poster-right">
              <h4>Network Name: ${ssid}</h4>
              <h4>Password: ${pass}</h4>
              <p><b>Scan Me!</b></p>
              <img src="${qrUrl}" style="width:180px;height:180px;">
            </div>
          </div>`;
      });
    }

    // Download poster
    function downloadPoster() {
      const poster = document.getElementById("posterPreview");
      html2canvas(poster).then(canvas => {
        const link = document.createElement("a");
        link.download = "wifi-poster.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
