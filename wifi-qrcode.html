<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tạo Poster WiFi QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .form-container {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: inline-block;
      margin-bottom: 20px;
    }
    input, select {
      padding: 8px;
      margin: 5px;
      width: 220px;
    }
    button {
      padding: 10px 18px;
      margin: 8px;
      border: none;
      background: #3B5C94;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #2d4670; }

    /* Poster chung */
    .poster-horizontal, .poster-vertical {
      border: 2px solid #000;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    .poster-horizontal {
      width: 800px;
      height: 600px;
    }
    .poster-vertical {
      width: 600px;
      height: 800px;
    }
    .wifi-logo {
      height: 80px;
      margin-bottom: 10px;
    }
    .poster-title {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }
    .poster-qr {
      margin: 20px 0;
    }
    .poster-text {
      font-size: 18px;
      margin: 5px 0;
    }
    .logo img {
      height: 120px;
      max-width: 300px;
      object-fit: contain;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>Tạo Poster WiFi QR</h2>

  <div class="form-container">
    <input type="text" id="ssid" placeholder="Tên WiFi (SSID)" /><br>
    <input type="password" id="password" placeholder="Mật khẩu WiFi" /><br>
    <select id="security">
      <option value="WPA">WPA/WPA2</option>
      <option value="WEP">WEP</option>
      <option value="nopass">Không mật khẩu</option>
    </select><br>
    <input type="file" id="logoUpload" accept="image/*"><br>
    <button onclick="generatePoster('horizontal')">Tạo Poster Ngang</button>
    <button onclick="generatePoster('vertical')">Tạo Poster Dọc</button>
  </div>

  <div id="posterResult"></div>

  <script>
    let uploadedLogo = "";

    // Xử lý upload logo
    document.getElementById("logoUpload").addEventListener("change", function(event){
      const file = event.target.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = function(e){
          uploadedLogo = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

    // Tạo QRCode -> trả về <img>
    function createQRCode(text, callback){
      const tempDiv = document.createElement("div");
      const qr = new QRCode(tempDiv, {
        text: text,
        width: 200,
        height: 200,
      });
      setTimeout(()=>{
        const qrCanvas = tempDiv.querySelector("canvas");
        if(qrCanvas){
          const qrImg = document.createElement("img");
          qrImg.src = qrCanvas.toDataURL("image/png");
          callback(qrImg);
        }
      },500);
    }

    // Tạo Poster
    function generatePoster(type){
      const ssid = document.getElementById("ssid").value;
      const password = document.getElementById("password").value;
      const security = document.getElementById("security").value;

      if(!ssid){ alert("Vui lòng nhập tên WiFi (SSID)!"); return; }

      const wifiString = `WIFI:T:${security};S:${ssid};P:${password};;`;

      createQRCode(wifiString, function(qrImg){
        const posterDiv = document.createElement("div");
        posterDiv.className = (type==="horizontal") ? "poster-horizontal" : "poster-vertical";

        // Logo
        if(uploadedLogo){
          const logoDiv = document.createElement("div");
          logoDiv.className = "logo";
          const logoImg = document.createElement("img");
          logoImg.src = uploadedLogo;
          logoDiv.appendChild(logoImg);
          posterDiv.appendChild(logoDiv);
        }

        // Icon wifi
        const wifiIcon = document.createElement("img");
        wifiIcon.src = "/upload/logo.png"; // bạn đổi theo repo GitHub Page
        wifiIcon.className = "wifi-logo";
        posterDiv.appendChild(wifiIcon);

        // Title
        const title = document.createElement("div");
        title.className = "poster-title";
        title.innerText = "WI-FI\nAVAILABLE HERE";
        posterDiv.appendChild(title);

        // QRCode
        const qrDiv = document.createElement("div");
        qrDiv.className = "poster-qr";
        qrDiv.appendChild(qrImg);
        posterDiv.appendChild(qrDiv);

        // Thông tin
        const textSSID = document.createElement("div");
        textSSID.className = "poster-text";
        textSSID.innerText = "SSID: " + ssid;
        posterDiv.appendChild(textSSID);

        if(security !== "nopass"){
          const textPass = document.createElement("div");
          textPass.className = "poster-text";
          textPass.innerText = "Password: " + password;
          posterDiv.appendChild(textPass);
        }

        // Clear cũ + hiển thị mới
        const result = document.getElementById("posterResult");
        result.innerHTML = "";
        result.appendChild(posterDiv);

        // Chụp poster -> tải ảnh
        html2canvas(posterDiv).then(canvas=>{
          const link = document.createElement("a");
          link.download = (type==="horizontal") ? "poster_ngang.png" : "poster_doc.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      });
    }
  </script>
</body>
</html>
