<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Wi-Fi QR Code Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { padding-top: 80px; background: #f8f9fa; }
    .poster, .poster-vertical {
      background: white; border: 2px solid #ddd; margin: 20px auto; padding: 20px;
      display: flex; align-items: center; justify-content: space-around; position: relative;
    }
    .poster { width: 900px; height: 400px; flex-direction: row; }
    .poster-vertical { width: 450px; height: 650px; flex-direction: column; justify-content: flex-start; }
    .logo img { max-height: 120px; max-width: 300px; object-fit: contain; display: block; margin: 0 auto; }
    .wifi-custom { max-height: 100px; display:block; margin:10px auto; }
    .title { 
      color: #202060; font-weight: bold; margin-top: 15px; 
      font-size: 22px; text-align:center; 
    }
    .info-box, .info-box-vertical {
      border: 2px solid #202060; padding: 15px; margin-top: 15px;
      display: flex; align-items: center; justify-content: center;
    }
    .info-box-vertical { flex-direction: column; }
    .wifi-info { font-size: 20px; color: #202060; margin-bottom: 10px; }
    .qr { width: 150px; height: 150px; }
    .hand { font-size: 40px; margin-top: 10px; color: #202060; text-align:center; }
    .btn-download { margin: 10px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #3B5C94;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📥 Upload Dữ Liệu</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline">Đề cương Đóng góp</a></li>
        <li class="nav-item"><a class="nav-link active bg-primary rounded px-2" href="#wifi">Wi-Fi QR Generator</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Form nhập WiFi -->
<div class="container" id="wifi">
  <div class="card shadow-sm p-4">
    <h3 class="text-center mb-4">📶 Tạo Poster QR Wi-Fi</h3>
    <form id="wifiForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Tên Wi-Fi (SSID):</label>
        <input type="text" id="ssid" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Mật khẩu:</label>
        <input type="text" id="password" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Bảo mật Wi-Fi:</label>
        <select id="encryption" class="form-select">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">None</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Logo:</label>
        <input type="file" id="logoUpload" class="form-control" accept="image/*">
      </div>
      <div class="col-md-12">
        <label class="form-label">Loại Poster:</label>
        <select id="orientation" class="form-select">
          <option value="horizontal">Ngang</option>
          <option value="vertical">Dọc</option>
        </select>
      </div>
      <div class="col-md-12 text-center">
        <button type="submit" class="btn btn-success">Tạo Poster</button>
      </div>
    </form>
  </div>
</div>

<!-- Kết quả Poster -->
<div id="result" class="text-center"></div>

<script>
let uploadedLogo = "";
const wifiIconUrl = "upload/logo.png"; // icon WiFi mặc định trong repo

document.getElementById("logoUpload").addEventListener("change", function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){ uploadedLogo = e.target.result; }
    reader.readAsDataURL(file);
  }
});

document.getElementById("wifiForm").addEventListener("submit", function(e){
  e.preventDefault();
  const ssid = document.getElementById("ssid").value;
  const password = document.getElementById("password").value;
  const encryption = document.getElementById("encryption").value;
  const type = document.getElementById("orientation").value;

  let wifiString = `WIFI:T:${encryption};S:${ssid};`;
  if(encryption !== "nopass") wifiString += `P:${password};`;
  wifiString += ";";

  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(wifiString)}&size=200x200`;

  // logo upload auto scale
  const logoHtml = uploadedLogo ? `<div class="logo"><img src="${uploadedLogo}" alt="Logo"></div>` : "";
  const wifiIconHtml = `<img src="${wifiIconUrl}" class="wifi-custom" alt="WiFi Icon">`;

  let poster = "";
  if (type === "horizontal") {
    poster = `
    <div id="poster" class="poster">
      <div class="left text-center">
        ${logoHtml}
        ${wifiIconHtml}
        <div class="title">WI-FI AVAILABLE HERE</div>
      </div>
      <div class="info-box">
        <div>
          <div class="wifi-info">Network Name: <b>${ssid}</b></div>
          <div class="wifi-info">Password: <b>${password || "(No Password)"}</b></div>
          <div style="text-align:center; margin-top:10px;">
            <span style="font-size:18px; color:#202060;">Scan Me!</span><br>
            <div class="hand"> 👇</div>
            <img class="qr" src="${qrUrl}" alt="QR Code">
          </div>
        </div>
      </div>
    </div>`;
  } else {
    poster = `
    <div id="poster" class="poster-vertical text-center">
      ${logoHtml}
      ${wifiIconHtml}
      <div class="title">WI-FI AVAILABLE HERE</div>
      <div class="info-box-vertical">
        <div class="wifi-info">Network Name: <b>${ssid}</b></div>
        <div class="wifi-info">Password: <b>${password || "(No Password)"}</b></div>
        <div style="text-align:center; margin-top:10px;">
          <span style="font-size:18px; color:#202060;">Scan Me!</span><br>
          <div class="hand"> 👇</div>
          <img class="qr" src="${qrUrl}" alt="QR Code">
        </div>
      </div>
    </div>`;
  }

  document.getElementById("result").innerHTML = poster + `
    <button class="btn btn-primary btn-download" onclick="downloadPoster()">📥 Tải Poster</button>
  `;
});

function downloadPoster() {
  const element = document.getElementById("poster");
  html2canvas(element).then(canvas => {
    const link = document.createElement("a");
    link.download = "wifi-poster.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>
</body>
</html>
