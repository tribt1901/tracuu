<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Wi-Fi QR Code Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { padding-top: 80px; background: #f8f9fa; }
    .poster, .poster-vertical {
      background: white; border: 2px solid #202060; margin: 20px auto; padding: 20px;
      display: flex; align-items: center; justify-content: space-around; position: relative;
    }
    /* Khung ngang: width nhỏ lại, padding đều, cân đối */
    .poster { width: 640px; height: 320px; flex-direction: row; }
    /* Khung dọc: sửa lại lỗi căn giữa, padding, khối info-box nhỏ gọn, không bị tràn */
    .poster-vertical { 
      width: 340px; height: 500px; 
      flex-direction: column; 
      justify-content: flex-start; 
      align-items: center; 
      padding: 20px 12px;
    }
    .logo img { max-height: 80px; max-width: 180px; object-fit: contain; display: block; margin: 0 auto 4px auto; }
    .wifi-custom { max-height: 60px; display:block; margin:10px auto; }
    .title { 
      color: #202060; font-weight: bold; margin: 12px 0 8px 0;
      font-size: 20px; text-align:center; letter-spacing: 2px;
    }
    .info-box, .info-box-vertical {
      border: 2px solid #202060; padding: 12px; margin-top: 10px;
      display: flex; align-items: center; justify-content: center;
      background: #fdfdfd;
    }
    .info-box { min-width: 220px; max-width: 270px; }
    .info-box-vertical { 
      flex-direction: column; 
      width: 100%; 
      min-height: 180px; max-width: 95%; box-sizing: border-box; 
      margin-top: 8px; 
    }
    .wifi-info { font-size: 16px; color: #202060; margin-bottom: 6px; word-break: break-all;}
    .wifi-label { font-weight: normal; color: #202060; }
    .wifi-value { font-weight: bold; color: #202060; }
    .qr { width: 120px; height: 120px; }
    .hand { font-size: 30px; margin-top: 6px; color: #202060; text-align:center; }
    .btn-download { margin: 10px; }
    @media (max-width: 700px) {
      .poster { width: 98vw; height: auto; flex-direction: column; }
      .poster-vertical { width: 96vw; min-width: 170px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #3B5C94;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📥 Upload Dữ Liệu</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline">Đề cương Đóng góp</a></li>
        <li class="nav-item"><a class="nav-link active bg-primary rounded px-2" href="#wifi">Wi-Fi QR Generator</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Form nhập WiFi -->
<div class="container" id="wifi">
  <div class="card shadow-sm p-4">
    <h3 class="text-center mb-4">📶 Tạo Poster QR Wi-Fi</h3>
    <form id="wifiForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Tên Wi-Fi (SSID):</label>
        <input type="text" id="ssid" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Mật khẩu:</label>
        <input type="text" id="password" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Bảo mật Wi-Fi:</label>
        <select id="encryption" class="form-select">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">None</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Logo:</label>
        <input type="file" id="logoUpload" class="form-control" accept="image/*">
      </div>
      <div class="col-md-12">
        <label class="form-label">Loại Poster:</label>
        <select id="orientation" class="form-select">
          <option value="horizontal">Ngang</option>
          <option value="vertical">Dọc</option>
        </select>
      </div>
      <div class="col-md-12 text-center">
        <button type="submit" class="btn btn-success">Tạo Poster</button>
      </div>
    </form>
  </div>
</div>

<!-- Kết quả Poster -->
<div id="result" class="text-center"></div>

<script>
let uploadedLogo = "";
const wifiIconUrl = "upload/logo.png"; // icon WiFi mặc định trong repo

// Xử lý upload logo
document.getElementById("logoUpload").addEventListener("change", function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){ uploadedLogo = e.target.result; }
    reader.readAsDataURL(file);
  }
});

// Submit form -> tạo poster
document.getElementById("wifiForm").addEventListener("submit", function(e){
  e.preventDefault();
  const ssid = document.getElementById("ssid").value;
  const password = document.getElementById("password").value;
  const encryption = document.getElementById("encryption").value;
  const type = document.getElementById("orientation").value;

  let wifiString = `WIFI:T:${encryption};S:${ssid};`;
  if(encryption !== "nopass") wifiString += `P:${password};`;
  wifiString += ";";

  // tạo QRCode bằng thư viện -> để chắc chắn khi download có QR
  const qrDiv = document.createElement("div");
  new QRCode(qrDiv, { text: wifiString, width: 120, height: 120 });
  setTimeout(()=>{
    const qrCanvas = qrDiv.querySelector("canvas");
    const qrImg = qrCanvas.toDataURL("image/png");

    // logo upload auto scale
    const logoHtml = uploadedLogo ? `<div class="logo"><img src="${uploadedLogo}" alt="Logo"></div>` : "";
    const wifiIconHtml = `<img src="${wifiIconUrl}" class="wifi-custom" alt="WiFi Icon">`;

    // Phần khung ngang
    let poster = "";
    if (type === "horizontal") {
      poster = `
      <div id="poster" class="poster">
        <div class="left text-center" style="flex:1; min-width:120px;">
          ${logoHtml}
          ${wifiIconHtml}
          <div class="title">WI-FI AVAILABLE HERE</div>
        </div>
        <div class="info-box">
          <div style="width:100%;">
            <div class="wifi-info"><span class="wifi-label">Network Name:</span> <span class="wifi-value">${ssid}</span></div>
            <div class="wifi-info"><span class="wifi-label">Password:</span> <span class="wifi-value">${password || "(No Password)"}</span></div>
            <div style="text-align:center; margin-top:8px;">
              <span style="font-size:15px; color:#202060;">Scan Me!</span><br>
              <div class="hand">👇</div>
              <img class="qr" src="${qrImg}" alt="QR Code">
            </div>
          </div>
        </div>
      </div>`;
    } else {
      // Khung dọc, fix lỗi tràn và bố cục
      poster = `
      <div id="poster" class="poster-vertical text-center">
        ${logoHtml}
        ${wifiIconHtml}
        <div class="title">WI-FI AVAILABLE HERE</div>
        <div class="info-box-vertical">
          <div class="wifi-info"><span class="wifi-label">Network Name:</span> <span class="wifi-value">${ssid}</span></div>
          <div class="wifi-info"><span class="wifi-label">Password:</span> <span class="wifi-value">${password || "(No Password)"}</span></div>
          <div style="text-align:center; margin-top:6px;">
            <span style="font-size:15px; color:#202060;">Scan Me!</span><br>
            <div class="hand">👇</div>
            <img class="qr" src="${qrImg}" alt="QR Code">
          </div>
        </div>
      </div>`;
    }

    document.getElementById("result").innerHTML = poster + `
      <button class="btn btn-primary btn-download" onclick="downloadPoster()">📥 Tải Poster</button>
    `;
  },350);
});

// Tải poster thành ảnh
function downloadPoster() {
  const element = document.getElementById("poster");
  html2canvas(element).then(canvas => {
    const link = document.createElement("a");
    link.download = "wifi-poster.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>
</body>
</html>
