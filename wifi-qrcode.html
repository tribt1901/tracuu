<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tạo mã QR Wi‑Fi</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- QRCode JS -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding-top: 80px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .container { max-width: 960px; }
    .card {
      background: #1e293b;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }
    .form-control, .form-select {
      background-color: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
    }
    .form-control:focus, .form-select:focus {
      background-color: #334155;
      color: #fff;
      border-color: #60a5fa;
      box-shadow: none;
    }
    .qr-image {
      background: #fff;
      padding: 10px;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
    }
    .online-counter-box {
      font-size: 14px;
      background-color: rgba(255,255,255,0.06);
      padding: 8px 12px;
      border-radius: 8px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<!-- 🔵 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" style="background-color:#3B5C94">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link" href="/export">Tài liệu học</a></li>
        <li class="nav-item"><a class="nav-link" href="/outline">Đề cương</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🔢 Số người online -->
<div class="container mt-2">
  <div class="online-counter-box text-center mb-3">
    🟢 Hiện có <span id="online-counter">0</span> người đang truy cập hệ thống.
  </div>
</div>

<!-- 📦 Form tạo mã QR -->
<div class="container">
  <div class="card p-4 mb-4">
    <h3 class="mb-3 text-info">📶 Tạo mã QR để kết nối Wi‑Fi</h3>

    <div class="mb-3">
      <label class="form-label">🔹 Tên mạng (SSID)</label>
      <input type="text" class="form-control" id="ssid" placeholder="Nhập SSID (ví dụ: MyWiFi)" />
    </div>

    <div class="mb-3">
      <label class="form-label">🔐 Mật khẩu</label>
      <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu (nếu có)" />
    </div>

    <div class="mb-3">
      <label class="form-label">🔒 Kiểu bảo mật</label>
      <select class="form-select" id="auth">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">Không mật khẩu</option>
      </select>
    </div>

    <div class="form-check mb-3">
      <input type="checkbox" class="form-check-input" id="hidden">
      <label class="form-check-label" for="hidden">🔒 Mạng ẩn (Hidden)</label>
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-primary" onclick="generateQRCode()">Tạo QR</button>
      <button class="btn btn-secondary" onclick="copyText()">📋 Sao chép chuỗi Wi-Fi</button>
      <button class="btn btn-danger" onclick="resetForm()">🧹 Xóa</button>
    </div>
  </div>

  <!-- 🖼️ Kết quả -->
  <div class="card p-4 text-center">
    <h5 class="text-success mb-3">🔍 Kết quả QR:</h5>
    <img id="qrImage" class="qr-image" src="" alt="QR Code" style="display:none" />
    <p id="emptyText" class="text-muted">Nhập thông tin và nhấn "Tạo QR" để bắt đầu.</p>

    <div class="mt-3">
      <a id="downloadBtn" class="btn btn-outline-light me-2" download="wifi-qr.png" style="display:none">⬇️ Tải ảnh PNG</a>
      <button id="copyImgBtn" class="btn btn-outline-light" style="display:none" onclick="copyImage()">📸 Sao chép ảnh</button>
    </div>
  </div>
</div>

<!-- 🧠 Script tạo QR -->
<script>
  function escapeValue(str) {
    return String(str || '').replace(/([\\;,":])/g, '\\$1');
  }

  function buildWifiString(ssid, password, auth, hidden) {
    let result = `WIFI:T:${auth};S:${escapeValue(ssid)};`;
    if (auth !== 'nopass') result += `P:${escapeValue(password)};`;
    if (hidden) result += 'H:true;';
    result += ';';
    return result;
  }

  function generateQRCode() {
    const ssid = document.getElementById('ssid').value.trim();
    const password = document.getElementById('password').value;
    const auth = document.getElementById('auth').value;
    const hidden = document.getElementById('hidden').checked;

    if (!ssid) {
      alert('Vui lòng nhập tên mạng (SSID)');
      return;
    }

    const wifiString = buildWifiString(ssid, password, auth, hidden);

    QRCode.toDataURL(wifiString, {
      errorCorrectionLevel: 'H',
      type: 'image/png',
      margin: 2,
      width: 300,
      color: {
        dark: '#000000',
        light: '#ffffff'
      }
    }, function (err, url) {
      if (err) {
        console.error(err);
        alert('Lỗi tạo mã QR');
        return;
      }

      const qrImage = document.getElementById('qrImage');
      qrImage.src = url;
      qrImage.style.display = 'block';
      document.getElementById('emptyText').style.display = 'none';

      const downloadBtn = document.getElementById('downloadBtn');
      const copyImgBtn = document.getElementById('copyImgBtn');
      downloadBtn.href = url;
      downloadBtn.style.display = 'inline-block';
      copyImgBtn.style.display = 'inline-block';
    });
  }

  function resetForm() {
    document.getElementById('ssid').value = '';
    document.getElementById('password').value = '';
    document.getElementById('auth').value = 'WPA';
    document.getElementById('hidden').checked = false;
    document.getElementById('qrImage').style.display = 'none';
    document.getElementById('emptyText').style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('copyImgBtn').style.display = 'none';
  }

  function copyText() {
    const ssid
