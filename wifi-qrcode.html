<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VNVC WiFi Poster</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f8f8f8;
      margin: 20px;
    }
    .poster {
      width: 900px;
      height: 400px;
      background: white;
      border: 2px solid #ddd;
      margin: 20px auto;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      position: relative;
    }
    .poster-vertical {
      width: 450px;
      height: 650px;
      background: white;
      border: 2px solid #ddd;
      margin: 20px auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
    }
    .logo {
      text-align: center;
      margin-bottom: 10px;
    }
    .logo img {
      height: 60px;
    }
    .wifi-icon {
      font-size: 120px;
      color: #f4b400; /* vàng */
    }
    .text {
      color: #202060;
      font-weight: bold;
      margin: 10px 0;
      font-size: 22px;
    }
    .info-box {
      border: 2px solid #202060;
      padding: 15px;
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info-box-vertical {
      border: 2px solid #202060;
      padding: 15px;
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wifi-info {
      font-size: 20px;
      color: #202060;
      margin-bottom: 10px;
    }
    .qr {
      width: 150px;
      height: 150px;
    }
    .hand {
      font-size: 50px;
      margin-left: 15px;
      color: #202060;
    }
    .btn {
      margin: 15px;
      padding: 10px 20px;
      border: none;
      background: #202060;
      color: white;
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
    }
    .btn:hover {
      background: #404080;
    }
  </style>
</head>
<body>
  <h1>VNVC WiFi Poster Generator</h1>

  <!-- Poster ngang -->
  <div id="poster-horizontal" class="poster">
    <div class="left">
      <div class="logo">
        <img src="https://i.imgur.com/lFS3npg.png" alt="VNVC Logo">
      </div>
      <div class="wifi-icon">📶</div>
      <div class="text">WI-FI AVAILABLE HERE</div>
    </div>
    <div class="info-box">
      <div>
        <div class="wifi-info">Network Name: <b>VNVC Guest</b></div>
        <div class="wifi-info">Password: <b>Vnvc@MFG</b></div>
        <div style="display: flex; align-items: center; margin-top: 10px;">
          <span style="font-size:18px; color:#202060; margin-right:10px;">Scan Me!</span>
          <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?data=WIFI:T:WPA;S:VNVC%20Guest;P:Vnvc@MFG;;" alt="QR Code">
          <div class="hand">👉</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Poster dọc -->
  <div id="poster-vertical" class="poster-vertical">
    <div class="logo">
      <img src="https://i.imgur.com/lFS3npg.png" alt="VNVC Logo">
    </div>
    <div class="wifi-icon">📶</div>
    <div class="text">WI-FI AVAILABLE HERE</div>
    <div class="info-box-vertical">
      <div class="wifi-info">Network Name: <b>VNVC Guest</b></div>
      <div class="wifi-info">Password: <b>Vnvc@MFG</b></div>
      <div style="display: flex; align-items: center; margin-top: 10px;">
        <span style="font-size:18px; color:#202060; margin-right:10px;">Scan Me!</span>
        <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?data=WIFI:T:WPA;S:VNVC%20Guest;P:Vnvc@MFG;;" alt="QR Code">
        <div class="hand">👉</div>
      </div>
    </div>
  </div>

  <!-- Nút tải -->
  <button class="btn" onclick="downloadPoster('poster-horizontal', 'poster-horizontal.png')">Tải Poster Ngang</button>
  <button class="btn" onclick="downloadPoster('poster-vertical', 'poster-vertical.png')">Tải Poster Dọc</button>

  <script>
    function downloadPoster(id, filename) {
      const element = document.getElementById(id);
      html2canvas(element).then(canvas => {
        const link = document.createElement("a");
        link.download = filename;
        link.href = canvas.toDataURL();
        link.click();
      });
    }
  </script>
</body>
</html>
