<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Poster Wi-Fi Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- QRCode + html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body {
      background: #f9f9f9;
      color: #333;
    }
    .poster-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      display: inline-block;
    }
    .poster-box h4 {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body class="container py-4">

  <h2 class="mb-4">📶 Tạo Poster Wi-Fi</h2>

  <!-- Form -->
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Tên Wi-Fi (SSID)</label>
      <input type="text" class="form-control" id="ssid" placeholder="Nhập tên Wi-Fi">
    </div>
    <div class="col-md-6">
      <label class="form-label">Mật khẩu</label>
      <input type="text" class="form-control" id="password" placeholder="Nhập mật khẩu">
    </div>
    <div class="col-md-6">
      <label class="form-label">Upload Logo</label>
      <input type="file" class="form-control" id="logoInput" accept="image/*">
    </div>
    <div class="col-md-6">
      <label class="form-label">Bố cục Poster</label>
      <select class="form-select" id="layout">
        <option value="landscape">Hình ngang</option>
        <option value="portrait">Hình dọc</option>
      </select>
    </div>
  </div>

  <!-- Nút render -->
  <div class="mt-3">
    <button class="btn btn-primary" onclick="renderPoster()">🔄 Tạo Poster</button>
    <button class="btn btn-success" onclick="downloadPoster()">⬇️ Tải Poster PNG</button>
  </div>

  <!-- Preview -->
  <div id="posterPreview" class="poster-box mt-4 text-center">
    <p><i>Poster Wi-Fi sẽ hiển thị ở đây...</i></p>
  </div>

  <script>
    let logoUrl = "";

    // Upload logo
    document.getElementById("logoInput").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          logoUrl = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Render poster
    function renderPoster() {
      const ssid = document.getElementById('ssid').value || "MyWiFi";
      const pass = document.getElementById('password').value || "12345678";
      const layout = document.getElementById("layout").value;
      const wifiString = `WIFI:T:WPA;S:${ssid};P:${pass};;`;

      QRCode.toDataURL(wifiString, { width: 200 }, function(err, qrUrl) {
        if (err) return;

        let html = "";
        if (layout === "landscape") {
          html = `
            <div style="display:flex;align-items:center;justify-content:space-around;width:600px;height:300px;">
              <div style="text-align:center;">
                ${logoUrl ? `<img src="${logoUrl}" style="height:60px;margin-bottom:10px;"><br>` : ""}
                <h4>${ssid}</h4>
                <p><b>Password:</b> ${pass}</p>
              </div>
              <div>
                <img src="${qrUrl}" style="width:180px;height:180px;">
              </div>
            </div>`;
        } else {
          html = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:400px;height:600px;">
              ${logoUrl ? `<img src="${logoUrl}" style="height:80px;margin-bottom:10px;">` : ""}
              <h4>${ssid}</h4>
              <p><b>Password:</b> ${pass}</p>
              <img src="${qrUrl}" style="width:220px;height:220px;margin-top:10px;">
            </div>`;
        }

        document.getElementById("posterPreview").innerHTML = html;
      });
    }

    // Download poster
    function downloadPoster() {
      const poster = document.getElementById("posterPreview");
      html2canvas(poster).then(canvas => {
        const link = document.createElement("a");
        link.download = "wifi-poster.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
