<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Wi-Fi QR Code Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { padding-top: 80px; background: #f8f9fa; }

    .poster, .poster-vertical {
      background: white; border: 2px solid #202060; margin: 20px auto; padding: 0;
      display: flex; position: relative; box-sizing: border-box;
    }
    /* ========== POSTER NGANG ========== */
    .poster { 
      width: 1000px; height: 500px;
      flex-direction: row; 
      justify-content: space-between;
      align-items: stretch;
    }
    .poster .left-area {
      flex: 1 1 0; 
      display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      min-width: 0; min-height: 0;
      padding: 0 0 36px 0;
      border: none;
      position: relative;
    }
    /* Nhóm logo+wifi icon: chiếm vùng lớn, logo không bao giờ nhỏ hơn chữ dưới */
    .poster .logo-wifi-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      flex: 1 1 0;
      max-height: 66%;
      min-height: 200px;
      width: 100%;
      gap: 16px;
      margin-bottom: 0;
      margin-top: 30px;
    }
    .poster .logo {
      width: 100%; max-width: 390px; max-height: 110px;
      display: flex; align-items: center; justify-content: center;
    }
    .poster .logo img { 
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }
    .poster .wifi-custom { 
      max-width: 110px; max-height: 70px; width: auto; height: auto;
      display: block; object-fit: contain; margin: 0 auto;
    }
    /* Chữ lớn, sát cạnh dưới khối trái */
    .poster .title {
      color: #202060; font-weight: bold;
      font-size: 42px; text-align:center; letter-spacing: 3px; margin-top: 28px;
      margin-bottom: 0;
      width: 100%;
      line-height: 1.1;
    }

    .poster .info-box {
      flex: 0 0 355px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border: 2px solid #202060; background: #fdfdfd;
      margin: 32px 34px 32px 0;
      align-self: center;
      box-sizing: border-box;
      height: 92%;
      min-height: 265px;
      max-height: 410px;
      padding: 0 18px;
    }
    .poster .info-content {
      width: 100%; text-align: center;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 13px;
    }
    .poster .wifi-info { font-size: 24px; color: #202060; margin-bottom: 0; word-break: break-all; font-weight: bold;}
    .poster .wifi-label { font-weight: normal; color: #202060; }
    .poster .wifi-value { font-weight: bold; color: #202060; }
    .poster .scan-block { display: flex; flex-direction: column; align-items: center; margin-top: 8px; }
    .poster .hand { font-size: 30px; margin: 0; color: #202060; }
    .poster .qr { width: 150px; height: 150px; margin-top: 2px;}
    /* ========== POSTER DỌC ========== */
    .poster-vertical { 
      width: 340px; height: 540px; 
      flex-direction: column;
      justify-content: space-between;
      align-items: center; 
      padding: 24px 10px 24px 10px;
      border: 2px solid #202060;
      background: #fff;
    }
    .pv-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .poster-vertical .logo {
      width: 78%; max-width: 200px; max-height: 95px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 3px auto;
    }
    .poster-vertical .logo img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      width: auto; height: auto;
      display: block;
      margin: 0 auto;
      aspect-ratio: 3/2;
    }
    .poster-vertical .wifi-custom { max-height: 44px; margin: 8px auto 0 auto; object-fit: contain;}
    .poster-vertical .title { color: #202060; font-weight: bold; margin: 10px 0 5px 0; font-size: 22px; text-align:center; letter-spacing: 2px; }
    .poster-vertical .info-box-vertical { 
      border: 2px solid #202060; 
      background: #fdfdfd;
      width: 100%; max-width: 95%; min-height: 168px;
      margin: 0 auto; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 4px;
      box-sizing: border-box;
    }
    .poster-vertical .wifi-info { font-size: 16px; color: #202060; margin-bottom: 3px; word-break: break-all;}
    .poster-vertical .wifi-label { font-weight: normal; color: #202060; }
    .poster-vertical .wifi-value { font-weight: bold; color: #202060; }
    .poster-vertical .scan-block { display: flex; flex-direction: column; align-items: center; margin-top: 6px; }
    .poster-vertical .hand { font-size: 24px; margin: 2px 0 2px 0; color: #202060; }
    .poster-vertical .qr { width: 120px; height: 120px; }
    /* Responsive */
    @media (max-width: 1100px) {
      .poster { width: 98vw; height: auto; flex-direction: column; }
      .poster-vertical { width: 96vw; min-width: 170px; }
      .poster .logo-wifi-group {max-height: none;}
    }
    .btn-download { margin: 10px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #3B5C94;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📥 Upload Dữ Liệu</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline">Đề cương Đóng góp</a></li>
        <li class="nav-item"><a class="nav-link active bg-primary rounded px-2" href="#wifi">Wi-Fi QR Generator</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Form nhập WiFi -->
<div class="container" id="wifi">
  <div class="card shadow-sm p-4">
    <h3 class="text-center mb-4">📶 Tạo Poster QR Wi-Fi</h3>
    <form id="wifiForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Tên Wi-Fi (SSID):</label>
        <input type="text" id="ssid" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Mật khẩu:</label>
        <input type="text" id="password" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Bảo mật Wi-Fi:</label>
        <select id="encryption" class="form-select">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">None</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Logo:</label>
        <input type="file" id="logoUpload" class="form-control" accept="image/*">
      </div>
      <div class="col-md-12">
        <label class="form-label">Loại Poster:</label>
        <select id="orientation" class="form-select">
          <option value="horizontal">Ngang</option>
          <option value="vertical">Dọc</option>
        </select>
      </div>
      <div class="col-md-12 text-center">
        <button type="submit" class="btn btn-success">Tạo Poster</button>
      </div>
    </form>
  </div>
</div>

<!-- Kết quả Poster -->
<div id="result" class="text-center"></div>

<script>
let uploadedLogo = "";
const wifiIconUrl = "upload/logo.png"; // icon WiFi mặc định trong repo

document.getElementById("logoUpload").addEventListener("change", function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){ uploadedLogo = e.target.result; }
    reader.readAsDataURL(file);
  }
});

document.getElementById("wifiForm").addEventListener("submit", function(e){
  e.preventDefault();
  const ssid = document.getElementById("ssid").value;
  const password = document.getElementById("password").value;
  const encryption = document.getElementById("encryption").value;
  const type = document.getElementById("orientation").value;

  let wifiString = `WIFI:T:${encryption};S:${ssid};`;
  if(encryption !== "nopass") wifiString += `P:${password};`;
  wifiString += ";";

  const qrDiv = document.createElement("div");
  new QRCode(qrDiv, { text: wifiString, width: type === "horizontal" ? 150 : 120, height: type === "horizontal" ? 150 : 120 });
  setTimeout(()=>{
    const qrCanvas = qrDiv.querySelector("canvas");
    const qrImg = qrCanvas.toDataURL("image/png");

    const logoHtml = uploadedLogo ? `<div class="logo"><img src="${uploadedLogo}" alt="Logo"></div>` : "";
    const wifiIconHtml = `<img src="${wifiIconUrl}" class="wifi-custom" alt="WiFi Icon">`;

    let poster = "";
    if (type === "horizontal") {
      // Gom logo + wifi icon vào 1 khối, luôn lớn, sát nhau, không bị nhỏ hơn chữ
      poster = `
      <div id="poster" class="poster">
        <div class="left-area">
          <div class="logo-wifi-group">
            ${logoHtml}
            ${wifiIconHtml}
          </div>
          <div class="title">WI-FI AVAILABLE HERE</div>
        </div>
        <div class="info-box">
          <div class="info-content">
            <div class="wifi-info"><span class="wifi-label">Network Name:</span> <span class="wifi-value">${ssid}</span></div>
            <div class="wifi-info"><span class="wifi-label">Password:</span> <span class="wifi-value">${password || "(No Password)"}</span></div>
            <div class="scan-block">
              <span style="font-size:18px; color:#202060;">Scan Me!</span>
              <div class="hand">👇</div>
              <img class="qr" src="${qrImg}" alt="QR Code">
            </div>
          </div>
        </div>
      </div>`;
    } else {
      poster = `
      <div id="poster" class="poster-vertical">
        <div class="pv-header">
          ${logoHtml}
          ${wifiIconHtml}
          <div class="title">WI-FI AVAILABLE HERE</div>
        </div>
        <div class="info-box-vertical">
          <div class="wifi-info"><span class="wifi-label">Network Name:</span> <span class="wifi-value">${ssid}</span></div>
          <div class="wifi-info"><span class="wifi-label">Password:</span> <span class="wifi-value">${password || "(No Password)"}</span></div>
          <div class="scan-block">
            <span style="font-size:15px; color:#202060;">Scan Me!</span>
            <div class="hand">👇</div>
            <img class="qr" src="${qrImg}" alt="QR Code">
          </div>
        </div>
      </div>`;
    }

    document.getElementById("result").innerHTML = poster + `
      <button class="btn btn-primary btn-download" onclick="downloadPoster()">📥 Tải Poster</button>
    `;
  },350);
});

function downloadPoster() {
  const element = document.getElementById("poster");
  html2canvas(element).then(canvas => {
    const link = document.createElement("a");
    link.download = "wifi-poster.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>
</body>
</html>
