<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đề cương môn học</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
body{padding-top:70px;font-family:Roboto,Arial,sans-serif}
.subject-btns .btn{margin-right:6px}
.nav-link,.navbar-brand{font-family:Roboto,Arial,sans-serif}
.subject-title-icon{font-size:1.15em;margin-right:6px}
#pdf-content{display:none}
#pdf-content .pdf-title{text-align:center;font-size:22px;font-weight:700;margin-bottom:12px;margin-top:10px;font-family:Roboto,Arial,sans-serif}
#pdf-content .pdf-table-wrap{display:flex;justify-content:center;width:100%;max-width:100%;box-sizing:border-box}
#pdf-content table{border:2px solid #222;border-collapse:collapse;margin:0 auto;width:100%;max-width:690px;table-layout:fixed;background:#fff;font-size:15px;box-sizing:border-box}
#pdf-content td,#pdf-content th{border:1.5px solid #222!important;padding:6px 8px;word-break:break-word;overflow-wrap:break-word;white-space:pre-line;vertical-align:middle;background:#fff;box-sizing:border-box}
#pdf-content th{background:#fff;font-weight:700;text-align:center}
#pdf-content td.stt,#pdf-content th.stt{width:8%;min-width:38px;max-width:60px;text-align:center;font-size:12px;}
#pdf-content td.question,#pdf-content th.question{width:49%;min-width:110px;max-width:380px}
#pdf-content td.answer,#pdf-content th.answer{width:43%;min-width:100px;max-width:250px}
#pdf-content tr{height:1px}
#pdf-content table,#pdf-content td,#pdf-content th,#pdf-content tr{page-break-inside:avoid!important;break-inside:avoid!important}
.loading-math{color:#4caf50;font-weight:700;margin:8px 0;text-align:center}
@media print{
  #pdf-content,.pdf-table-wrap,body,html,table{width:100%!important;max-width:100%!important;margin:0;padding:0;box-sizing:border-box}
  #pdf-content table{max-width:690px!important}
}
</style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color:#4caf50">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline">Hủ Đề cương</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📂 Tải câu hỏi & đáp án theo môn</h5>
      <div id="subjectList"><div>Đang tải...</div></div>
    </div>
  </div>
</div>
<div id="pdf-content"></div>
<div id="loading-mathjax" class="loading-math" style="display:none">Đang render công thức toán học, vui lòng chờ...</div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92c",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function stripHTML(html) {
  if (!html) return "";
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.textContent?.trim() || "";
}

function getAnswer(q) {
  if (!q || !q.lua_chon || typeof q.dap_an_dung === "undefined" || q.dap_an_dung === null) return "";
  const idx = String(q.dap_an_dung);
  return idx in q.lua_chon ? q.lua_chon[idx] : "";
}

async function getSubjects() {
  return (await db.collection("mon_hoc").get()).docs.map(doc => ({id: doc.id, ...doc.data()}));
}

async function getQuestionsBySubject(subjId) {
  return (await db.collection("cau_hoi").where("mon_hoc_id", "==", subjId).get()).docs.map(doc => doc.data());
}

async function loadSubjects() {
  const listEl = document.getElementById("subjectList");
  listEl.innerHTML = "<div>Đang tải...</div>";
  const subjects = await getSubjects();
  if (subjects.length === 0) {
    listEl.innerHTML = "<div>Không có dữ liệu môn học.</div>";
    return;
  }
  listEl.innerHTML = "";
  subjects.forEach(subj => {
    const el = document.createElement("div");
    el.className = "d-flex align-items-center justify-content-between border-bottom py-2";
    el.innerHTML = `
      <span class="fw-bold"><span class="subject-title-icon">📘</span>${subj.ten_mon}</span>
      <div class="subject-btns">
        <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${subj.id}" data-name="${subj.ten_mon}">📝 TXT</button>
        <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${subj.id}" data-name="${subj.ten_mon}">📄 PDF</button>
      </div>
    `;
    el.querySelector('[data-type="txt"]').addEventListener("click", () => exportTXT(subj.id, subj.ten_mon));
    el.querySelector('[data-type="pdf"]').addEventListener("click", () => exportPDF(subj.id, subj.ten_mon));
    listEl.appendChild(el);
  });
}

async function exportTXT(subjId, subjName) {
  const questions = await getQuestionsBySubject(subjId);
  if (!questions.length) {
    alert("Không có dữ liệu câu hỏi cho môn này.");
    return;
  }
  const arr = questions.map(q => ({
    stt: "13",
    question: stripHTML(q.noi_dung),
    answer: getAnswer(q)
  }));
  // Không cần sort theo stt vì tất cả đều là 13
  let txt = `Đề cương môn: ${subjName}\n\n`;
  arr.forEach(item => {
    txt += `STT: ${item.stt}\nCâu hỏi: ${item.question}\nĐáp án đúng: ${item.answer}\n\n`;
  });
  const blob = new Blob([txt], {type: "text/plain;charset=utf-8"});
  saveAs(blob, `DeCuong_${subjName.replace(/\s+/g, "_")}.txt`);
}

function renderKatexForElement(el) {
  if (el)
    window.renderMathInElement(el, {
      delimiters: [
        {left: "\\[", right: "\\]", display: true},
        {left: "\\(", right: "\\)", display: false}
      ],
      throwOnError: false
    });
}

async function exportPDF(subjId, subjName) {
  const questions = await getQuestionsBySubject(subjId);
  if (!questions || !questions.length) {
    alert("Không có dữ liệu câu hỏi cho môn này.");
    return;
  }
  document.getElementById("loading-mathjax").style.display = "block";
  const arr = questions.map(q => ({
    stt: "13",
    question: q.noi_dung ? String(q.noi_dung) : "",
    answer: getAnswer(q) ? String(getAnswer(q)) : ""
  }));
  // Không cần sort vì STT giống nhau
  let html = `
    <div class="pdf-title">Đề cương môn: ${subjName}</div>
    <div class="pdf-table-wrap">
      <style>
        @import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');
      </style>
      <table>
        <thead>
          <tr>
            <th class="stt" style="text-align:center; vertical-align:middle;">STT</th>
            <th class="question" style="text-align:center; vertical-align:middle;">Câu hỏi</th>
            <th class="answer" style="text-align:center; vertical-align:middle;">Đáp án đúng</th>
          </tr>
        </thead>
        <tbody>
  `;
  arr.forEach(item => {
    html += `<tr>
      <td class="stt" style="text-align:center; font-size:12px;">${item.stt}</td>
      <td class="question">${item.question}</td>
      <td class="answer"><div>${item.answer}</div></td>
    </tr>`;
  });
  html += "</tbody></table></div>";
  const pdfEl = document.getElementById("pdf-content");
  pdfEl.innerHTML = html;
  pdfEl.style.display = "block";
  renderKatexForElement(pdfEl);
  setTimeout(async () => {
    await html2pdf().set({
      margin: [10,10,10,10],
      filename: `DeCuong_${subjName.replace(/\s+/g,"_")}.pdf`,
      html2canvas: {scale:2, useCORS: true},
      jsPDF: {unit:"mm", format:"a4", orientation:"portrait"}
    }).from(pdfEl).save();
    pdfEl.style.display = "none";
    document.getElementById("loading-mathjax").style.display = "none";
  }, 400);
}

loadSubjects();
</script>
</body>
</html>
