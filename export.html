<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Xuất đề cương</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <style>
    body { padding-top: 70px; }
    .subject-btns .btn { margin-right: 6px; }
  </style>
</head>
<body class="bg-light">

<!-- Thanh menu giữ nguyên -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="#">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="#">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Tài liệu</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Đề Cương</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📚 Danh sách môn học (Xuất đề cương)</h5>
      <div id="subjectList"><div>Đang tải...</div></div>
    </div>
  </div>
</div>

<script type="module">
// ==== Dữ liệu mẫu (bạn có thể thay thế bằng dữ liệu thực tế hoặc fetch từ file JSON tĩnh) ====

// Danh sách môn học
const subjects = [
  { id: "math", ten_mon: "Toán học" },
  { id: "phys", ten_mon: "Vật lý" },
  { id: "chem", ten_mon: "Hóa học" }
];

// Dữ liệu đề cương: mỗi môn là 1 mảng các câu hỏi, mỗi câu hỏi gồm: 'question', 'answer'
const outlineData = {
  math: [
    { question: "Số nguyên tố đầu tiên là số nào?", answer: "2" },
    { question: "Căn bậc hai của 9 là?", answer: "3" },
    { question: "5 cộng 7 bằng mấy?", answer: "12" }
  ],
  phys: [
    { question: "Đơn vị của lực là?", answer: "Newton" },
    { question: "Vận tốc ánh sáng là bao nhiêu m/s?", answer: "299792458" }
  ],
  chem: [
    { question: "Kí hiệu hóa học của nước là gì?", answer: "H2O" },
    { question: "Nguyên tố nào có số hiệu nguyên tử là 1?", answer: "Hydrogen" }
  ]
};

// ==== Xây dựng giao diện môn học ====
function loadSubjects() {
  const subjectList = document.getElementById("subjectList");
  subjectList.innerHTML = "";
  subjects.forEach(subj => {
    const div = document.createElement("div");
    div.className = "d-flex align-items-center justify-content-between border-bottom py-2";
    div.innerHTML = `
      <span class="fw-bold">${subj.ten_mon}</span>
      <div class="subject-btns">
        <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${subj.id}">📄 Xuất PDF</button>
      </div>
    `;
    // Sự kiện xuất PDF
    div.querySelector("button").addEventListener("click", () => {
      exportPDF(subj.id, subj.ten_mon);
    });
    subjectList.appendChild(div);
  });
}

// ==== Xuất PDF với 3 cột: Chữ cái đầu, câu hỏi, đáp án ====
function exportPDF(subjectId, subjectName) {
  const data = outlineData[subjectId];
  if (!data || !Array.isArray(data) || data.length === 0) {
    alert("Không có dữ liệu đề cương cho môn này.");
    return;
  }

  // Tạo mảng dữ liệu, thêm chữ cái đầu (a, b, c, ...)
  const alphabet = "abcdefghijklmnopqrstuvwxyz";
  let rows = data.map((item, idx) => ({
    letter: alphabet[idx % 26], // Nếu quá 26 dùng lại a, b, ...
    question: item.question,
    answer: item.answer
  }));

  // Sắp xếp theo chữ cái đầu (thường đã đúng, nhưng vẫn sort cho chắc)
  rows.sort((a, b) => a.letter.localeCompare(b.letter));

  // Dữ liệu cho bảng PDF
  const body = [
    [
      { text: "Câu", style: "tableHeader", alignment: "center" },
      { text: "Câu hỏi", style: "tableHeader", alignment: "center" },
      { text: "Kết quả đúng", style: "tableHeader", alignment: "center" }
    ],
    ...rows.map(row => [
      { text: row.letter, alignment: "center" },
      row.question,
      row.answer
    ])
  ];

  const docDefinition = {
    content: [
      { text: `ĐỀ CƯƠNG MÔN: ${subjectName}`, style: "header", margin: [0, 0, 0, 12] },
      {
        table: {
          headerRows: 1,
          widths: ["6%", "62%", "32%"],
          body: body
        }
      }
    ],
    styles: {
      header: {
        fontSize: 18,
        bold: true,
        alignment: "center"
      },
      tableHeader: {
        bold: true,
        fillColor: "#eeeeee"
      }
    },
    defaultStyle: {
      fontSize: 12
    }
  };

  pdfMake.createPdf(docDefinition).download(`DeCuong_${subjectName.replace(/\s+/g,"_")}.pdf`);
}

// ==== Gọi hàm loadSubjects khi tải trang ====
loadSubjects();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
