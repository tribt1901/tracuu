<script type=module>const firebaseConfig={apiKey:"AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92c",authDomain:"tracuu-d3ee9.firebaseapp.com",projectId:"tracuu-d3ee9",storageBucket:"tracuu-d3ee9.appspot.com",messagingSenderId:"593568604435",appId:"1:593568604435:web:9a5145457a8ee734143ae6"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();async function getSubjects(){return(await db.collection("mon_hoc").get()).docs.map((t=>({id:t.id,...t.data()})))}async function getQuestionsBySubject(t){return(await db.collection("cau_hoi").where("mon_hoc_id","==",t).get()).docs.map((t=>t.data()))}function getFirstPhrase(t){if(!t)return"";const e=document.createElement("div");e.innerHTML=t;const n=e.textContent?.trim()||"",a=n.indexOf(" ");return-1===a?n:n.slice(0,a)}function stripHTML(t){if(!t)return"";const e=document.createElement("div");return e.innerHTML=t,e.textContent?.trim()||""}async function loadSubjects(){const t=document.getElementById("subjectList");t.innerHTML="<div>Đang tải...</div>";const e=await getSubjects();0!==e.length?(t.innerHTML="",e.forEach((e=>{const n=document.createElement("div");n.className="d-flex align-items-center justify-content-between border-bottom py-2",n.innerHTML=`\n        <span class="fw-bold"><span class="subject-title-icon">📘</span>${e.ten_mon}</span>\n        <div class="subject-btns">\n          <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${e.id}" data-name="${e.ten_mon}">📝 TXT</button>\n          <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${e.id}" data-name="${e.ten_mon}">📄 PDF</button>\n        </div>\n      `,n.querySelectorAll("button").forEach((t=>{t.addEventListener("click",(async()=>{const e=t.getAttribute("data-type"),n=t.getAttribute("data-id"),a=t.getAttribute("data-name");"txt"===e?exportTXT(n,a):exportPDF(n,a)}))})),t.appendChild(n)}))):t.innerHTML="<div>Không có dữ liệu môn học.</div>"}async function exportTXT(t,e){const n=await getQuestionsBySubject(t);if(!n.length)return void alert("Không có dữ liệu câu hỏi cho môn này.");const a=n.map((t=>({stt:getFirstPhrase(t.noi_dung),question:stripHTML(t.noi_dung),answer:t.lua_chon?.[t.dap_an_dung]?stripHTML(t.lua_chon[t.dap_an_dung]):""}))).sort(((t,e)=>t.stt.localeCompare(e.stt,"vi")));let i=`Đề cương môn: ${e}\n\n`;a.forEach((t=>{i+=`STT: ${t.stt}\nCâu hỏi: ${t.question}\nĐáp án đúng: ${t.answer}\n\n`}));const s=new Blob([i],{type:"text/plain;charset=utf-8"});saveAs(s,`DeCuong_${e.replace(/\s+/g,"_")}.txt`)}async function exportPDF(t,e){const n=await getQuestionsBySubject(t);if(!n.length)return void alert("Không có dữ liệu câu hỏi cho môn này.");let a=n.map((t=>({stt:getFirstPhrase(t.noi_dung),question:t.noi_dung,answer:t.lua_chon?.[t.dap_an_dung]||""})));a=a.sort(((t,e)=>t.stt.localeCompare(e.stt,"vi")));const i=document.getElementById("pdf-content");let s=`\n      <div class="pdf-title">Đề cương môn: ${e}</div>\n      <div class="pdf-table-wrap">\n        <table>\n          <thead>\n            <tr>\n              <th class="stt" style="text-align:center; vertical-align:middle;">STT</th>\n              <th class="question" style="text-align:center; vertical-align:middle;">Câu hỏi</th>\n              <th class="answer" style="text-align:center; vertical-align:middle;">Đáp án đúng</th>\n            </tr>\n          </thead>\n          <tbody>\n    `;for(const t of a)s+=`<tr>\n        <td class="stt" style="text-align:center;">${t.stt}</td>\n        <td class="question">${t.question}</td>\n        <td class="answer"><div>${t.answer}</div></td>\n      </tr>`;s+="</tbody></table></div>",i.innerHTML=s,i.style.display="block",window.MathJax&&window.MathJax.typesetPromise&&(await MathJax.typesetPromise([i]),i.querySelectorAll(".answer svg").forEach((t=>{t.style.maxWidth="100%",t.style.width="100%",t.style.height="auto",t.setAttribute("preserveAspectRatio","xMinYMin meet");const e=t.parentElement;if(t.clientWidth>e.clientWidth&&e.clientWidth>0){const n=e.clientWidth/t.clientWidth;t.style.transform=`scale(${n})`,t.style.transformOrigin="left top"}}))),await html2pdf().set({margin:10,filename:`DeCuong_${e.replace(/\s+/g,"_")}.pdf`,html2canvas:{scale:2,useCORS:!0},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}}).from(i).save(),i.style.display="none"}loadSubjects()</script>
