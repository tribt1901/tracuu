<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Xuất đề cương</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <style>
    body { padding-top: 70px; }
    .subject-btns .btn { margin-right: 6px; }
  </style>
</head>
<body class="bg-light">

<!-- Thanh menu giữ nguyên -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload.html">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects.html">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export.html">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline.html">Đề Cương</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📚 Danh sách môn học (Xuất đề cương)</h5>
      <div id="subjectList"><div>Đang tải...</div></div>
    </div>
  </div>
</div>

<script type="module">
// Địa chỉ API backend trên Vercel của bạn
const API_BASE = "https://tracuu-app.hugo.io.vn/api";

// Lấy danh sách môn học từ API trên Vercel
async function loadSubjects() {
  const res = await fetch(`${API_BASE}/subjects`);
  const subjects = await res.json();
  const subjectList = document.getElementById("subjectList");
  subjectList.innerHTML = "";
  subjects.forEach(subj => {
    const div = document.createElement("div");
    div.className = "d-flex align-items-center justify-content-between border-bottom py-2";
    div.innerHTML = `
      <span class="fw-bold">${subj.ten_mon}</span>
      <div class="subject-btns">
        <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${subj.id}">📝 TXT</button>
        <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${subj.id}">📄 PDF</button>
      </div>
    `;
    // Sự kiện xuất TXT/PDF
    div.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", async () => {
        const type = btn.getAttribute("data-type");
        const subjectId = btn.getAttribute("data-id");
        const subjectName = subj.ten_mon;
        if (type === "txt") {
          exportTXT(subjectId, subjectName);
        } else {
          exportPDF(subjectId, subjectName);
        }
      });
    });
    subjectList.appendChild(div);
  });
}

// Xuất TXT
async function exportTXT(subjectId, subjectName) {
  try {
    const res = await fetch(`${API_BASE}/export-txt?subject=${encodeURIComponent(subjectId)}`);
    if (!res.ok) throw new Error("Không tải được file TXT");
    const blob = await res.blob();
    const fileName = `DeCuong_${subjectName.replace(/\s+/g,"_")}.txt`;
    saveAs(blob, fileName);
  } catch (e) {
    alert("Không thể tải file TXT. Vui lòng thử lại sau.");
  }
}

// Xuất PDF
async function exportPDF(subjectId, subjectName) {
  try {
    const res = await fetch(`${API_BASE}/export-pdf?subject=${encodeURIComponent(subjectId)}`);
    if (!res.ok) throw new Error("Không tải được file PDF");
    const blob = await res.blob();
    const fileName = `DeCuong_${subjectName.replace(/\s+/g,"_")}.pdf`;
    downloadBlob(blob, fileName);
  } catch (e) {
    alert("Không thể tải file PDF. Vui lòng thử lại sau.");
  }
}

// Tải file về cho user (PDF download fallback)
function downloadBlob(blob, fileName) {
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.style.display = "none";
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  window.URL.revokeObjectURL(url);
  a.remove();
}

// Gọi hàm loadSubjects khi tải trang
loadSubjects();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
