<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tra cứu câu hỏi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body { padding-top: 70px; }
    .answer-correct { background-color: #e6ffe6; font-weight: bold; color: green; }
    .question-img, .answer-img { max-height: 80px; margin: 6px 0 6px 16px; display: block; }
    .subject-btns .btn { margin-right: 6px; }
  </style>
</head>
<body class="bg-light">

<!-- Thanh menu -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline">Đề Cương</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📚 Danh sách môn học</h5>
      <div id="subjectList"></div>
    </div>
  </div>
</div>

<!-- JS LIBS cho xuất file -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92M",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6",
  measurementId: "G-R0M6Y502NP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const subjectList = document.getElementById("subjectList");

// Load danh sách môn học
async function loadSubjects() {
  subjectList.innerHTML = "<div>Đang tải...</div>";
  const snapshot = await getDocs(collection(db, "mon_hoc"));
  subjectList.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    const div = document.createElement("div");
    div.className = "d-flex align-items-center justify-content-between border-bottom py-2";
    div.innerHTML = `
      <span class="fw-bold">${data.ten_mon}</span>
      <div class="subject-btns">
        <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${doc.id}">📝 TXT</button>
        <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${doc.id}">📄 PDF</button>
      </div>
    `;
    // Xử lý xuất TXT/PDF
    div.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const monHocId = btn.getAttribute("data-id");
        const tenMon = data.ten_mon;
        const type = btn.getAttribute("data-type");
        // Lấy câu hỏi theo môn
        const q = query(collection(db, "cau_hoi"), where("mon_hoc_id", "==", monHocId));
        const chSnapshot = await getDocs(q);
        const list = [];
        chSnapshot.forEach(doc2 => {
          const d = doc2.data();
          // Tìm đáp án đúng
          const correct = d.lua_chon && d.dap_an_dung ? d.lua_chon[d.dap_an_dung] : "";
          list.push({ question: d.noi_dung, answer: correct });
        });
        if (type === "txt") {
          exportTXT(tenMon, list);
        } else {
          exportPDF(tenMon, list);
        }
      });
    });
    subjectList.appendChild(div);
  });
}

// Xuất TXT
function exportTXT(tenMon, list) {
  let content = `Đề cương môn: ${tenMon}\n\n`;
  list.forEach((item, idx) => {
    content += `Câu ${idx+1}: ${item.question}\nĐáp án đúng: ${item.answer}\n\n`;
  });
  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  saveAs(blob, `DeCuong_${tenMon.replace(/\s+/g,"_")}.txt`);
}

// Xuất PDF
function exportPDF(tenMon, list) {
  const docDef = {
    content: [
      { text: `Đề cương Môn "${tenMon}"`, style: 'header', alignment: 'center', margin: [0,0,0,10] },
      {
        table: {
          headerRows: 1,
          widths: ['*', '*'],
          body: [
            [
              { text: "Câu hỏi", style: 'tableHeader', alignment: 'center' },
              { text: "Đáp án đúng", style: 'tableHeader', alignment: 'center' }
            ],
            ...list.map(item => [
              { text: item.question || "", alignment: 'left' },
              { text: item.answer || "", alignment: 'left' }
            ])
          ]
        }
      }
    ],
    styles: {
      header: { fontSize: 16, bold: true },
      tableHeader: { bold: true, fillColor: '#e0e0e0' }
    },
    defaultStyle: { fontSize: 11 }
  };
  pdfMake.createPdf(docDef).download(`DeCuong_${tenMon.replace(/\s+/g,"_")}.pdf`);
}

loadSubjects();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
