<script type=module>const firebaseConfig={apiKey:"AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92c",authDomain:"tracuu-d3ee9.firebaseapp.com",projectId:"tracuu-d3ee9",storageBucket:"tracuu-d3ee9.appspot.com",messagingSenderId:"593568604435",appId:"1:593568604435:web:9a5145457a8ee734143ae6"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();async function getSubjects(){return(await db.collection("mon_hoc").get()).docs.map((t=>({id:t.id,...t.data()})))}async function getQuestionsBySubject(t){return(await db.collection("cau_hoi").where("mon_hoc_id","==",t).get()).docs.map((t=>t.data()))}async function loadSubjects(){const t=document.getElementById("subjectList");t.innerHTML="<div>Đang tải...</div>";const e=await getSubjects();0!==e.length?(t.innerHTML="",e.forEach((e=>{const n=document.createElement("div");n.className="d-flex align-items-center justify-content-between border-bottom py-2",n.innerHTML=`\n        <span class="fw-bold"><span class="subject-title-icon">📘</span>${e.ten_mon}</span>\n        <div class="subject-btns">\n          <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${e.id}" data-name="${e.ten_mon}">📝 TXT</button>\n          <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${e.id}" data-name="${e.ten_mon}">📄 PDF</button>\n        </div>\n      `,n.querySelectorAll("button").forEach((t=>{t.addEventListener("click",(async()=>{const e=t.getAttribute("data-type"),n=t.getAttribute("data-id"),a=t.getAttribute("data-name");"txt"===e?exportTXT(n,a):exportPDF(n,a)}))})),t.appendChild(n)}))):t.innerHTML="<div>Không có dữ liệu môn học.</div>"}function firstWord(t){return t&&t.trim().split(/\s+/)[0]||""}async function exportTXT(t,e){const n=await getQuestionsBySubject(t);if(!n.length)return void alert("Không có dữ liệu câu hỏi cho môn này.");const a=n.map((t=>({stt:firstWord(t.noi_dung),question:t.noi_dung,answer:t.lua_chon?.[t.dap_an_dung]||""}))).sort(((t,e)=>t.stt.localeCompare(e.stt,"vi")));let o=`Đề cương môn: ${e}\n\n`;a.forEach((t=>{o+=`STT: ${t.stt}\nCâu hỏi: ${t.question}\nĐáp án đúng: ${t.answer}\n\n`}));const i=new Blob([o],{type:"text/plain;charset=utf-8"});saveAs(i,`DeCuong_${e.replace(/\s+/g,"_")}.txt`)}async function exportPDF(t,e){const n=await getQuestionsBySubject(t);if(!n.length)return void alert("Không có dữ liệu câu hỏi cho môn này.");let a=n.map((t=>({stt:firstWord(t.noi_dung),question:t.noi_dung,answer:t.lua_chon?.[t.dap_an_dung]||""})));a.sort(((t,e)=>t.stt.localeCompare(e.stt,"vi")));const o=[[{text:"STT",style:"tableHeader",alignment:"center"},{text:"Câu hỏi",style:"tableHeader",alignment:"center"},{text:"Đáp án đúng",style:"tableHeader",alignment:"center"}],...a.map((t=>[{text:t.stt,alignment:"center"},t.question,t.answer]))];pdfMake.fonts={Roboto:{normal:"Roboto-Regular.ttf",bold:"Roboto-Medium.ttf",italics:"Roboto-Italic.ttf",bolditalics:"Roboto-MediumItalic.ttf"}};const i={content:[{text:`Đề cương môn: ${e}`,style:"header",margin:[0,0,0,12]},{table:{headerRows:1,widths:["8%","52%","40%"],body:o}}],styles:{header:{fontSize:18,bold:!0,alignment:"center",font:"Roboto"},tableHeader:{bold:!0,fillColor:"#eeeeee",font:"Roboto"}},defaultStyle:{font:"Roboto",fontSize:12}};pdfMake.createPdf(i).download(`DeCuong_${e.replace(/\s+/g,"_")}.pdf`)}loadSubjects()</script>
