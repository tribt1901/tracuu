<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đề cương môn học</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    body { padding-top: 70px; font-family: 'Roboto', Arial, sans-serif; }
    .subject-btns .btn { margin-right: 6px; }
    .navbar-brand, .nav-link { font-family: 'Roboto', Arial, sans-serif; }
    .subject-title-icon { font-size: 1.15em; margin-right: 6px; }
    #pdf-content { display: none; }
    #pdf-content .pdf-title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
      margin-top: 10px;
      font-family: 'Roboto', Arial, sans-serif;
    }
    #pdf-content .pdf-table-wrap {
      display: inline-block;
      max-width: 100%;
    }
    #pdf-content table {
      border: 2px solid #222;
      border-collapse: collapse;
      margin: 0 auto;
      width: 100%;
      table-layout: fixed;
      max-width: 900px;
    }
    #pdf-content table th, #pdf-content table td {
      border: 1px solid #222;
      padding: 6px;
      font-size: 15px;
      font-family: 'Roboto', Arial, sans-serif;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-line;
      vertical-align: top;
      text-align: left;
    }
    #pdf-content table th.stt, #pdf-content table td.stt {
      width: 9%;
      min-width: 35px;
      max-width: 80px;
      text-align: center !important;
    }
    #pdf-content table th.question, #pdf-content table td.question {
      width: 48%;
      min-width: 120px;
      max-width: 470px;
      text-align: left;
    }
    #pdf-content table th.answer, #pdf-content table td.answer {
      width: 43%;
      min-width: 100px;
      max-width: 350px;
      text-align: left;
    }
    #pdf-content table td.answer > div, #pdf-content table th.answer > div {
      display: block;
      width: 100%;
      overflow-x: auto;
      white-space: normal;
    }
    #pdf-content table, #pdf-content tr, #pdf-content td, #pdf-content th {
      page-break-inside: avoid !important;
      break-inside: avoid !important;
    }
    .loading-math {
      color: #4CAF50;
      font-weight: bold;
      margin: 8px 0;
      text-align: center;
    }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color: #4CAF50;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📂 Tải câu hỏi & đáp án theo môn</h5>
      <div id="subjectList"><div>Đang tải...</div></div>
    </div>
  </div>
</div>
<div id="pdf-content"></div>
<div id="loading-mathjax" class="loading-math" style="display:none;">Đang render công thức toán học, vui lòng chờ...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92c",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getFirstWord(str) {
  if (!str) return "";
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = str;
  const text = tempDiv.textContent?.trim() || '';
  const firstSpaceIdx = text.indexOf(' ');
  if (firstSpaceIdx === -1) return text;
  return text.slice(0, firstSpaceIdx);
}
function stripHTML(html) {
  if (!html) return '';
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = html;
  return tempDiv.textContent?.trim() || '';
}
function getAnswer(item) {
  if (!item || !item.lua_chon || item.dap_an_dung === undefined || item.dap_an_dung === null) return "";
  const key = String(item.dap_an_dung);
  if (!(key in item.lua_chon)) return "";
  return item.lua_chon[key];
}
// Gửi mảng htmlArr (câu hỏi và đáp án) sang API để render công thức toán học, nếu lỗi trả lại text gốc
async function renderMathContentBatch(htmlArr) {
  if (!Array.isArray(htmlArr) || htmlArr.length === 0) return [];
  let data = {};
  try {
    const res = await fetch("https://tracuu-app.hugo.io.vn/api/render-math", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ htmlArr })
    });
    data = await res.json();
  } catch(e) {
    data = {};
  }
  if (!data || !Array.isArray(data.results)) {
    // Nếu lỗi, trả lại text gốc không render
    return htmlArr;
  }
  return data.results.map(r =>
    r && r.html && r.html.trim() !== "" ? r.html : ""
  );
}
async function getSubjects() {
  const snapshot = await db.collection("mon_hoc").get();
  return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
}
async function getQuestionsBySubject(subjectId) {
  const qSnapshot = await db.collection("cau_hoi").where("mon_hoc_id", "==", subjectId).get();
  return qSnapshot.docs.map(doc => doc.data());
}
async function loadSubjects() {
  const subjectList = document.getElementById("subjectList");
  subjectList.innerHTML = "<div>Đang tải...</div>";
  const subjects = await getSubjects();
  if(subjects.length === 0) {
    subjectList.innerHTML = "<div>Không có dữ liệu môn học.</div>";
    return;
  }
  subjectList.innerHTML = "";
  subjects.forEach(subj => {
    const div = document.createElement("div");
    div.className = "d-flex align-items-center justify-content-between border-bottom py-2";
    div.innerHTML = `
      <span class="fw-bold"><span class="subject-title-icon">📘</span>${subj.ten_mon}</span>
      <div class="subject-btns">
        <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${subj.id}" data-name="${subj.ten_mon}">📝 TXT</button>
        <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${subj.id}" data-name="${subj.ten_mon}">📄 PDF</button>
      </div>
    `;
    div.querySelector('[data-type="txt"]').addEventListener("click", async () => {
      exportTXT(subj.id, subj.ten_mon);
    });
    div.querySelector('[data-type="pdf"]').addEventListener("click", async () => {
      exportPDF(subj.id, subj.ten_mon);
    });
    subjectList.appendChild(div);
  });
}

async function exportTXT(subjectId, subjectName) {
  const questions = await getQuestionsBySubject(subjectId);
  if(!questions.length) {
    alert("Không có dữ liệu câu hỏi cho môn này.");
    return;
  }
  // Chuẩn bị mảng rows với stt là từ đầu tiên
  const rows = questions.map(item => ({
    stt: getFirstWord(item.noi_dung),
    question: stripHTML(item.noi_dung),
    answer: stripHTML(getAnswer(item))
  }));
  // Sắp xếp theo stt từ A-Z
  rows.sort((a, b) => a.stt.localeCompare(b.stt, "vi"));
  let content = `Đề cương môn: ${subjectName}\n\n`;
  rows.forEach(row => {
    content += `STT: ${row.stt}\nCâu hỏi: ${row.question}\nĐáp án đúng: ${row.answer}\n\n`;
  });
  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  saveAs(blob, `DeCuong_${subjectName.replace(/\s+/g,"_")}.txt`);
}

async function exportPDF(subjectId, subjectName) {
  const questions = await getQuestionsBySubject(subjectId);
  if (!questions || !questions.length) {
    alert("Không có dữ liệu câu hỏi cho môn này.");
    return;
  }
  document.getElementById('loading-mathjax').style.display = 'block';

  // Chuẩn bị mảng rows với stt là từ đầu tiên
  const rows = questions.map((item, i) => ({
    stt: getFirstWord(item.noi_dung),
    question: item.noi_dung ? String(item.noi_dung) : "",
    answer: getAnswer(item) ? String(getAnswer(item)) : ""
  }));

  // Sắp xếp theo stt từ A-Z
  rows.sort((a, b) => a.stt.localeCompare(b.stt, "vi"));

  // render công thức toán cho cả câu hỏi và đáp án
  const htmlArr = [];
  rows.forEach(row => {
    htmlArr.push(row.question);
    htmlArr.push(row.answer);
  });
  if (htmlArr.length === 0) {
    alert("Dữ liệu rỗng.");
    document.getElementById('loading-mathjax').style.display = 'none';
    return;
  }
  const renderedArr = await renderMathContentBatch(htmlArr);

  let html = `
    <div class="pdf-title">Đề cương môn: ${subjectName}</div>
    <div class="pdf-table-wrap">
      <style>
        @import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');
      </style>
      <table>
        <thead>
          <tr>
            <th class="stt" style="text-align:center; vertical-align:middle;">STT</th>
            <th class="question" style="text-align:center; vertical-align:middle;">Câu hỏi</th>
            <th class="answer" style="text-align:center; vertical-align:middle;">Đáp án đúng</th>
          </tr>
        </thead>
        <tbody>
  `;
  let idx = 0;
  rows.forEach((row, i) => {
    const questionHTML = renderedArr[idx] || stripHTML(row.question);
    const answerHTML = renderedArr[idx + 1] || stripHTML(row.answer);
    html += `<tr>
      <td class="stt" style="text-align:center;">${row.stt}</td>
      <td class="question">${questionHTML}</td>
      <td class="answer"><div>${answerHTML}</div></td>
    </tr>`;
    idx += 2;
  });
  html += `</tbody></table></div>`;
  const pdfDiv = document.getElementById("pdf-content");
  pdfDiv.innerHTML = html;
  pdfDiv.style.display = "block";
  await html2pdf().set({
    margin: 10,
    filename: `DeCuong_${subjectName.replace(/\s+/g,"_")}.pdf`,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  }).from(pdfDiv).save();
  pdfDiv.style.display = "none";
  document.getElementById('loading-mathjax').style.display = 'none';
}

loadSubjects();
</script>
</body>
</html>
