<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đề cương môn học</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    body { padding-top: 70px; font-family: Roboto, Arial, sans-serif; }
    .subject-btns .btn { margin-right: 6px; }
    .nav-link, .navbar-brand { font-family: Roboto, Arial, sans-serif; }
    .subject-title-icon { font-size: 1.15em; margin-right: 6px; }
    #pdf-content { display: none; }
    #pdf-content .pdf-title {
      text-align: center; font-size: 22px; font-weight: 700;
      margin-bottom: 12px; margin-top: 10px; font-family: Roboto, Arial, sans-serif;
    }
    #pdf-content .pdf-table-wrap {
      width: 100%; max-width: 100%; box-sizing: border-box; display: flex; justify-content: center;
    }
    /* AutoTable styles are set in script */
    .loading-math { color: #4caf50; font-weight: 700; margin: 8px 0; text-align: center; }
    @media print {
      #pdf-content, .pdf-table-wrap, body, html {
        width: 100% !important; max-width: 100% !important; margin: 0; padding: 0; box-sizing: border-box;
      }
    }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top" style="background-color:#4caf50">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📘 Hệ thống tra cứu</a>
    <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="/upload">Upload</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/subjects">Môn học</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/export">Tài liệu học ở đây nè!!!</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/outline">Hủ Đề cương</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">📂 Tải câu hỏi & đáp án theo môn</h5>
      <div id="subjectList"><div>Đang tải...</div></div>
    </div>
  </div>
</div>
<div id="pdf-content"></div>
<div id="loading-mathjax" class="loading-math" style="display:none">Đang render công thức toán học, vui lòng chờ...</div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- jsPDF and AutoTable -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="module">
// ==== FIREBASE CONFIG ====
const firebaseConfig = {
  apiKey: "AIzaSyAjBMA-atKKvecY8CWeQXZsIQ3yHckZ92c",
  authDomain: "tracuu-d3ee9.firebaseapp.com",
  projectId: "tracuu-d3ee9",
  storageBucket: "tracuu-d3ee9.appspot.com",
  messagingSenderId: "593568604435",
  appId: "1:593568604435:web:9a5145457a8ee734143ae6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==== UTILS ====
function getFirstWord(html) {
  if (!html) return "";
  const n = document.createElement("div");
  n.innerHTML = html;
  const text = n.textContent?.trim() || "";
  const preset = ["Đặt", "Cho", "Hàm"];
  for (const t of preset) if (text.startsWith(t)) return t;
  const i = text.indexOf(" ");
  return i === -1 ? text : text.slice(0, i);
}
function stripHTML(html) {
  if (!html) return "";
  const n = document.createElement("div");
  n.innerHTML = html;
  return n.textContent?.trim() || "";
}
function getAnswer(q) {
  if (!q || !q.lua_chon || q.dap_an_dung === undefined || q.dap_an_dung === null) return "";
  const n = String(q.dap_an_dung);
  return n in q.lua_chon ? q.lua_chon[n] : "";
}
async function getSubjects() {
  return (await db.collection("mon_hoc").get()).docs.map(doc => ({ id: doc.id, ...doc.data() }));
}
async function getQuestionsBySubject(subjId) {
  return (await db.collection("cau_hoi").where("mon_hoc_id", "==", subjId).get()).docs.map(doc => doc.data());
}

// ==== LOAD SUBJECTS ====
async function loadSubjects() {
  const t = document.getElementById("subjectList");
  t.innerHTML = "<div>Đang tải...</div>";
  const n = await getSubjects();
  if (n.length !== 0) {
    t.innerHTML = "";
    n.forEach(subject => {
      const e = document.createElement("div");
      e.className = "d-flex align-items-center justify-content-between border-bottom py-2";
      e.innerHTML = `
        <span class="fw-bold"><span class="subject-title-icon">📘</span>${subject.ten_mon}</span>
        <div class="subject-btns">
          <button class="btn btn-sm btn-outline-secondary" data-type="txt" data-id="${subject.id}" data-name="${subject.ten_mon}">📝 TXT</button>
          <button class="btn btn-sm btn-outline-primary" data-type="pdf" data-id="${subject.id}" data-name="${subject.ten_mon}">📄 PDF</button>
        </div>
      `;
      e.querySelector('[data-type="txt"]').addEventListener("click", () => exportTXT(subject.id, subject.ten_mon));
      e.querySelector('[data-type="pdf"]').addEventListener("click", () => exportPDF(subject.id, subject.ten_mon));
      t.appendChild(e);
    });
  } else {
    t.innerHTML = "<div>Không có dữ liệu môn học.</div>";
  }
}

// ==== EXPORT TXT ====
async function exportTXT(subjectId, subjectName) {
  const e = await getQuestionsBySubject(subjectId);
  if (!e.length) return void alert("Không có dữ liệu câu hỏi cho môn này.");
  const a = e.map(q => ({
    stt: getFirstWord(q.noi_dung),
    question: stripHTML(q.noi_dung),
    answer: getAnswer(q)
  }));
  a.sort((x, y) => x.stt.localeCompare(y.stt, "vi"));
  let i = `Đề cương môn: ${subjectName}\n\n`;
  a.forEach(t => {
    i += `KEY: ${t.stt}\nCâu hỏi: ${t.question}\nĐáp án đúng: ${t.answer}\n\n`;
  });
  const s = new Blob([i], { type: "text/plain;charset=utf-8" });
  saveAs(s, `DeCuong_${subjectName.replace(/\s+/g, "_")}.txt`);
}

// ==== KaTeX RENDER ====
function renderKatexForElement(el) {
  if (el && window.renderMathInElement) {
    window.renderMathInElement(el, {
      delimiters: [
        { left: "\\[", right: "\\]", display: true },
        { left: "\\(", right: "\\)", display: false }
      ],
      throwOnError: false
    });
  }
}

// ==== EXPORT PDF with jsPDF-AutoTable ====
async function exportPDF(subjectId, subjectName) {
  const e = await getQuestionsBySubject(subjectId);
  if (!e || !e.length) return void alert("Không có dữ liệu câu hỏi cho môn này.");
  document.getElementById("loading-mathjax").style.display = "block";

  // Chuẩn bị dữ liệu
  const a = e.map(q => [
    getFirstWord(q.noi_dung),
    stripHTML(q.noi_dung),
    getAnswer(q)
  ]);
  a.sort((x, y) => x[0].localeCompare(y[0], "vi"));

  // Nếu có công thức toán học, render KaTeX ra html tạm để xuất ảnh kèm
  // (AutoTable không hỗ trợ math trực tiếp, nếu dùng nhiều công thức thì cần convert sang ảnh hoặc text trước)

  // Tạo PDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
  doc.setFont("helvetica", "normal");
  doc.setFontSize(12);
  doc.text(`Đề cương môn: ${subjectName}`, 105, 15, { align: "center" });

  // Định nghĩa bảng
  doc.autoTable({
    startY: 22,
    head: [["KEY", "Câu hỏi", "Đáp án đúng"]],
    body: a,
    styles: {
      cellPadding: 2.5,
      font: "helvetica",
      overflow: "linebreak",
      halign: "left",
      valign: "middle",
      fontSize: 11,
      minCellHeight: 8
    },
    headStyles: {
      fillColor: [76, 175, 80],
      textColor: 255,
      fontStyle: "bold",
      halign: "center"
    },
    columnStyles: {
      0: { cellWidth: 25, halign: "center" },
      1: { cellWidth: 100 },
      2: { cellWidth: 60 }
    },
    didDrawPage: function (data) {
      // Custom header/footer nếu cần
    }
  });

  doc.save(`DeCuong_${subjectName.replace(/\s+/g, "_")}.pdf`);
  document.getElementById("loading-mathjax").style.display = "none";
}

// ==== INIT ====
loadSubjects();
</script>
</body>
</html>
